# Social network workload for MySQL
#
# MySQL does not support writable CTEs (DML inside WITH clauses).
# create_post and like_post are simplified to single operations.
# MySQL does not support CROSS JOIN LATERAL in older 8.0 versions;
# populate_follow uses a subquery approach instead.
#
# Requires MySQL 8.0+.
# For large datasets, set: SET GLOBAL cte_max_recursion_depth = 200000;
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  users: 1000
  posts_per_user: 5
  follows_per_user: 10
  tags: 50

up:

  - name: create_user_profile
    query: |-
      CREATE TABLE IF NOT EXISTS user_profile (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        username VARCHAR(255) NOT NULL,
        display_name VARCHAR(255) NOT NULL,
        bio VARCHAR(500) NOT NULL DEFAULT '',
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
      )

  - name: create_post
    query: |-
      CREATE TABLE IF NOT EXISTS post (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        author_id CHAR(36) NOT NULL,
        body TEXT NOT NULL,
        like_count INT NOT NULL DEFAULT 0,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (author_id) REFERENCES user_profile(id)
      )

  - name: create_follow
    query: |-
      CREATE TABLE IF NOT EXISTS follow (
        follower_id CHAR(36) NOT NULL,
        following_id CHAR(36) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (follower_id, following_id),
        FOREIGN KEY (follower_id) REFERENCES user_profile(id),
        FOREIGN KEY (following_id) REFERENCES user_profile(id),
        CHECK (follower_id != following_id)
      )

  - name: create_post_like
    query: |-
      CREATE TABLE IF NOT EXISTS post_like (
        post_id CHAR(36) NOT NULL,
        user_id CHAR(36) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (post_id, user_id),
        FOREIGN KEY (post_id) REFERENCES post(id),
        FOREIGN KEY (user_id) REFERENCES user_profile(id)
      )

  - name: create_comment
    query: |-
      CREATE TABLE IF NOT EXISTS comment (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        post_id CHAR(36) NOT NULL,
        author_id CHAR(36) NOT NULL,
        body TEXT NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (post_id) REFERENCES post(id),
        FOREIGN KEY (author_id) REFERENCES user_profile(id)
      )

  - name: create_tag
    query: |-
      CREATE TABLE IF NOT EXISTS tag (
        id INT PRIMARY KEY,
        name VARCHAR(255) NOT NULL UNIQUE
      )

  - name: create_post_tag
    query: |-
      CREATE TABLE IF NOT EXISTS post_tag (
        post_id CHAR(36) NOT NULL,
        tag_id INT NOT NULL,
        PRIMARY KEY (post_id, tag_id),
        FOREIGN KEY (post_id) REFERENCES post(id),
        FOREIGN KEY (tag_id) REFERENCES tag(id)
      )

  - name: create_idx_post_author
    query: |-
      CREATE INDEX idx_post_author
      ON post (author_id, created_at DESC)

  - name: create_idx_follow_follower
    query: |-
      CREATE INDEX idx_follow_follower
      ON follow (follower_id)

  - name: create_idx_comment_post
    query: |-
      CREATE INDEX idx_comment_post
      ON comment (post_id, created_at DESC)

seed:

  - name: populate_user_profile
    args:
      - users
    query: |-
      INSERT INTO user_profile (username, display_name, bio)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      SELECT
        CONCAT('user_', s),
        SUBSTRING(MD5(RAND()), 1, 12),
        SUBSTRING(CONCAT(MD5(RAND()), MD5(RAND())), 1, 60)
      FROM seq

  - name: populate_tag
    args:
      - tags
    query: |-
      INSERT INTO tag (id, name)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      SELECT s, CONCAT('tag-', s)
      FROM seq

  - name: populate_post
    args:
      - posts_per_user
    query: |-
      INSERT INTO post (author_id, body, like_count)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      SELECT
        u.id,
        SUBSTRING(CONCAT(MD5(RAND()), MD5(RAND())), 1, 100),
        FLOOR(RAND() * 100)
      FROM user_profile u
      CROSS JOIN seq

  - name: populate_post_tag
    args:
      - tags
    query: |-
      INSERT IGNORE INTO post_tag (post_id, tag_id)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < 3
      )
      SELECT p.id, FLOOR(RAND() * $1) + 1
      FROM post p
      CROSS JOIN seq

  - name: populate_follow
    args:
      - follows_per_user
    query: |-
      INSERT IGNORE INTO follow (follower_id, following_id)
      SELECT u.id, f.id
      FROM user_profile u
      CROSS JOIN LATERAL (
        SELECT id FROM user_profile
        WHERE id != u.id
        ORDER BY RAND()
        LIMIT $1
      ) f

deseed:

  - name: delete_post_tag
    type: exec
    query: DELETE FROM post_tag

  - name: delete_comment
    type: exec
    query: DELETE FROM comment

  - name: delete_post_like
    type: exec
    query: DELETE FROM post_like

  - name: delete_follow
    type: exec
    query: DELETE FROM follow

  - name: delete_post
    type: exec
    query: DELETE FROM post

  - name: delete_tag
    type: exec
    query: DELETE FROM tag

  - name: delete_user_profile
    type: exec
    query: DELETE FROM user_profile

down:

  - name: drop_post_tag
    type: exec
    query: DROP TABLE IF EXISTS post_tag

  - name: drop_comment
    type: exec
    query: DROP TABLE IF EXISTS comment

  - name: drop_post_like
    type: exec
    query: DROP TABLE IF EXISTS post_like

  - name: drop_follow
    type: exec
    query: DROP TABLE IF EXISTS follow

  - name: drop_post
    type: exec
    query: DROP TABLE IF EXISTS post

  - name: drop_tag
    type: exec
    query: DROP TABLE IF EXISTS tag

  - name: drop_user_profile
    type: exec
    query: DROP TABLE IF EXISTS user_profile

init:

  - name: fetch_users
    type: query
    query: SELECT id, username, display_name FROM user_profile ORDER BY RAND()

  - name: fetch_posts
    type: query
    query: SELECT id FROM post ORDER BY RAND()

  - name: fetch_tags
    type: query
    query: SELECT id, name FROM tag

run_weights:
  fetch_feed: 30
  create_post: 10
  like_post: 25
  add_comment: 10
  follow_user: 5
  trending: 10
  mutual_friends: 10

run:

  # Fetch posts from users this user follows.
  # Pattern: fan-out read via multi-JOIN across follow relationships
  - name: fetch_feed
    type: query
    args:
      - ref_rand('fetch_users').id
    query: |-
      SELECT p.id, p.body, p.like_count, p.created_at,
        u.username, u.display_name
      FROM post p
      JOIN follow f ON f.following_id = p.author_id
      JOIN user_profile u ON u.id = p.author_id
      WHERE f.follower_id = ?
      ORDER BY p.created_at DESC
      LIMIT 20

  # Create a post (without tags; writable CTEs not supported).
  # Pattern: simple INSERT
  - name: create_post
    type: exec
    args:
      - ref_rand('fetch_users').id
      - gen('sentence:10')
    query: |-
      INSERT INTO post (author_id, body)
      VALUES (?, ?)

  # Like a post (idempotent).
  # Note: MySQL does not support writable CTEs, so the like_count
  # increment is omitted. Use a trigger for counter updates.
  - name: like_post
    type: exec
    args:
      - ref_rand('fetch_posts').id
      - ref_rand('fetch_users').id
    query: |-
      INSERT IGNORE INTO post_like (post_id, user_id)
      VALUES (?, ?)

  # Comment on a post.
  # Pattern: ref_same for consistent multi-field access
  - name: add_comment
    type: exec
    args:
      - ref_rand('fetch_posts').id
      - ref_same('fetch_users').id
      - ref_same('fetch_users').display_name
      - gen('sentence:8')
    query: |-
      INSERT INTO comment (post_id, author_id, body)
      VALUES (?, ?, CONCAT(?, ': ', ?))

  # Follow another user (idempotent).
  # Pattern: INSERT IGNORE for ON CONFLICT DO NOTHING
  - name: follow_user
    type: exec
    args:
      - ref_diff('fetch_users').id
      - ref_diff('fetch_users').id
    query: |-
      INSERT IGNORE INTO follow (follower_id, following_id)
      VALUES (?, ?)

  # Find trending posts by like count.
  # Pattern: global aggregate with ORDER BY + LIMIT
  - name: trending
    type: query
    query: |-
      SELECT p.id, p.body, p.like_count, u.username
      FROM post p
      JOIN user_profile u ON u.id = p.author_id
      ORDER BY p.like_count DESC
      LIMIT 10

  # Find mutual follows between two users.
  # Pattern: ref_diff for two distinct users, self-join on follow table
  - name: mutual_friends
    type: query
    args:
      - ref_diff('fetch_users').id
      - ref_diff('fetch_users').id
    query: |-
      SELECT u.id, u.username, u.display_name
      FROM follow f1
      JOIN follow f2 ON f1.following_id = f2.following_id
      JOIN user_profile u ON u.id = f1.following_id
      WHERE f1.follower_id = ?
        AND f2.follower_id = ?
      LIMIT 20
