init:
  - name: fetch_warehouses
    type: query
    query: SELECT w_id FROM edg.warehouse

run_weights:
  # OLTP (80%)
  new_order: 36
  payment: 34
  order_status: 4
  delivery: 4
  stock_level: 2
  # OLAP (20%)
  q1_pricing_summary: 5
  q6_forecasting_revenue: 5
  q11_important_stock: 5
  q12_shipping_modes: 5

run:

  # === OLTP Transactions (TPC-C) ===

  # New-Order transaction (TPC-C 2.4)
  # Inserts a new order directly. Cassandra cannot atomically
  # increment non-counter columns.
  - name: new_order
    type: exec
    wait: 18s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
      - gen('number:3001,999999')
      - gen('number:5,15')
    query: |-
      INSERT INTO edg.oorder (o_w_id, o_d_id, o_id, o_c_id, o_entry_d,
        o_ol_cnt, o_all_local)
      VALUES ($1, $2, $4, $3, toTimestamp(now()), $5, 1)

  # Payment transaction (TPC-C 2.5)
  # Updates warehouse year-to-date total. Uses overwrite semantics
  # since Cassandra non-counter columns cannot be atomically
  # incremented.
  - name: payment
    type: exec
    wait: 3s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
      - gen('number:100,500000')
    query: |-
      UPDATE edg.warehouse SET w_ytd = $4 WHERE w_id = $1

  # Order-Status transaction (TPC-C 2.6)
  # Retrieves the most recent order. Uses DESC clustering order.
  - name: order_status
    type: query
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
    query: |-
      SELECT * FROM edg.oorder
      WHERE o_w_id = $1 AND o_d_id = $2
      LIMIT 1

  # Delivery transaction (TPC-C 2.7)
  # Deletes a new_order record. Requires all PK components.
  - name: delivery
    type: exec
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - gen('number:2101,3000')
    query: |-
      DELETE FROM edg.new_order
      WHERE no_w_id = $1 AND no_d_id = $2 AND no_o_id = $3

  # Stock-Level transaction (TPC-C 2.8)
  # Scans stock for items below threshold. Requires ALLOW
  # FILTERING since s_quantity is not part of the primary key.
  - name: stock_level
    type: query
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - gen('number:10,20')
    query: |-
      SELECT s_i_id FROM edg.stock
      WHERE s_w_id = $1 AND s_quantity < $3
      ALLOW FILTERING

  # === OLAP Queries (TPC-H adapted to TPC-C schema) ===

  # CH Q1: Pricing summary on order_line.
  # Returns order_line rows for client-side aggregation.
  # Cassandra cannot perform GROUP BY with complex aggregations.
  - name: q1_pricing_summary
    type: query
    query: |-
      SELECT ol_number, ol_quantity, ol_amount
      FROM edg.order_line
      ALLOW FILTERING

  # CH Q6: Revenue forecast on order_line.
  # Scans order_line for delivered items within quantity range.
  - name: q6_forecasting_revenue
    type: query
    query: |-
      SELECT ol_amount
      FROM edg.order_line
      ALLOW FILTERING

  # CH Q11: Important stock - top items by value.
  # Reads stock for a specific warehouse. Partition key gives
  # efficient single-partition scan.
  - name: q11_important_stock
    type: query
    args:
      - ref_perm('fetch_warehouses').w_id
    query: |-
      SELECT s_i_id, s_quantity
      FROM edg.stock
      WHERE s_w_id = $1

  # CH Q12: Shipping modes - order urgency by carrier.
  # Scans oorder for carrier-based aggregation.
  # Requires ALLOW FILTERING for non-PK column access.
  - name: q12_shipping_modes
    type: query
    query: |-
      SELECT o_ol_cnt, o_carrier_id
      FROM edg.oorder
      ALLOW FILTERING


expectations:
  - error_rate < 1
