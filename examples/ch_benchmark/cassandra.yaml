# CH-benCHmark Workload (Cassandra)
# ===================================
# Cassandra adaptation of the mixed OLTP+OLAP workload combining
# TPC-C transactions with TPC-H-style analytical queries running
# concurrently on the same TPC-C schema. Tests HTAP capability.
#
# Uses the full TPC-C schema with nation/region/supplier tables
# added per the CH-benCHmark specification.
#
# Cassandra limitations:
#   - No JOINs; each query operates on a single table
#   - No complex aggregations; OLAP queries simplified to scans
#   - Non-counter columns cannot be atomically incremented
#
# OLTP transactions (80% of workload):
#   new_order  - INSERT into oorder (36%)
#   payment    - UPDATE warehouse w_ytd (34%)
#   order_status - SELECT from oorder (4%)
#   delivery   - DELETE from new_order (4%)
#   stock_level - SELECT from stock with ALLOW FILTERING (2%)
#
# OLAP queries (20% of workload):
#   q1_pricing_summary    - Scan order_line (5%)
#   q6_forecasting_revenue - Scan order_line (5%)
#   q11_important_stock    - Scan stock (5%)
#   q12_shipping_modes     - Scan oorder (5%)

globals:
  warehouses: int(coalesce(env_nil('WAREHOUSES'), 1))
  districts: int(coalesce(env_nil('DISTRICTS'), 10))
  customers: int(coalesce(env_nil('CUSTOMERS'), 300))
  orders: int(coalesce(env_nil('ORDERS'), 300))
  stock: int(coalesce(env_nil('STOCK'), 1000))
  items: int(coalesce(env_nil('ITEMS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))
  ol_batch: int(coalesce(env_nil('OL_BATCH'), 100))

up:

  - name: create_keyspace
    type: exec
    query: |-
      CREATE KEYSPACE IF NOT EXISTS edg
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1}

  - name: create_warehouse
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.warehouse (
        w_id INT,
        w_name TEXT,
        w_street_1 TEXT,
        w_street_2 TEXT,
        w_city TEXT,
        w_state TEXT,
        w_zip TEXT,
        w_tax DOUBLE,
        w_ytd DOUBLE,
        PRIMARY KEY (w_id)
      )

  - name: create_district
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.district (
        d_w_id INT,
        d_id INT,
        d_name TEXT,
        d_street_1 TEXT,
        d_street_2 TEXT,
        d_city TEXT,
        d_state TEXT,
        d_zip TEXT,
        d_tax DOUBLE,
        d_ytd DOUBLE,
        d_next_o_id INT,
        PRIMARY KEY ((d_w_id, d_id))
      )

  - name: create_customer
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.customer (
        c_w_id INT,
        c_d_id INT,
        c_id INT,
        c_first TEXT,
        c_middle TEXT,
        c_last TEXT,
        c_street_1 TEXT,
        c_street_2 TEXT,
        c_city TEXT,
        c_state TEXT,
        c_zip TEXT,
        c_phone TEXT,
        c_since TIMESTAMP,
        c_credit TEXT,
        c_credit_lim DOUBLE,
        c_discount DOUBLE,
        c_balance DOUBLE,
        c_ytd_payment DOUBLE,
        c_payment_cnt INT,
        c_delivery_cnt INT,
        c_data TEXT,
        PRIMARY KEY ((c_w_id, c_d_id), c_id)
      )

  - name: create_history
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.history (
        h_id UUID,
        h_c_id INT,
        h_c_d_id INT,
        h_c_w_id INT,
        h_d_id INT,
        h_w_id INT,
        h_date TIMESTAMP,
        h_amount DOUBLE,
        h_data TEXT,
        PRIMARY KEY (h_id)
      )

  - name: create_oorder
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.oorder (
        o_w_id INT,
        o_d_id INT,
        o_id INT,
        o_c_id INT,
        o_entry_d TIMESTAMP,
        o_carrier_id INT,
        o_ol_cnt INT,
        o_all_local INT,
        PRIMARY KEY ((o_w_id, o_d_id), o_id)
      ) WITH CLUSTERING ORDER BY (o_id DESC)

  - name: create_new_order
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.new_order (
        no_w_id INT,
        no_d_id INT,
        no_o_id INT,
        PRIMARY KEY ((no_w_id, no_d_id), no_o_id)
      )

  - name: create_order_line
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.order_line (
        ol_w_id INT,
        ol_d_id INT,
        ol_o_id INT,
        ol_number INT,
        ol_i_id INT,
        ol_supply_w_id INT,
        ol_delivery_d TIMESTAMP,
        ol_quantity INT,
        ol_amount DOUBLE,
        ol_dist_info TEXT,
        PRIMARY KEY ((ol_w_id, ol_d_id, ol_o_id), ol_number)
      )

  - name: create_item
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.item (
        i_id INT,
        i_im_id INT,
        i_name TEXT,
        i_price DOUBLE,
        i_data TEXT,
        PRIMARY KEY (i_id)
      )

  - name: create_stock
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.stock (
        s_w_id INT,
        s_i_id INT,
        s_quantity INT,
        s_dist_01 TEXT,
        s_dist_02 TEXT,
        s_dist_03 TEXT,
        s_dist_04 TEXT,
        s_dist_05 TEXT,
        s_dist_06 TEXT,
        s_dist_07 TEXT,
        s_dist_08 TEXT,
        s_dist_09 TEXT,
        s_dist_10 TEXT,
        s_ytd INT,
        s_order_cnt INT,
        s_remote_cnt INT,
        s_data TEXT,
        PRIMARY KEY ((s_w_id), s_i_id)
      )

  - name: create_nation
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.nation (
        n_nationkey INT,
        n_name TEXT,
        n_regionkey INT,
        n_comment TEXT,
        PRIMARY KEY (n_nationkey)
      )

  - name: create_region
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.region (
        r_regionkey INT,
        r_name TEXT,
        r_comment TEXT,
        PRIMARY KEY (r_regionkey)
      )

  - name: create_supplier
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.supplier (
        su_suppkey INT,
        su_name TEXT,
        su_address TEXT,
        su_nationkey INT,
        su_phone TEXT,
        su_acctbal DOUBLE,
        su_comment TEXT,
        PRIMARY KEY (su_suppkey)
      )

