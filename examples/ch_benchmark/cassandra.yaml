  - name: populate_supplier
    type: exec_batch
    count: 10000
    size: 50
    args:
      - iter()
      - regex('[a-zA-Z]{15,25}')
      - regex('[a-zA-Z]{15,40}')
      - gen('number:0,24')
      - regex('[a-zA-Z]{15,15}')
      - uniform_f(-1000.00, 9000.00, 2)
      - regex('[a-zA-Z]{10,30}')
    query: |-
      INSERT INTO edg.supplier (su_suppkey, su_name, su_address,
        su_nationkey, su_phone, su_acctbal, su_comment)
