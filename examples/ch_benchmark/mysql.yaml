  - name: truncate_order_line
    type: exec
    query: DELETE FROM order_line

  - name: truncate_new_order
    type: exec
    query: DELETE FROM new_order

  - name: truncate_oorder
    type: exec
    query: DELETE FROM oorder

  - name: truncate_history
    type: exec
    query: DELETE FROM history

  - name: truncate_stock
    type: exec
    query: DELETE FROM stock

  - name: truncate_customer
    type: exec
    query: DELETE FROM customer

  - name: truncate_district
    type: exec
    query: DELETE FROM district

  - name: truncate_warehouse
    type: exec
    query: DELETE FROM warehouse

  - name: truncate_item
    type: exec
