# CH-benCHmark Workload
# =====================
# Mixed OLTP+OLAP workload combining TPC-C transactions with
# TPC-H-style analytical queries running concurrently on the
# same TPC-C schema. Tests HTAP (Hybrid Transactional/Analytical
# Processing) capability.
#
# Uses the full TPC-C schema with nation/region/supplier tables
# added per the CH-benCHmark specification.
#
# OLTP transactions (80% of workload):
#   new_order  - TPC-C new order (36%)
#   payment    - TPC-C payment (34%)
#   order_status - TPC-C order status (4%)
#   delivery   - TPC-C delivery (4%)
#   stock_level - TPC-C stock level (2%)
#
# OLAP queries (20% of workload):
#   q1_pricing_summary    - Aggregate order_line (5%)
#   q6_forecasting_revenue - Revenue from order_line (5%)
#   q11_important_stock    - Top stock items by value (5%)
#   q12_shipping_modes     - Order urgency by carrier (5%)

globals:
  warehouses: int(coalesce(env_nil('WAREHOUSES'), 1))
  districts: int(coalesce(env_nil('DISTRICTS'), 10))
  customers: int(coalesce(env_nil('CUSTOMERS'), 300))
  orders: int(coalesce(env_nil('ORDERS'), 300))
  stock: int(coalesce(env_nil('STOCK'), 1000))
  items: int(coalesce(env_nil('ITEMS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))
  ol_batch: int(coalesce(env_nil('OL_BATCH'), 100))

up:

  - name: create_warehouse
    query: |-
      CREATE TABLE IF NOT EXISTS warehouse (
        w_id INT NOT NULL,
        w_name VARCHAR(10) NOT NULL,
        w_street_1 VARCHAR(20) NOT NULL,
        w_street_2 VARCHAR(20) NOT NULL,
        w_city VARCHAR(20) NOT NULL,
        w_state CHAR(2) NOT NULL,
        w_zip CHAR(9) NOT NULL,
        w_tax DECIMAL(4,4) NOT NULL,
        w_ytd DECIMAL(12,2) NOT NULL,
        PRIMARY KEY (w_id)
      )

  - name: create_district
    query: |-
      CREATE TABLE IF NOT EXISTS district (
        d_w_id INT NOT NULL,
        d_id INT NOT NULL,
        d_name VARCHAR(10) NOT NULL,
        d_street_1 VARCHAR(20) NOT NULL,
        d_street_2 VARCHAR(20) NOT NULL,
        d_city VARCHAR(20) NOT NULL,
        d_state CHAR(2) NOT NULL,
        d_zip CHAR(9) NOT NULL,
        d_tax DECIMAL(4,4) NOT NULL,
        d_ytd DECIMAL(12,2) NOT NULL,
        d_next_o_id INT NOT NULL,
        PRIMARY KEY (d_w_id, d_id)
      )

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        c_w_id INT NOT NULL,
        c_d_id INT NOT NULL,
        c_id INT NOT NULL,
        c_first VARCHAR(16) NOT NULL,
        c_middle CHAR(2) NOT NULL,
        c_last VARCHAR(16) NOT NULL,
        c_street_1 VARCHAR(20) NOT NULL,
        c_street_2 VARCHAR(20) NOT NULL,
        c_city VARCHAR(20) NOT NULL,
        c_state CHAR(2) NOT NULL,
        c_zip CHAR(9) NOT NULL,
        c_phone CHAR(16) NOT NULL,
        c_since TIMESTAMP NOT NULL,
        c_credit CHAR(2) NOT NULL,
        c_credit_lim DECIMAL(12,2) NOT NULL,
        c_discount DECIMAL(4,4) NOT NULL,
        c_balance DECIMAL(12,2) NOT NULL,
        c_ytd_payment DECIMAL(12,2) NOT NULL,
        c_payment_cnt INT NOT NULL,
        c_delivery_cnt INT NOT NULL,
        c_data VARCHAR(500) NOT NULL,
        PRIMARY KEY (c_w_id, c_d_id, c_id)
      )

  - name: create_history
    query: |-
      CREATE TABLE IF NOT EXISTS history (
        h_id UUID NOT NULL DEFAULT gen_random_uuid(),
        h_c_id INT NOT NULL,
        h_c_d_id INT NOT NULL,
        h_c_w_id INT NOT NULL,
        h_d_id INT NOT NULL,
        h_w_id INT NOT NULL,
        h_date TIMESTAMP NOT NULL,
        h_amount DECIMAL(6,2) NOT NULL,
        h_data VARCHAR(24) NOT NULL,
        PRIMARY KEY (h_id)
      )

  - name: create_oorder
    query: |-
      CREATE TABLE IF NOT EXISTS oorder (
        o_w_id INT NOT NULL,
        o_d_id INT NOT NULL,
        o_id INT NOT NULL,
        o_c_id INT NOT NULL,
        o_entry_d TIMESTAMP NOT NULL,
        o_carrier_id INT,
        o_ol_cnt INT NOT NULL,
        o_all_local INT NOT NULL,
        PRIMARY KEY (o_w_id, o_d_id, o_id)
      )

  - name: create_new_order
    query: |-
      CREATE TABLE IF NOT EXISTS new_order (
        no_w_id INT NOT NULL,
        no_d_id INT NOT NULL,
        no_o_id INT NOT NULL,
        PRIMARY KEY (no_w_id, no_d_id, no_o_id)
      )

  - name: create_order_line
    query: |-
      CREATE TABLE IF NOT EXISTS order_line (
        ol_w_id INT NOT NULL,
        ol_d_id INT NOT NULL,
        ol_o_id INT NOT NULL,
        ol_number INT NOT NULL,
        ol_i_id INT NOT NULL,
        ol_supply_w_id INT NOT NULL,
        ol_delivery_d TIMESTAMP,
        ol_quantity INT NOT NULL,
        ol_amount DECIMAL(6,2) NOT NULL,
        ol_dist_info CHAR(24) NOT NULL,
        PRIMARY KEY (ol_w_id, ol_d_id, ol_o_id, ol_number)
      )

  - name: create_item
    query: |-
      CREATE TABLE IF NOT EXISTS item (
        i_id INT NOT NULL,
        i_im_id INT NOT NULL,
        i_name VARCHAR(24) NOT NULL,
        i_price DECIMAL(5,2) NOT NULL,
        i_data VARCHAR(50) NOT NULL,
        PRIMARY KEY (i_id)
      )

  - name: create_stock
    query: |-
      CREATE TABLE IF NOT EXISTS stock (
        s_w_id INT NOT NULL,
        s_i_id INT NOT NULL,
        s_quantity INT NOT NULL,
        s_dist_01 CHAR(24) NOT NULL,
        s_dist_02 CHAR(24) NOT NULL,
        s_dist_03 CHAR(24) NOT NULL,
        s_dist_04 CHAR(24) NOT NULL,
        s_dist_05 CHAR(24) NOT NULL,
        s_dist_06 CHAR(24) NOT NULL,
        s_dist_07 CHAR(24) NOT NULL,
        s_dist_08 CHAR(24) NOT NULL,
        s_dist_09 CHAR(24) NOT NULL,
        s_dist_10 CHAR(24) NOT NULL,
        s_ytd INT NOT NULL,
        s_order_cnt INT NOT NULL,
        s_remote_cnt INT NOT NULL,
        s_data VARCHAR(50) NOT NULL,
        PRIMARY KEY (s_w_id, s_i_id)
      )

  - name: create_nation
    query: |-
      CREATE TABLE IF NOT EXISTS nation (
        n_nationkey INT NOT NULL PRIMARY KEY,
        n_name VARCHAR(25) NOT NULL,
        n_regionkey INT NOT NULL,
        n_comment VARCHAR(152)
      )

  - name: create_region
    query: |-
      CREATE TABLE IF NOT EXISTS region (
        r_regionkey INT NOT NULL PRIMARY KEY,
        r_name VARCHAR(25) NOT NULL,
        r_comment VARCHAR(152)
      )

  - name: create_supplier
    query: |-
      CREATE TABLE IF NOT EXISTS supplier (
        su_suppkey INT NOT NULL PRIMARY KEY,
        su_name VARCHAR(25) NOT NULL,
        su_address VARCHAR(40) NOT NULL,
        su_nationkey INT NOT NULL,
        su_phone VARCHAR(15) NOT NULL,
        su_acctbal DECIMAL(12,2) NOT NULL,
        su_comment VARCHAR(101)
      )

  - name: create_idx_customer_name
    query: |-
      CREATE INDEX IF NOT EXISTS idx_customer_name
      ON customer (c_w_id, c_d_id, c_last, c_first)

  - name: create_idx_oorder_customer
    query: |-
      CREATE INDEX IF NOT EXISTS idx_oorder_customer
      ON oorder (o_w_id, o_d_id, o_c_id, o_id DESC)

seed:

  - name: populate_region
    query: |-
      INSERT INTO region (r_regionkey, r_name, r_comment)
      SELECT s - 1,
        (ARRAY['AFRICA','AMERICA','ASIA','EUROPE','MIDDLE EAST'])[s],
        substr(md5(random()::FLOAT8::text), 1, 30)
      FROM generate_series(1, 5) AS s

  - name: populate_nation
    query: |-
      INSERT INTO nation (n_nationkey, n_name, n_regionkey, n_comment)
      VALUES
        (0,'ALGERIA',0,''),    (1,'ARGENTINA',1,''),  (2,'BRAZIL',1,''),
        (3,'CANADA',1,''),     (4,'EGYPT',4,''),      (5,'ETHIOPIA',0,''),
        (6,'FRANCE',3,''),     (7,'GERMANY',3,''),    (8,'INDIA',2,''),
        (9,'INDONESIA',2,''),  (10,'IRAN',4,''),      (11,'IRAQ',4,''),
        (12,'JAPAN',2,''),     (13,'JORDAN',4,''),    (14,'KENYA',0,''),
        (15,'MOROCCO',0,''),   (16,'MOZAMBIQUE',0,''), (17,'PERU',1,''),
        (18,'CHINA',2,''),     (19,'ROMANIA',3,''),   (20,'SAUDI ARABIA',4,''),
        (21,'VIETNAM',2,''),   (22,'RUSSIA',3,''),    (23,'UNITED KINGDOM',3,''),
        (24,'UNITED STATES',1,'')

  - name: populate_supplier
    query: |-
      INSERT INTO supplier (su_suppkey, su_name, su_address, su_nationkey,
        su_phone, su_acctbal, su_comment)
      SELECT
        s,
        'Supplier#' || lpad(s::TEXT, 9, '0'),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 25 + 15)::INT),
        floor(random()::FLOAT8 * 25)::INT,
        lpad(floor(random()::FLOAT8 * 90 + 10)::INT::TEXT, 2, '0') || '-' ||
        lpad(floor(random()::FLOAT8 * 1000)::INT::TEXT, 3, '0') || '-' ||
        lpad(floor(random()::FLOAT8 * 1000)::INT::TEXT, 3, '0') || '-' ||
        lpad(floor(random()::FLOAT8 * 10000)::INT::TEXT, 4, '0'),
        (random()::FLOAT8 * 10000 - 1000)::DECIMAL(12,2),
        substr(md5(random()::FLOAT8::text), 1, 30)
      FROM generate_series(1, 10000) AS s

  - name: populate_item
    args:
      - items
    query: |-
      INSERT INTO item (i_id, i_im_id, i_name, i_price, i_data)
      SELECT
        s,
        floor(random()::FLOAT8 * 10000 + 1)::INT,
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 18 + 6)::INT),
        (random()::FLOAT8 * 99 + 1)::DECIMAL(5,2),
        CASE WHEN random()::FLOAT8 < 0.1::FLOAT8
          THEN 'ORIGINAL' || substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 16 + 18)::INT)
          ELSE substr(md5(random()::FLOAT8::text) || md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 24 + 26)::INT)
        END
      FROM generate_series(1, $1) AS s

  - name: populate_warehouse
    args:
      - warehouses
    query: |-
      INSERT INTO warehouse (w_id, w_name, w_street_1, w_street_2, w_city,
        w_state, w_zip, w_tax, w_ytd)
      SELECT
        s,
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 4 + 6)::INT),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 10 + 10)::INT),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 10 + 10)::INT),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 10 + 10)::INT),
        substr(md5(random()::FLOAT8::text), 1, 2),
        lpad((floor(random()::FLOAT8 * 10000)::INT)::TEXT, 4, '0') || '11111',
        random()::FLOAT8 / 5,
        300000
      FROM generate_series(1, $1) AS s

  - name: populate_district
    args:
      - ref_each('SELECT w_id FROM warehouse')
      - districts
    query: |-
      INSERT INTO district (d_w_id, d_id, d_name, d_street_1, d_street_2,
        d_city, d_state, d_zip, d_tax, d_ytd, d_next_o_id)
      SELECT
        $1::INT, d,
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 4 + 6)::INT),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 10 + 10)::INT),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 10 + 10)::INT),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 10 + 10)::INT),
        substr(md5(random()::FLOAT8::text), 1, 2),
        lpad((floor(random()::FLOAT8 * 10000)::INT)::TEXT, 4, '0') || '11111',
        random()::FLOAT8 / 5,
        30000,
        3001
      FROM generate_series(1, $2) AS d

  - name: populate_customer
    args:
      - ref_each('SELECT w_id FROM warehouse')
      - districts
      - customers / districts
    query: |-
      INSERT INTO customer (c_w_id, c_d_id, c_id, c_first, c_middle, c_last,
        c_street_1, c_street_2, c_city, c_state, c_zip, c_phone,
        c_since, c_credit, c_credit_lim, c_discount, c_balance,
        c_ytd_payment, c_payment_cnt, c_delivery_cnt, c_data)
      SELECT
        $1::INT, d, c,
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 10 + 6)::INT),
        'OE',
        (ARRAY['BAR','OUGHT','ABLE','PRI','PRES','ESE','ANTI','CALLY','ATION','EING'])[ln.n // 100 + 1] ||
        (ARRAY['BAR','OUGHT','ABLE','PRI','PRES','ESE','ANTI','CALLY','ATION','EING'])[(ln.n // 10) % 10 + 1] ||
        (ARRAY['BAR','OUGHT','ABLE','PRI','PRES','ESE','ANTI','CALLY','ATION','EING'])[ln.n % 10 + 1],
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 10 + 10)::INT),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 10 + 10)::INT),
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 10 + 10)::INT),
        substr(md5(random()::FLOAT8::text), 1, 2),
        lpad((floor(random()::FLOAT8 * 10000)::INT)::TEXT, 4, '0') || '11111',
        lpad((floor(random()::FLOAT8 * 9999)::INT)::TEXT, 4, '0') ||
        lpad((floor(random()::FLOAT8 * 9999)::INT)::TEXT, 4, '0') ||
        lpad((floor(random()::FLOAT8 * 9999)::INT)::TEXT, 4, '0') ||
        lpad((floor(random()::FLOAT8 * 9999)::INT)::TEXT, 4, '0'),
        now(),
        CASE WHEN random()::FLOAT8 < 0.1::FLOAT8 THEN 'BC' ELSE 'GC' END,
        50000,
        random()::FLOAT8 / 2,
        -10,
        10,
        1,
        0,
        substr(repeat(md5(random()::FLOAT8::text), 16), 1, (random()::FLOAT8 * 200 + 300)::INT)
      FROM generate_series(1, $2) AS d
      CROSS JOIN generate_series(1, $3) AS c
      CROSS JOIN LATERAL (
        SELECT CASE WHEN c <= 1000 THEN c - 1
                    ELSE floor(random()::FLOAT8 * 1000)::INT
               END AS n
      ) AS ln

  - name: populate_history
    args:
      - ref_each('SELECT w_id FROM warehouse')
    query: |-
      INSERT INTO history (h_c_id, h_c_d_id, h_c_w_id, h_d_id, h_w_id,
        h_date, h_amount, h_data)
      SELECT
        c.c_id, c.c_d_id, c.c_w_id,
        c.c_d_id, c.c_w_id,
        now(),
        10,
        substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 12 + 12)::INT)
      FROM customer c
      WHERE c.c_w_id = $1::INT

  - name: populate_oorder
    args:
      - ref_each('SELECT w_id FROM warehouse')
      - districts
      - orders / districts
    query: |-
      INSERT INTO oorder (o_w_id, o_d_id, o_id, o_c_id, o_entry_d,
        o_carrier_id, o_ol_cnt, o_all_local)
      SELECT
        $1::INT, d, o,
        floor(random()::FLOAT8 * 3000 + 1)::INT,
        now(),
        CASE WHEN o <= 2100 THEN floor(random()::FLOAT8 * 10 + 1)::INT ELSE NULL END,
        floor(random()::FLOAT8 * 11 + 5)::INT,
        1
      FROM generate_series(1, $2) AS d
      CROSS JOIN generate_series(1, $3) AS o

  - name: populate_new_order
    args:
      - ref_each('SELECT w_id FROM warehouse')
      - districts
      - orders / districts
    query: |-
      INSERT INTO new_order (no_w_id, no_d_id, no_o_id)
      SELECT $1::INT, d, o
      FROM generate_series(1, $2) AS d
      CROSS JOIN generate_series(2101, $3) AS o

  - name: populate_order_line
    args:
      - ref_each('SELECT w_id FROM warehouse')
    query: |-
      INSERT INTO order_line (ol_w_id, ol_d_id, ol_o_id, ol_number,
        ol_i_id, ol_supply_w_id, ol_delivery_d, ol_quantity, ol_amount,
        ol_dist_info)
      SELECT
        o.o_w_id, o.o_d_id, o.o_id,
        n,
        floor(random()::FLOAT8 * 100000 + 1)::INT,
        o.o_w_id,
        CASE WHEN o.o_id <= 2100 THEN o.o_entry_d ELSE NULL END,
        5,
        CASE WHEN o.o_id <= 2100 THEN 0
             ELSE random()::FLOAT8 * 9999
        END,
        substr(md5(random()::FLOAT8::text), 1, 24)
      FROM oorder o
      JOIN LATERAL generate_series(1, o.o_ol_cnt) AS n ON true
      WHERE o.o_w_id = $1::INT

  - name: populate_stock
    args:
      - ref_each('SELECT w_id FROM warehouse')
      - stock
    query: |-
      INSERT INTO stock (s_w_id, s_i_id, s_quantity,
        s_dist_01, s_dist_02, s_dist_03, s_dist_04, s_dist_05,
        s_dist_06, s_dist_07, s_dist_08, s_dist_09, s_dist_10,
        s_ytd, s_order_cnt, s_remote_cnt, s_data)
      SELECT
        $1::INT, i,
        floor(random()::FLOAT8 * 91 + 10)::INT,
        substr(md5(random()::FLOAT8::text), 1, 24),
        substr(md5(random()::FLOAT8::text), 1, 24),
        substr(md5(random()::FLOAT8::text), 1, 24),
        substr(md5(random()::FLOAT8::text), 1, 24),
        substr(md5(random()::FLOAT8::text), 1, 24),
        substr(md5(random()::FLOAT8::text), 1, 24),
        substr(md5(random()::FLOAT8::text), 1, 24),
        substr(md5(random()::FLOAT8::text), 1, 24),
        substr(md5(random()::FLOAT8::text), 1, 24),
        substr(md5(random()::FLOAT8::text), 1, 24),
        0, 0, 0,
        CASE WHEN random()::FLOAT8 < 0.1::FLOAT8
          THEN 'ORIGINAL' || substr(md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 16 + 18)::INT)
          ELSE substr(md5(random()::FLOAT8::text) || md5(random()::FLOAT8::text), 1, (random()::FLOAT8 * 24 + 26)::INT)
        END
      FROM generate_series(1, $2) AS i

