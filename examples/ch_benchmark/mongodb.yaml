# CH-benCHmark Workload (MongoDB)
# ================================
# MongoDB adaptation of the mixed OLTP+OLAP workload combining
# TPC-C transactions with TPC-H-style analytical queries running
# concurrently on the same TPC-C schema. Tests HTAP capability.
#
# Uses the full TPC-C schema with nation/region/supplier
# collections added per the CH-benCHmark specification.
#
# OLTP transactions (80% of workload):
#   new_order  - findAndModify on district (36%)
#   payment    - findAndModify on customer (34%)
#   order_status - find latest order (4%)
#   delivery   - findAndModify to remove oldest new_order (4%)
#   stock_level - aggregation on stock (2%)
#
# OLAP queries (20% of workload):
#   q1_pricing_summary    - Aggregate order_line (5%)
#   q6_forecasting_revenue - Revenue from order_line (5%)
#   q11_important_stock    - Top stock items by value (5%)
#   q12_shipping_modes     - Order urgency by carrier (5%)

globals:
  warehouses: int(coalesce(env_nil('WAREHOUSES'), 1))
  districts: int(coalesce(env_nil('DISTRICTS'), 10))
  customers: int(coalesce(env_nil('CUSTOMERS'), 300))
  orders: int(coalesce(env_nil('ORDERS'), 300))
  stock: int(coalesce(env_nil('STOCK'), 1000))
  items: int(coalesce(env_nil('ITEMS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))
  ol_batch: int(coalesce(env_nil('OL_BATCH'), 100))

up:

  - name: create_warehouse
    type: exec
    query: |-
      {"create": "warehouse"}

  - name: create_district
    type: exec
    query: |-
      {"create": "district"}

  - name: create_customer
    type: exec
    query: |-
      {"create": "customer"}

  - name: create_history
    type: exec
    query: |-
      {"create": "history"}

  - name: create_oorder
    type: exec
    query: |-
      {"create": "oorder"}

  - name: create_new_order
    type: exec
    query: |-
      {"create": "new_order"}

  - name: create_order_line
    type: exec
    query: |-
      {"create": "order_line"}

  - name: create_item
    type: exec
    query: |-
      {"create": "item"}

  - name: create_stock
    type: exec
    query: |-
      {"create": "stock"}

  - name: create_nation
    type: exec
    query: |-
      {"create": "nation"}

  - name: create_region
    type: exec
    query: |-
      {"create": "region"}

  - name: create_supplier
    type: exec
    query: |-
      {"create": "supplier"}

  - name: create_idx_customer_name
    type: exec
    query: |-
      {"createIndexes": "customer", "indexes": [{"key": {"c_w_id": 1, "c_d_id": 1, "c_last": 1, "c_first": 1}, "name": "idx_customer_name"}]}

  - name: create_idx_oorder_customer
    type: exec
    query: |-
      {"createIndexes": "oorder", "indexes": [{"key": {"o_w_id": 1, "o_d_id": 1, "o_c_id": 1, "o_id": -1}, "name": "idx_oorder_customer"}]}

  - name: create_idx_district_pk
    type: exec
    query: |-
      {"createIndexes": "district", "indexes": [{"key": {"d_w_id": 1, "d_id": 1}, "name": "idx_district_pk", "unique": true}]}

  - name: create_idx_new_order_pk
    type: exec
    query: |-
      {"createIndexes": "new_order", "indexes": [{"key": {"no_w_id": 1, "no_d_id": 1, "no_o_id": 1}, "name": "idx_new_order_pk", "unique": true}]}

  - name: create_idx_stock_pk
    type: exec
    query: |-
      {"createIndexes": "stock", "indexes": [{"key": {"s_w_id": 1, "s_i_id": 1}, "name": "idx_stock_pk", "unique": true}]}

  - name: create_idx_order_line_delivery
    type: exec
    query: |-
      {"createIndexes": "order_line", "indexes": [{"key": {"ol_delivery_d": 1}, "name": "idx_order_line_delivery"}]}

  - name: create_idx_oorder_carrier
    type: exec
    query: |-
      {"createIndexes": "oorder", "indexes": [{"key": {"o_carrier_id": 1}, "name": "idx_oorder_carrier"}]}

