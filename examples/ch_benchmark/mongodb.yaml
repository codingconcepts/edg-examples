init:
  - name: fetch_warehouses
    type: query
    query: |-
      {"find": "warehouse", "filter": {}, "projection": {"w_id": 1}}

run_weights:
  # OLTP (80%)
  new_order: 36
  payment: 34
  order_status: 4
  delivery: 4
  stock_level: 2
  # OLAP (20%)
  q1_pricing_summary: 5
  q6_forecasting_revenue: 5
  q11_important_stock: 5
  q12_shipping_modes: 5

run:

  # === OLTP Transactions (TPC-C) ===

  # New-Order transaction (TPC-C 2.4)
  # Atomically increments district next_o_id and returns the new order ID.
  - name: new_order
    type: query
    wait: 18s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
      - nurand_n(8191, 1, items, 5, 15)
    query: |-
      {"findAndModify": "district", "query": {"d_w_id": $1, "d_id": $2}, "update": {"$inc": {"d_next_o_id": 1}}, "new": true}

  # Payment transaction (TPC-C 2.5)
  # Updates customer balance atomically.
  - name: payment
    type: query
    wait: 3s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
      - gen('number:100,500000')
    query: |-
      {"findAndModify": "customer", "query": {"c_w_id": $1, "c_d_id": $2, "c_id": $3}, "update": {"$inc": {"c_balance": $4, "c_ytd_payment": $4, "c_payment_cnt": 1}}, "new": true}

  # Order-Status transaction (TPC-C 2.6)
  # Finds the most recent order for a customer.
  - name: order_status
    type: query
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
    query: |-
      {"find": "oorder", "filter": {"o_w_id": $1, "o_d_id": $2, "o_c_id": $3}, "sort": {"o_id": -1}, "limit": 1}

  # Delivery transaction (TPC-C 2.7)
  # Removes the oldest new_order atomically.
  - name: delivery
    type: exec
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
    query: |-
      {"findAndModify": "new_order", "query": {"no_w_id": $1}, "sort": {"no_d_id": 1, "no_o_id": 1}, "remove": true}

  # Stock-Level transaction (TPC-C 2.8)
  # Counts items with stock below threshold.
  - name: stock_level
    type: query
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - gen('number:10,20')
    query: |-
      {"aggregate": "stock", "pipeline": [{"$match": {"s_w_id": $1, "s_quantity": {"$lt": $3}}}, {"$count": "low_stock"}], "cursor": {}}

  # === OLAP Queries (TPC-H adapted to TPC-C schema) ===

  # CH Q1: Pricing summary on order_line.
  # Heavy aggregation over delivered order lines.
  - name: q1_pricing_summary
    type: query
    query: |-
      {"aggregate": "order_line", "pipeline": [{"$match": {"ol_delivery_d": {"$ne": null}}}, {"$group": {"_id": "$ol_number", "sum_qty": {"$sum": "$ol_quantity"}, "sum_amount": {"$sum": "$ol_amount"}, "avg_qty": {"$avg": "$ol_quantity"}, "avg_amount": {"$avg": "$ol_amount"}, "count_order": {"$sum": 1}}}, {"$sort": {"_id": 1}}], "cursor": {}}

  # CH Q6: Revenue forecast on order_line.
  # Single-collection scan with range predicates.
  - name: q6_forecasting_revenue
    type: query
    query: |-
      {"aggregate": "order_line", "pipeline": [{"$match": {"ol_delivery_d": {"$ne": null}, "ol_quantity": {"$gte": 1, "$lte": 100000}}}, {"$group": {"_id": null, "revenue": {"$sum": "$ol_amount"}}}], "cursor": {}}

  # CH Q11: Important stock - top items by value.
  # Uses $lookup to join stock with supplier for geographic filtering.
  - name: q11_important_stock
    type: query
    args:
      - ref_perm('fetch_warehouses').w_id
    query: |-
      {"aggregate": "stock", "pipeline": [{"$match": {"s_w_id": $1}}, {"$group": {"_id": "$s_i_id", "total_qty": {"$sum": "$s_quantity"}}}, {"$sort": {"total_qty": -1}}, {"$limit": 100}], "cursor": {}}

  # CH Q12: Shipping modes - order urgency by carrier.
  # Aggregates oorder by carrier to measure high/low priority mix.
  - name: q12_shipping_modes
    type: query
    query: |-
