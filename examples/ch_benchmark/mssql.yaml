run_weights:
  # OLTP (80%)
  new_order: 36
  payment: 34
  order_status: 4
  delivery: 4
  stock_level: 2
  # OLAP (20%)
  q1_pricing_summary: 5
  q6_forecasting_revenue: 5
  q11_important_stock: 5
  q12_shipping_modes: 5

run:

  # === OLTP Transactions (TPC-C) ===

  # New-Order transaction (TPC-C 2.4)
  # Atomically increments d_next_o_id and inserts the order.
  - transaction: new_order
    wait: 18s
    locals:
      w_id: ref_perm('fetch_warehouses').w_id
      d_id: gen('number:1,10')
      c_id: nurand(1023, 1, customers / districts)
      ol_cnt: gen('number:5,15')
    queries:
      - name: get_next_o_id
        type: query
        args:
          - local('w_id')
          - local('d_id')
        query: |-
          SELECT d_next_o_id FROM district WITH (UPDLOCK, HOLDLOCK)
          WHERE d_w_id = @p1 AND d_id = @p2

      - name: incr_next_o_id
        type: exec
        args:
          - local('w_id')
          - local('d_id')
        query: |-
          UPDATE district SET d_next_o_id = d_next_o_id + 1
          WHERE d_w_id = @p1 AND d_id = @p2

      - name: insert_oorder
        type: exec
        args:
          - local('w_id')
          - local('d_id')
          - ref_same('get_next_o_id').d_next_o_id
          - local('c_id')
          - local('ol_cnt')
        query: |-
          INSERT INTO oorder (o_w_id, o_d_id, o_id, o_c_id, o_entry_d,
            o_ol_cnt, o_all_local)
          VALUES (@p1, @p2, @p3, @p4, GETDATE(), @p5, 1)

  # Payment transaction (TPC-C 2.5) - Simplified
  - name: payment
    type: exec
    wait: 3s
    args:
      - gen('number:100,500000')
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
    query: |-
      UPDATE c
      SET
        c.c_balance = c.c_balance - p.amount / 100,
        c.c_ytd_payment = c.c_ytd_payment + p.amount / 100,
        c.c_payment_cnt = c.c_payment_cnt + 1
      FROM customer c
      JOIN (SELECT @p1 AS amount, @p2 AS w_id, @p3 AS d_id, @p4 AS c_id) p ON 1=1
      WHERE c.c_w_id = p.w_id AND c.c_d_id = p.d_id AND c.c_id = p.c_id

  # Order-Status transaction (TPC-C 2.6) - Read-only
  - name: order_status
    type: query
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
    query: |-
      SELECT o.o_id, o.o_entry_d, o.o_carrier_id,
        ol.ol_i_id, ol.ol_supply_w_id, ol.ol_quantity,
        ol.ol_amount, ol.ol_delivery_d
      FROM (SELECT @p1 AS w_id, @p2 AS d_id, @p3 AS c_id) p
      JOIN oorder o
        ON o.o_w_id = p.w_id AND o.o_d_id = p.d_id AND o.o_c_id = p.c_id
      JOIN order_line ol
        ON ol.ol_w_id = o.o_w_id AND ol.ol_d_id = o.o_d_id
        AND ol.ol_o_id = o.o_id
      WHERE o.o_id = (
          SELECT MAX(o2.o_id) FROM oorder o2
          WHERE o2.o_w_id = p.w_id AND o2.o_d_id = p.d_id
            AND o2.o_c_id = p.c_id
        )

  # Delivery transaction (TPC-C 2.7) - Simplified
  - name: delivery
    type: exec
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
    query: |-
      DELETE n FROM new_order n
      JOIN (SELECT @p1 AS w_id, @p2 AS d_id) p ON 1=1
      WHERE n.no_w_id = p.w_id AND n.no_d_id = p.d_id
        AND n.no_o_id = (
          SELECT MIN(no_o_id) FROM new_order
          WHERE no_w_id = p.w_id AND no_d_id = p.d_id
        )

  # Stock-Level transaction (TPC-C 2.8) - Read-only
  - name: stock_level
    type: query
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - gen('number:10,20')
    query: |-
      SELECT COUNT(DISTINCT s.s_i_id) AS low_stock
      FROM district d
      JOIN order_line ol
        ON ol.ol_w_id = d.d_w_id AND ol.ol_d_id = d.d_id
        AND ol.ol_o_id BETWEEN d.d_next_o_id - 20 AND d.d_next_o_id - 1
      JOIN stock s
        ON s.s_i_id = ol.ol_i_id AND s.s_w_id = d.d_w_id
      WHERE d.d_w_id = @p1 AND d.d_id = @p2
        AND s.s_quantity < @p3

  # === OLAP Queries (TPC-H adapted to TPC-C schema) ===

  # CH Q1: Pricing summary on order_line.
  # Heavy aggregation over delivered order lines.
  - name: q1_pricing_summary
    type: query
    query: |-
      SELECT
        ol_number,
        SUM(ol_quantity) AS sum_qty,
        SUM(ol_amount) AS sum_amount,
        AVG(CAST(ol_quantity AS DECIMAL(12,2))) AS avg_qty,
        AVG(ol_amount) AS avg_amount,
        COUNT(*) AS count_order
      FROM order_line
      WHERE ol_delivery_d IS NOT NULL
      GROUP BY ol_number
      ORDER BY ol_number

  # CH Q6: Revenue forecast on order_line.
  # Single-table scan with range predicates.
  - name: q6_forecasting_revenue
    type: query
    query: |-
      SELECT SUM(ol_amount) AS revenue
      FROM order_line
      WHERE ol_delivery_d IS NOT NULL
        AND ol_quantity BETWEEN 1 AND 100000

  # CH Q11: Important stock - top items by value.
  # Joins stock with supplier and nation for geographic filtering.
  - name: q11_important_stock
    type: query
    args:
      - ref_perm('fetch_warehouses').w_id
    query: |-
      SELECT s_i_id, SUM(s_quantity) AS total_qty
      FROM stock
      JOIN supplier ON supplier.su_suppkey = stock.s_i_id % 10000 + 1
      JOIN nation ON nation.n_nationkey = supplier.su_nationkey
      WHERE s_w_id = @p1
      GROUP BY s_i_id
      HAVING SUM(s_quantity) > (
        SELECT SUM(s_quantity) * 0.0001
        FROM stock
        WHERE s_w_id = @p1
      )
      ORDER BY total_qty DESC

  # CH Q12: Shipping modes - order urgency by carrier.
  # Aggregates orders by carrier to measure high/low priority mix.
  - name: q12_shipping_modes
    type: query
    query: |-
      SELECT
        o.o_ol_cnt,
        SUM(CASE WHEN o.o_carrier_id BETWEEN 1 AND 5
          THEN 1 ELSE 0 END) AS high_line_count,
        SUM(CASE WHEN o.o_carrier_id > 5 OR o.o_carrier_id IS NULL
          THEN 1 ELSE 0 END) AS low_line_count
      FROM oorder o
      JOIN order_line ol
        ON o.o_w_id = ol.ol_w_id AND o.o_d_id = ol.ol_d_id
        AND o.o_id = ol.ol_o_id
      WHERE ol.ol_delivery_d IS NOT NULL
      GROUP BY o.o_ol_cnt
      ORDER BY o.o_ol_cnt


expectations:
  - error_rate < 1
