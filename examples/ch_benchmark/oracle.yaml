init:
  - name: fetch_warehouses
    type: query
    query: SELECT w_id FROM warehouse

run_weights:
  # OLTP (80%)
  new_order: 36
  payment: 34
  order_status: 4
  delivery: 4
  stock_level: 2
  # OLAP (20%)
  q1_pricing_summary: 5
  q6_forecasting_revenue: 5
  q11_important_stock: 5
  q12_shipping_modes: 5

run:

  # === OLTP Transactions (TPC-C) ===

  # New-Order transaction (TPC-C 2.4)
  # Uses PL/SQL block since Oracle does not support writable CTEs.
  - name: new_order
    type: exec
    wait: 18s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
      - nurand_n(8191, 1, items, 5, 15)
    query: |-
      DECLARE
        v_w_id NUMBER(10) := :1;
        v_d_id NUMBER(10) := :2;
        v_c_id NUMBER(10) := :3;
        v_item_ids VARCHAR2(200) := :4;
        v_next_o_id NUMBER(10);
        v_d_tax NUMBER(4,4);
        v_w_tax NUMBER(4,4);
        v_c_discount NUMBER(4,4);
        v_c_last VARCHAR2(16);
        v_c_credit CHAR(2);
        v_i_id NUMBER(10);
        v_i_price NUMBER(5,2);
        v_qty NUMBER(10);
        v_s_quantity NUMBER(10);
        v_ol_dist_info CHAR(24);
        v_ol_cnt NUMBER(10);
        v_ol_number NUMBER(10) := 0;
      BEGIN
        UPDATE district SET d_next_o_id = d_next_o_id + 1
        WHERE d_w_id = v_w_id AND d_id = v_d_id
        RETURNING d_tax, d_next_o_id - 1 INTO v_d_tax, v_next_o_id;

        SELECT w_tax INTO v_w_tax
        FROM warehouse WHERE w_id = v_w_id;

        SELECT c_discount, c_last, c_credit
        INTO v_c_discount, v_c_last, v_c_credit
        FROM customer
        WHERE c_w_id = v_w_id AND c_d_id = v_d_id AND c_id = v_c_id;

        v_ol_cnt := REGEXP_COUNT(v_item_ids, ',') + 1;

        INSERT INTO new_order (no_w_id, no_d_id, no_o_id)
        VALUES (v_w_id, v_d_id, v_next_o_id);

        INSERT INTO oorder (o_w_id, o_d_id, o_id, o_c_id, o_entry_d,
          o_ol_cnt, o_all_local)
        VALUES (v_w_id, v_d_id, v_next_o_id, v_c_id, SYSTIMESTAMP,
          v_ol_cnt, 1);

        FOR rec IN (
          SELECT TO_NUMBER(REGEXP_SUBSTR(v_item_ids, '[^,]+', 1, LEVEL)) AS i_id,
            LEVEL AS ol_number
          FROM DUAL
          CONNECT BY LEVEL <= v_ol_cnt
        ) LOOP
          v_ol_number := rec.ol_number;
          v_i_id := rec.i_id;
          v_qty := TRUNC(DBMS_RANDOM.VALUE * 10) + 1;

          UPDATE stock SET
            s_quantity = CASE
              WHEN s_quantity >= v_qty + 10 THEN s_quantity - v_qty
              ELSE s_quantity - v_qty + 91
            END,
            s_ytd = s_ytd + v_qty,
            s_order_cnt = s_order_cnt + 1
          WHERE s_i_id = v_i_id AND s_w_id = v_w_id
          RETURNING s_quantity, s_dist_01 INTO v_s_quantity, v_ol_dist_info;

          SELECT i_price INTO v_i_price
          FROM item WHERE i_id = v_i_id;

          INSERT INTO order_line (ol_w_id, ol_d_id, ol_o_id, ol_number,
            ol_i_id, ol_supply_w_id, ol_quantity, ol_amount, ol_dist_info)
          VALUES (v_w_id, v_d_id, v_next_o_id, v_ol_number, v_i_id,
            v_w_id, v_qty, v_qty * v_i_price, v_ol_dist_info);
        END LOOP;
      END;

  # Payment transaction (TPC-C 2.5)
  - name: payment
    type: exec
    wait: 3s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
      - gen('number:100,500000')
    query: |-
      DECLARE
        v_w_id NUMBER(10) := :1;
        v_d_id NUMBER(10) := :2;
        v_c_id NUMBER(10) := :3;
        v_h_amount NUMBER(6,2) := :4 / 100;
        v_c_w_id NUMBER(10);
        v_w_name VARCHAR2(10);
        v_d_name VARCHAR2(10);
        v_c_first VARCHAR2(16);
        v_c_middle CHAR(2);
        v_c_last VARCHAR2(16);
        v_c_balance NUMBER(12,2);
      BEGIN
        IF DBMS_RANDOM.VALUE < 0.85 THEN
          v_c_w_id := v_w_id;
        ELSE
          BEGIN
            SELECT w_id INTO v_c_w_id
            FROM (SELECT w_id FROM warehouse WHERE w_id != v_w_id
                  ORDER BY DBMS_RANDOM.VALUE)
            WHERE ROWNUM = 1;
          EXCEPTION WHEN NO_DATA_FOUND THEN
            v_c_w_id := v_w_id;
          END;
        END IF;

        UPDATE warehouse SET w_ytd = w_ytd + v_h_amount
        WHERE w_id = v_w_id
        RETURNING w_name INTO v_w_name;

        UPDATE district SET d_ytd = d_ytd + v_h_amount
        WHERE d_w_id = v_w_id AND d_id = v_d_id
        RETURNING d_name INTO v_d_name;

        UPDATE customer SET
          c_balance = c_balance - v_h_amount,
          c_ytd_payment = c_ytd_payment + v_h_amount,
          c_payment_cnt = c_payment_cnt + 1
        WHERE c_w_id = v_c_w_id AND c_d_id = v_d_id AND c_id = v_c_id
        RETURNING c_first, c_middle, c_last, c_balance
        INTO v_c_first, v_c_middle, v_c_last, v_c_balance;

        INSERT INTO history (h_c_id, h_c_d_id, h_c_w_id, h_d_id, h_w_id,
          h_date, h_amount, h_data)
        VALUES (v_c_id, v_d_id, v_c_w_id, v_d_id, v_w_id, SYSTIMESTAMP,
          v_h_amount, v_w_name || '    ' || v_d_name);
      END;

  # Order-Status transaction (TPC-C 2.6)
  - name: order_status
    type: query
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
    query: |-
      WITH params AS (
        SELECT :1 AS p_w_id, :2 AS p_d_id, :3 AS p_c_id FROM DUAL
      )
      SELECT o.o_id, o.o_entry_d, o.o_carrier_id,
        ol.ol_i_id, ol.ol_supply_w_id, ol.ol_quantity,
        ol.ol_amount, ol.ol_delivery_d
      FROM params p
      CROSS JOIN oorder o
      JOIN order_line ol
        ON ol.ol_w_id = o.o_w_id AND ol.ol_d_id = o.o_d_id
        AND ol.ol_o_id = o.o_id
      WHERE o.o_w_id = p.p_w_id AND o.o_d_id = p.p_d_id
        AND o.o_c_id = CASE WHEN DBMS_RANDOM.VALUE < 0.6
          THEN (
            SELECT c_id FROM (
              SELECT c_id,
                ROW_NUMBER() OVER (ORDER BY c_first) AS rn,
                CEIL(COUNT(*) OVER () / 2) AS mid
              FROM customer
              WHERE c_w_id = p.p_w_id AND c_d_id = p.p_d_id
                AND c_last = (
                  SELECT c_last FROM customer
                  WHERE c_w_id = p.p_w_id AND c_d_id = p.p_d_id
                    AND c_id = p.p_c_id
                )
            ) WHERE rn = mid
          )
          ELSE p.p_c_id
        END
      ORDER BY o.o_id DESC
      FETCH FIRST 15 ROWS ONLY

  # Delivery transaction (TPC-C 2.7)
  - name: delivery
    type: exec
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
    query: |-
      DECLARE
        v_w_id NUMBER(10) := :1;
        v_carrier_id NUMBER(10) := :2;
      BEGIN
        FOR rec IN (
          SELECT no_o_id, no_d_id
          FROM (
            SELECT no_o_id, no_d_id,
              ROW_NUMBER() OVER (PARTITION BY no_d_id ORDER BY no_o_id) AS rn
            FROM new_order
            WHERE no_w_id = v_w_id
          )
          WHERE rn = 1
        ) LOOP
          DELETE FROM new_order
          WHERE no_w_id = v_w_id AND no_d_id = rec.no_d_id
            AND no_o_id = rec.no_o_id;

          UPDATE oorder SET o_carrier_id = v_carrier_id
          WHERE o_w_id = v_w_id AND o_d_id = rec.no_d_id
            AND o_id = rec.no_o_id;

          UPDATE order_line SET ol_delivery_d = SYSTIMESTAMP
          WHERE ol_w_id = v_w_id AND ol_d_id = rec.no_d_id
            AND ol_o_id = rec.no_o_id;

          UPDATE customer SET
            c_balance = c_balance + (
              SELECT COALESCE(SUM(ol_amount), 0)
              FROM order_line
              WHERE ol_w_id = v_w_id AND ol_d_id = rec.no_d_id
                AND ol_o_id = rec.no_o_id
            ),
            c_delivery_cnt = c_delivery_cnt + 1
          WHERE c_w_id = v_w_id AND c_d_id = rec.no_d_id
            AND c_id = (
              SELECT o_c_id FROM oorder
              WHERE o_w_id = v_w_id AND o_d_id = rec.no_d_id
                AND o_id = rec.no_o_id
            );
        END LOOP;
      END;

  # Stock-Level transaction (TPC-C 2.8)
  - name: stock_level
    type: query
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - gen('number:10,20')
    query: |-
      SELECT COUNT(DISTINCT s.s_i_id) AS low_stock
      FROM district d
      JOIN order_line ol
        ON ol.ol_w_id = d.d_w_id AND ol.ol_d_id = d.d_id
        AND ol.ol_o_id BETWEEN d.d_next_o_id - 20 AND d.d_next_o_id - 1
      JOIN stock s
        ON s.s_i_id = ol.ol_i_id AND s.s_w_id = d.d_w_id
      WHERE d.d_w_id = :1 AND d.d_id = :2
        AND s.s_quantity < :3

  # === OLAP Queries (TPC-H adapted to TPC-C schema) ===

  # CH Q1: Pricing summary on order_line.
  # Heavy aggregation over delivered order lines.
  - name: q1_pricing_summary
    type: query
    query: |-
      SELECT
        ol_number,
        SUM(ol_quantity) AS sum_qty,
        SUM(ol_amount) AS sum_amount,
        AVG(ol_quantity) AS avg_qty,
        AVG(ol_amount) AS avg_amount,
        COUNT(*) AS count_order
      FROM order_line
      WHERE ol_delivery_d IS NOT NULL
      GROUP BY ol_number
      ORDER BY ol_number

  # CH Q6: Revenue forecast on order_line.
  # Single-table scan with range predicates.
  - name: q6_forecasting_revenue
    type: query
    query: |-
      SELECT SUM(ol_amount) AS revenue
      FROM order_line
      WHERE ol_delivery_d IS NOT NULL
        AND ol_quantity BETWEEN 1 AND 100000

  # CH Q11: Important stock - top items by value.
  # Joins stock with supplier and nation for geographic filtering.
  - name: q11_important_stock
    type: query
    args:
      - ref_perm('fetch_warehouses').w_id
    query: |-
      SELECT s_i_id, SUM(s_quantity) AS total_qty
      FROM stock
      JOIN supplier ON supplier.su_suppkey = MOD(stock.s_i_id, 10000) + 1
      JOIN nation ON nation.n_nationkey = supplier.su_nationkey
      WHERE s_w_id = :1
      GROUP BY s_i_id
      HAVING SUM(s_quantity) > (
        SELECT SUM(s_quantity) * 0.0001
        FROM stock
        WHERE s_w_id = :1
      )
      ORDER BY total_qty DESC

  # CH Q12: Shipping modes - order urgency by carrier.
  # Aggregates orders by carrier to measure high/low priority mix.
  - name: q12_shipping_modes
    type: query
    query: |-
      SELECT
        o.o_ol_cnt,
        SUM(CASE WHEN o.o_carrier_id BETWEEN 1 AND 5
          THEN 1 ELSE 0 END) AS high_line_count,
        SUM(CASE WHEN o.o_carrier_id > 5 OR o.o_carrier_id IS NULL
          THEN 1 ELSE 0 END) AS low_line_count
      FROM oorder o
      JOIN order_line ol
        ON o.o_w_id = ol.ol_w_id AND o.o_d_id = ol.ol_d_id
        AND o.o_id = ol.ol_o_id
      WHERE ol.ol_delivery_d IS NOT NULL
      GROUP BY o.o_ol_cnt
      ORDER BY o.o_ol_cnt


expectations:
  - error_rate < 1
