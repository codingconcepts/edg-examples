# Sysbench oltp_point_select Workload for MySQL
# ===============================================
# Pure point-select micro-benchmark. Every operation is a single
# primary-key lookup. Useful for measuring read latency floor and
# connection overhead.
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true
#
# Example:
#   edg up --driver mysql --config mysql.yaml \
#     --url "root:password@tcp(localhost:3306)/defaultdb?parseTime=true"

globals:
  records: int(coalesce(env_nil('RECORDS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_sbtest1
    query: |-
      CREATE TABLE IF NOT EXISTS sbtest1 (
        id INT NOT NULL PRIMARY KEY,
        k INT NOT NULL DEFAULT 0,
        c CHAR(120) NOT NULL DEFAULT '',
        pad CHAR(60) NOT NULL DEFAULT ''
      )

  - name: create_idx_k
    query: |-
      CREATE INDEX k_1 ON sbtest1(k)

seed:

  - name: populate_sbtest1
    type: exec_batch
    count: records
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      INSERT INTO sbtest1 (id, k, c, pad)
      VALUES ($1, $2, $3, $4)

deseed:

  - name: delete_sbtest1
    type: exec
    query: DELETE FROM sbtest1

down:

  - name: drop_sbtest1
    type: exec
    query: DROP TABLE IF EXISTS sbtest1

run:

  - name: point_select
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT c FROM sbtest1 WHERE id = ?


expectations:
  - error_rate < 1
