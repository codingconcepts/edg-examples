# Sysbench oltp_point_select Workload (Cassandra)
# =================================================
# Pure point-select micro-benchmark. Every operation is a single
# primary-key lookup. Useful for measuring read latency floor and
# connection overhead.
#
# Schema matches standard sysbench sbtest1 table.

globals:
  records: int(coalesce(env_nil('RECORDS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_keyspace
    type: exec
    query: |-
      CREATE KEYSPACE IF NOT EXISTS edg
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1}

  - name: create_sbtest1
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.sbtest1 (
        id INT PRIMARY KEY,
        k INT,
        c TEXT,
        pad TEXT
      )

  - name: create_idx_k
    type: exec
    query: |-
      CREATE INDEX IF NOT EXISTS k_1 ON edg.sbtest1(k)

seed:

  - name: populate_sbtest1
    type: exec_batch
    count: records
    size: 50
    args:
      - seq(1, 1)
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      INSERT INTO edg.sbtest1 (id, k, c, pad) VALUES ($1, $2, $3, $4)

deseed:

  - name: truncate_sbtest1
    type: exec
    query: TRUNCATE edg.sbtest1

down:

  - name: drop_sbtest1
    type: exec
    query: DROP TABLE IF EXISTS edg.sbtest1

  - name: drop_keyspace
    type: exec
    query: DROP KEYSPACE IF EXISTS edg

run:

  - name: point_select
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT c FROM edg.sbtest1 WHERE id = $1


expectations:
  - error_rate < 1
