# Batch types workload for SQL Server
#
# SQL Server does not support INSERT...RETURNING, so query_batch is
# replaced with exec_batch + a follow-up query to fetch the
# inserted rows for use by ref_* functions.
#
# Connection URL format:
#   sqlserver://user:password@host:port?database=database&encrypt=disable

globals:
  products: 20
  reviews: 50

up:

  - name: create_product
    type: exec
    query: |-
      IF OBJECT_ID('product', 'U') IS NULL
      CREATE TABLE product (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        name NVARCHAR(255) NOT NULL
      )

  - name: create_review
    type: exec
    query: |-
      IF OBJECT_ID('review', 'U') IS NULL
      CREATE TABLE review (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        product_id UNIQUEIDENTIFIER NOT NULL,
        rating INT NOT NULL,
        body NVARCHAR(MAX) NOT NULL,
        FOREIGN KEY (product_id) REFERENCES product(id)
      )

seed:

  - name: insert_products
    type: exec_batch
    count: products
    args:
      - gen('productname')
    query: |-
      INSERT INTO product (name)
      __values__

  - name: fetch_products
    type: query
    query: SELECT id, name FROM product

  - name: insert_reviews
    type: exec_batch
    count: reviews
    size: 10
    args:
      - ref_rand('fetch_products').id
      - norm(4, 1, 1, 5)
      - gen('loremipsumsentence:5')
    query: |-
      INSERT INTO review (product_id, rating, body)
      __values__

deseed:

  - name: delete_review
    type: exec
    query: DELETE FROM review

  - name: delete_product
    type: exec
    query: DELETE FROM product

down:

  - name: drop_review
    type: exec
    query: DROP TABLE IF EXISTS review

  - name: drop_product
    type: exec
    query: DROP TABLE IF EXISTS product
