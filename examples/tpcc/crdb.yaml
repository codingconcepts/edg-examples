init:
  - name: fetch_warehouses
    type: query
    query: SELECT w_id FROM warehouse

run_weights:
  new_order: 45
  payment: 43
  order_status: 4
  delivery: 4
  stock_level: 4

run:

  # New-Order transaction (TPC-C 2.4)
  # 5-15 order lines per transaction; all items local.
  # Args: w_id, d_id, c_id, item_ids (comma-separated)
  - name: new_order
    type: query
    wait: 18s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
      - nurand_n(8191, 1, items, 5, 15)
    query: |-
      WITH
        items AS (
          SELECT v::INT AS i_id, ordinality AS ol_number,
            (floor(random()::FLOAT8 * 10) + 1)::INT AS qty
          FROM unnest(string_to_array($4, ','))
            WITH ORDINALITY AS t(v, ordinality)
        ),
        district_update AS (
          UPDATE district SET d_next_o_id = d_next_o_id + 1
          WHERE d_w_id = $1::INT AND d_id = $2::INT
          RETURNING d_tax, d_next_o_id - 1 AS next_o_id
        ),
        warehouse_info AS (
          SELECT w_tax FROM warehouse WHERE w_id = $1::INT
        ),
        customer_info AS (
          SELECT c_discount, c_last, c_credit
          FROM customer
          WHERE c_w_id = $1::INT AND c_d_id = $2::INT AND c_id = $3::INT
        ),
        new_order_insert AS (
          INSERT INTO new_order (no_w_id, no_d_id, no_o_id)
          SELECT $1::INT, $2::INT, du.next_o_id
          FROM district_update du
          RETURNING 1
        ),
        order_insert AS (
          INSERT INTO oorder (o_w_id, o_d_id, o_id, o_c_id, o_entry_d, o_ol_cnt, o_all_local)
          SELECT $1::INT, $2::INT, du.next_o_id, $3::INT, now(),
            (SELECT count(*) FROM items), 1
          FROM district_update du
          RETURNING 1
        ),
        stock_update AS (
          UPDATE stock SET
            s_quantity = CASE
              WHEN s_quantity >= it.qty + 10 THEN s_quantity - it.qty
              ELSE s_quantity - it.qty + 91
            END,
            s_ytd = s_ytd + it.qty,
            s_order_cnt = s_order_cnt + 1
          FROM items it
          WHERE s_i_id = it.i_id AND s_w_id = $1::INT
          RETURNING s_i_id, s_quantity,
            CASE $2::INT
              WHEN 1 THEN s_dist_01 WHEN 2 THEN s_dist_02
              WHEN 3 THEN s_dist_03 WHEN 4 THEN s_dist_04
              WHEN 5 THEN s_dist_05 WHEN 6 THEN s_dist_06
              WHEN 7 THEN s_dist_07 WHEN 8 THEN s_dist_08
              WHEN 9 THEN s_dist_09 WHEN 10 THEN s_dist_10
            END AS ol_dist_info,
            it.qty, it.ol_number
        ),
        order_line_insert AS (
          INSERT INTO order_line (ol_w_id, ol_d_id, ol_o_id, ol_number,
            ol_i_id, ol_supply_w_id, ol_quantity, ol_amount, ol_dist_info)
          SELECT $1::INT, $2::INT, du.next_o_id, su.ol_number, su.s_i_id,
            $1::INT, su.qty, su.qty * i.i_price, su.ol_dist_info
          FROM district_update du
          CROSS JOIN stock_update su
          JOIN item i ON i.i_id = su.s_i_id
          RETURNING 1
        )
      SELECT du.next_o_id AS o_id, wi.w_tax, du.d_tax,
        ci.c_discount, ci.c_last
      FROM district_update du, warehouse_info wi, customer_info ci

  # Payment transaction (TPC-C 2.5)
  # 85% home-warehouse, 15% remote-warehouse payments.
  # 60% customer by last-name (midpoint), 40% by customer ID.
  # Updates c_data for bad-credit (BC) customers.
  # Args: w_id, d_id, c_id, amount_cents
  - name: payment
    type: query
    wait: 3s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
      - gen('number:100,500000')
    query: |-
      WITH
        remote AS (
          SELECT CASE
            WHEN random()::FLOAT8 < 0.85
              THEN $1::INT
            ELSE COALESCE(
              (SELECT w_id FROM warehouse WHERE w_id != $1::INT
               ORDER BY random()::FLOAT8 LIMIT 1),
              $1::INT
            )
          END AS c_w_id
        ),
        customer_resolve AS (
          SELECT c_id FROM (
            SELECT c_id,
              ROW_NUMBER() OVER (ORDER BY c_first) AS rn,
              CEIL(COUNT(*) OVER ()::FLOAT8 / 2) AS mid
            FROM customer
            WHERE c_w_id = (SELECT c_w_id FROM remote)
              AND c_d_id = $2::INT
              AND c_last = (
                SELECT c_last FROM customer
                WHERE c_w_id = (SELECT c_w_id FROM remote)
                  AND c_d_id = $2::INT AND c_id = $3::INT
              )
          ) sub
          WHERE rn = mid
        ),
        target_customer AS (
          SELECT CASE WHEN random()::FLOAT8 < 0.6
            THEN (SELECT c_id FROM customer_resolve)
            ELSE $3::INT
          END AS c_id
        ),
        warehouse_update AS (
          UPDATE warehouse SET w_ytd = w_ytd + $4::DECIMAL / 100
          WHERE w_id = $1::INT
          RETURNING w_name, w_street_1, w_street_2, w_city, w_state, w_zip
        ),
        district_update AS (
          UPDATE district SET d_ytd = d_ytd + $4::DECIMAL / 100
          WHERE d_w_id = $1::INT AND d_id = $2::INT
          RETURNING d_name, d_street_1, d_street_2, d_city, d_state, d_zip
        ),
        customer_update AS (
          UPDATE customer SET
            c_balance = c_balance - $4::DECIMAL / 100,
            c_ytd_payment = c_ytd_payment + $4::DECIMAL / 100,
            c_payment_cnt = c_payment_cnt + 1,
            c_data = CASE WHEN c_credit = 'BC'
              THEN LEFT(
                (SELECT c_id FROM target_customer)::TEXT || ' ' ||
                $2::TEXT || ' ' ||
                (SELECT c_w_id FROM remote)::TEXT || ' ' ||
                $2::TEXT || ' ' ||
                $1::TEXT || ' ' ||
                ($4::DECIMAL / 100)::TEXT || ' | ' || c_data,
                500)
              ELSE c_data
            END
          WHERE c_w_id = (SELECT c_w_id FROM remote)
            AND c_d_id = $2::INT
            AND c_id = (SELECT c_id FROM target_customer)
          RETURNING c_first, c_middle, c_last, c_balance, c_w_id
        ),
        history_insert AS (
          INSERT INTO history (h_c_id, h_c_d_id, h_c_w_id, h_d_id, h_w_id,
            h_date, h_amount, h_data)
          SELECT (SELECT c_id FROM target_customer), $2::INT, cu.c_w_id,
            $2::INT, $1::INT, now(), $4::DECIMAL / 100,
            wu.w_name || '    ' || du.d_name
          FROM warehouse_update wu, district_update du, customer_update cu
          RETURNING 1
        )
      SELECT cu.c_first, cu.c_middle, cu.c_last, cu.c_balance
      FROM customer_update cu

  # Order-Status transaction (TPC-C 2.6)
  # 60% by last-name (midpoint), 40% by customer ID.
  # Args: w_id, d_id, c_id
  - name: order_status
    type: query
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - nurand(1023, 1, customers / districts)
    query: |-
      WITH
        target_customer AS (
          SELECT CASE WHEN random()::FLOAT8 < 0.6
            THEN (
              SELECT c_id FROM (
                SELECT c_id,
                  ROW_NUMBER() OVER (ORDER BY c_first) AS rn,
                  COUNT(*) OVER () AS cnt
                FROM customer
                WHERE c_w_id = $1::INT AND c_d_id = $2::INT
                  AND c_last = (
                    SELECT c_last FROM customer
                    WHERE c_w_id = $1::INT AND c_d_id = $2::INT
                      AND c_id = $3::INT
                  )
              ) sub WHERE rn = CEIL(cnt::FLOAT8 / 2)
            )
            ELSE $3::INT
          END AS c_id
        ),
        latest_order AS (
          SELECT o_id, o_entry_d, o_carrier_id
          FROM oorder
          WHERE o_w_id = $1::INT AND o_d_id = $2::INT
            AND o_c_id = (SELECT c_id FROM target_customer)
          ORDER BY o_id DESC
          LIMIT 1
        )
      SELECT lo.o_id, lo.o_entry_d, lo.o_carrier_id,
        ol.ol_i_id, ol.ol_supply_w_id, ol.ol_quantity,
        ol.ol_amount, ol.ol_delivery_d
      FROM latest_order lo
      JOIN order_line ol
        ON ol.ol_w_id = $1::INT AND ol.ol_d_id = $2::INT
        AND ol.ol_o_id = lo.o_id

  # Delivery transaction (TPC-C 2.7)
  # Processes the oldest new_order in all 10 districts atomically.
  # Args: w_id, carrier_id
  - name: delivery
    type: exec
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
    query: |-
      WITH
        oldest AS (
          SELECT DISTINCT ON (no_d_id) no_o_id, no_d_id, no_w_id
          FROM new_order
          WHERE no_w_id = $1::INT
          ORDER BY no_d_id, no_o_id
        ),
        del_no AS (
          DELETE FROM new_order
          USING oldest o
          WHERE new_order.no_w_id = o.no_w_id
            AND new_order.no_d_id = o.no_d_id
            AND new_order.no_o_id = o.no_o_id
          RETURNING new_order.no_o_id, new_order.no_d_id, new_order.no_w_id
        ),
        upd_order AS (
          UPDATE oorder SET o_carrier_id = $2::INT
          FROM del_no d
          WHERE oorder.o_w_id = d.no_w_id
            AND oorder.o_d_id = d.no_d_id
            AND oorder.o_id = d.no_o_id
          RETURNING oorder.o_id, oorder.o_d_id, oorder.o_w_id, oorder.o_c_id
        ),
        upd_ol AS (
          UPDATE order_line SET ol_delivery_d = now()
          FROM upd_order u
          WHERE order_line.ol_w_id = u.o_w_id
            AND order_line.ol_d_id = u.o_d_id
            AND order_line.ol_o_id = u.o_id
          RETURNING order_line.ol_amount, order_line.ol_w_id,
            order_line.ol_d_id, order_line.ol_o_id
        ),
        totals AS (
          SELECT u.o_c_id, u.o_w_id, u.o_d_id,
            COALESCE(SUM(ol.ol_amount), 0) AS total
          FROM upd_order u
          LEFT JOIN upd_ol ol
            ON ol.ol_w_id = u.o_w_id AND ol.ol_d_id = u.o_d_id
            AND ol.ol_o_id = u.o_id
          GROUP BY u.o_c_id, u.o_w_id, u.o_d_id
        )
      UPDATE customer SET
        c_balance = c_balance + t.total,
        c_delivery_cnt = c_delivery_cnt + 1
      FROM totals t
      WHERE customer.c_w_id = t.o_w_id
        AND customer.c_d_id = t.o_d_id
        AND customer.c_id = t.o_c_id

  # Stock-Level transaction (TPC-C 2.8)
  # Counts recently-ordered items with stock below threshold.
  # Args: w_id, d_id, threshold
  - name: stock_level
    type: query
    wait: 2s
    args:
      - ref_perm('fetch_warehouses').w_id
      - gen('number:1,10')
      - gen('number:10,20')
    query: |-
      SELECT COUNT(DISTINCT s.s_i_id) AS low_stock
      FROM district d
      JOIN order_line ol
        ON ol.ol_w_id = d.d_w_id AND ol.ol_d_id = d.d_id
        AND ol.ol_o_id BETWEEN d.d_next_o_id - 20 AND d.d_next_o_id - 1
      JOIN stock s
        ON s.s_i_id = ol.ol_i_id AND s.s_w_id = d.d_w_id
      WHERE d.d_w_id = $1::INT AND d.d_id = $2::INT
        AND s.s_quantity < $3::INT
