# Sysbench oltp_insert Workload (Cassandra)
# ==========================================
# Pure insert micro-benchmark. Every operation inserts a new row
# with a unique key. Useful for measuring ingestion throughput,
# index build cost, and storage engine write path.
#
# Schema matches standard sysbench sbtest1 table.

globals:
  records: int(coalesce(env_nil('RECORDS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_keyspace
    type: exec
    query: |-
      CREATE KEYSPACE IF NOT EXISTS edg
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1}

  - name: create_sbtest1
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.sbtest1 (
        id INT PRIMARY KEY,
        k INT,
        c TEXT,
        pad TEXT
      )

  - name: create_idx_k
    type: exec
    query: |-
      CREATE INDEX IF NOT EXISTS k_1 ON edg.sbtest1(k)

seed:

  - name: populate_sbtest1
    type: exec_batch
    count: records
    size: 50
    args:
      - seq(1, 1)
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      INSERT INTO edg.sbtest1 (id, k, c, pad) VALUES ($1, $2, $3, $4)

deseed:

  - name: truncate_sbtest1
    type: exec
    query: TRUNCATE edg.sbtest1

down:

  - name: drop_sbtest1
    type: exec
    query: DROP TABLE IF EXISTS edg.sbtest1

  - name: drop_keyspace
    type: exec
    query: DROP KEYSPACE IF EXISTS edg

run:

  # Insert with large random key to avoid conflicts under concurrency.
  # Cassandra INSERT is an upsert by default, so no ON CONFLICT needed.
  - name: insert
    type: exec
    args:
      - gen('number:1,2147483647')
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      INSERT INTO edg.sbtest1 (id, k, c, pad) VALUES ($1, $2, $3, $4)


expectations:
  - error_rate < 1
