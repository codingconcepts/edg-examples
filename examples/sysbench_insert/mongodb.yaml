# Sysbench oltp_insert Workload (MongoDB)
# ========================================
# Pure insert micro-benchmark. Every operation inserts a new row
# with a unique key. Useful for measuring ingestion throughput,
# index build cost, and storage engine write path.
#
# Schema matches standard sysbench sbtest1 collection.

globals:
  records: int(coalesce(env_nil('RECORDS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_sbtest1
    type: exec
    query: |-
      {"create": "sbtest1"}

seed:

  - name: populate_sbtest1
    type: exec_batch
    count: records
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      {"insert": "sbtest1", "documents": [{"_id": $1, "k": $2, "c": "$3", "pad": "$4"}]}

deseed:

  - name: delete_sbtest1
    type: exec
    query: |-
      {"delete": "sbtest1", "deletes": [{"q": {}, "limit": 0}]}

down:

  - name: drop_sbtest1
    type: exec
    query: |-
      {"drop": "sbtest1"}

run:

  # Insert with large random key to avoid conflicts under concurrency.
  - name: insert
    type: exec
    args:
      - gen('number:1,2147483647')
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      {"insert": "sbtest1", "documents": [{"_id": $1, "k": $2, "c": "$3", "pad": "$4"}]}


expectations:
  - error_rate < 1
