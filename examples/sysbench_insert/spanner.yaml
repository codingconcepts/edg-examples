# Sysbench oltp_insert Workload for Google Cloud Spanner
# ========================================================
# Pure insert micro-benchmark. Every operation inserts a new row
# with a unique key. Useful for measuring ingestion throughput,
# index build cost, and storage engine write path.
#
# Connection URL format:
#   projects/PROJECT/instances/INSTANCE/databases/DATABASE

globals:
  records: int(coalesce(env_nil('RECORDS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_sbtest1
    query: |-
      CREATE TABLE IF NOT EXISTS sbtest1 (
        id INT64 NOT NULL,
        k INT64 NOT NULL DEFAULT (0),
        c STRING(120) NOT NULL DEFAULT (''),
        pad STRING(60) NOT NULL DEFAULT ('')
      ) PRIMARY KEY (id)

  - name: create_idx_k
    query: |-
      CREATE INDEX IF NOT EXISTS k_1 ON sbtest1(k)

seed:

  - name: populate_sbtest1
    type: exec_batch
    count: records
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      INSERT INTO sbtest1 (id, k, c, pad)
      VALUES ($1, $2, $3, $4)

deseed:

  - name: delete_sbtest1
    type: exec
    query: DELETE FROM sbtest1 WHERE TRUE

down:

  - name: drop_sbtest1
    type: exec
    query: DROP TABLE IF EXISTS sbtest1

run:

  # Insert with large random key to avoid conflicts under concurrency.
  - name: insert
    type: exec
    args:
      - gen('number:1,2147483647')
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      INSERT OR IGNORE INTO sbtest1 (id, k, c, pad)
      VALUES ($1, $2, $3, $4)


expectations:
  - error_rate < 1
