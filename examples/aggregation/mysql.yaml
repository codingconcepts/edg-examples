# Aggregation workload for MySQL
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  products: 500
  batch_size: 100

up:

  - name: create_product
    query: |-
      CREATE TABLE IF NOT EXISTS product (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        category VARCHAR(50) NOT NULL,
        price DECIMAL(10,2) NOT NULL,
        stock_qty INT NOT NULL
      )

  - name: create_agg_snapshot
    query: |-
      CREATE TABLE IF NOT EXISTS agg_snapshot (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        total_products INT NOT NULL,
        total_value DECIMAL(12,2) NOT NULL,
        avg_price DECIMAL(10,2) NOT NULL,
        min_price DECIMAL(10,2) NOT NULL,
        max_price DECIMAL(10,2) NOT NULL,
        distinct_categories INT NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
      )

seed:

  - name: populate_product
    args:
      - products
    query: |-
      INSERT INTO product (category, price, stock_qty)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      SELECT
        ELT(FLOOR(RAND() * 5 + 1), 'electronics', 'clothing', 'books', 'food', 'toys'),
        CAST(RAND() * 499 + 1 AS DECIMAL(10,2)),
        FLOOR(RAND() * 200 + 1)
      FROM seq

deseed:

  - name: delete_agg_snapshot
    type: exec
    query: DELETE FROM agg_snapshot

  - name: delete_product
    type: exec
    query: DELETE FROM product

down:

  - name: drop_agg_snapshot
    type: exec
    query: DROP TABLE IF EXISTS agg_snapshot

  - name: drop_product
    type: exec
    query: DROP TABLE IF EXISTS product

run:

  - name: fetch_products
    type: query
    args:
      - gen('number:1,10')
    query: |-
      SELECT id, category, price, stock_qty
      FROM product
      ORDER BY RAND()
      LIMIT ?

  - name: record_snapshot
    type: exec
    args:
      - count('fetch_products')
      - sum('fetch_products', 'price')
      - avg('fetch_products', 'price')
      - min('fetch_products', 'price')
      - max('fetch_products', 'price')
      - distinct('fetch_products', 'category')
    query: |-
      INSERT INTO agg_snapshot (total_products, total_value, avg_price, min_price, max_price, distinct_categories)
      VALUES (?, ?, ?, ?, ?, ?)
