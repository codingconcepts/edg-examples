globals:
  num_customers: 10000
  batch_size: 1000

up:

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name STRING NOT NULL
      )

  - name: create_account
    query: |-
      CREATE TABLE IF NOT EXISTS account (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        balance DECIMAL NOT NULL,
        customer_id UUID NOT NULL REFERENCES customer(id)
      )

seed:

  - name: populate_customer
    type: exec_batch
    count: num_customers
    size: batch_size
    args:
      - gen('name')
    query: |-
      INSERT INTO customer (name)
      __values__

  # Uses ref_cursor to page through all customers without loading
  # them all into memory. Each page of 1000 rows becomes one
  # multi-row INSERT via __values__.
  - name: populate_account
    args:
      - uniform_f(10.0, 10000.0, 2)
      - ref_cursor('SELECT id FROM customer ORDER BY id', batch_size, 'id')
    query: |-
      INSERT INTO account (balance, customer_id)
      VALUES ($1, $2)

deseed:

  - name: truncate_account
    type: exec
    query: TRUNCATE TABLE account CASCADE

  - name: truncate_customer
    type: exec
    query: TRUNCATE TABLE customer CASCADE

down:

  - name: drop_account
    type: exec
    query: DROP TABLE IF EXISTS account

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer
