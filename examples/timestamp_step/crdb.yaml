globals:
  batch_size: 1000

up:
  - name: create_events
    query: |-
      CREATE TABLE IF NOT EXISTS events (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        event_type STRING NOT NULL,
        occurred_at TIMESTAMPTZ NOT NULL
      )

  - name: create_metrics
    query: |-
      CREATE TABLE IF NOT EXISTS metrics (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        sensor_id INT NOT NULL,
        reading FLOAT8 NOT NULL,
        recorded_at TIMESTAMPTZ NOT NULL
      )

seed:
  # Interval mode: every 5 minutes for a year (105,121 rows)
  - name: populate_events
    type: exec_batch
    count: timestamp_steps('2024-01-01T00:00:00Z', '2025-01-01T00:00:00Z', '5m')
    size: batch_size
    args:
      - set_rand(['click', 'view', 'purchase', 'signup'], [40, 35, 15, 10])
      - timestamp_step()
    query: |-
      INSERT INTO events (event_type, occurred_at)
      __values__

  # Count mode: 10,000 evenly spaced readings across the same year
  - name: populate_metrics
    type: exec_batch
    count: timestamp_steps('2024-01-01T00:00:00Z', '2025-01-01T00:00:00Z', 10000)
    size: batch_size
    args:
      - int(uniform(1, 50))
      - norm_f(100, 15, 0, 200, 2)
      - timestamp_step()
    query: |-
      INSERT INTO metrics (sensor_id, reading, recorded_at)
      __values__

init:
  - name: fetch_events
    type: query
    query: SELECT id, event_type, occurred_at FROM events LIMIT 1000

run:
  - name: get_events_by_hour
    type: query
    args:
      - ref_rand('fetch_events').occurred_at
    query: |-
      SELECT id, event_type, occurred_at
      FROM events
      WHERE occurred_at >= $1::TIMESTAMPTZ
        AND occurred_at < $1::TIMESTAMPTZ + INTERVAL '1 hour'

deseed:
  - name: truncate_events
    type: exec
    query: TRUNCATE TABLE events

  - name: truncate_metrics
    type: exec
    query: TRUNCATE TABLE metrics

down:
  - name: drop_events
    type: exec
    query: DROP TABLE IF EXISTS events

  - name: drop_metrics
    type: exec
    query: DROP TABLE IF EXISTS metrics
