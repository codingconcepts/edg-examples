globals:
  devices: 100
  sensors_per_device: 5
  readings_per_sensor: 1000
  page_size: 50

up:

  - name: create_device
    query: |-
      CREATE TABLE IF NOT EXISTS device (
        id INT PRIMARY KEY,
        name STRING NOT NULL,
        location STRING NOT NULL,
        device_type STRING NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT now()
      )

  - name: create_sensor
    query: |-
      CREATE TABLE IF NOT EXISTS sensor (
        id INT PRIMARY KEY,
        device_id INT NOT NULL REFERENCES device(id),
        metric_name STRING NOT NULL,
        unit STRING NOT NULL,
        min_threshold DECIMAL(10,2) NOT NULL,
        max_threshold DECIMAL(10,2) NOT NULL
      )

  - name: create_reading
    query: |-
      CREATE TABLE IF NOT EXISTS reading (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        sensor_id INT NOT NULL REFERENCES sensor(id),
        value DECIMAL(12,4) NOT NULL,
        recorded_at TIMESTAMP NOT NULL DEFAULT now()
      )

  - name: create_alert
    query: |-
      CREATE TABLE IF NOT EXISTS alert (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        sensor_id INT NOT NULL REFERENCES sensor(id),
        reading_value DECIMAL(12,4) NOT NULL,
        threshold DECIMAL(10,2) NOT NULL,
        alert_type STRING NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT now()
      )

  - name: create_idx_reading_sensor_time
    query: |-
      CREATE INDEX IF NOT EXISTS idx_reading_sensor_time
      ON reading (sensor_id, recorded_at DESC)

  - name: create_idx_alert_sensor_time
    query: |-
      CREATE INDEX IF NOT EXISTS idx_alert_sensor_time
      ON alert (sensor_id, created_at DESC)

seed:

  - name: populate_device
    args:
      - devices
    query: |-
      INSERT INTO device (id, name, location, device_type)
      SELECT
        s,
        'device-' || s::TEXT,
        (ARRAY['floor-1','floor-2','floor-3','roof','basement','warehouse'])[floor(random()::FLOAT8 * 6 + 1)::INT],
        (ARRAY['temperature','pressure','humidity','vibration'])[floor(random()::FLOAT8 * 4 + 1)::INT]
      FROM generate_series(1, $1) AS s

  - name: populate_sensor
    args:
      - ref_each('SELECT id FROM device')
      - sensors_per_device
    query: |-
      INSERT INTO sensor (id, device_id, metric_name, unit, min_threshold, max_threshold)
      SELECT
        ($1::INT - 1) * $2 + s,
        $1::INT,
        (ARRAY['temp_c','pressure_psi','humidity_pct','rpm','voltage'])[s],
        (ARRAY['°C','PSI','%','RPM','V'])[s],
        (ARRAY[15.0, 20.0, 30.0, 500.0, 110.0])[s]::DECIMAL(10,2),
        (ARRAY[35.0, 80.0, 70.0, 3000.0, 240.0])[s]::DECIMAL(10,2)
      FROM generate_series(1, $2) AS s

  - name: populate_reading
    args:
      - ref_each('SELECT id, min_threshold, max_threshold FROM sensor')
      - readings_per_sensor
    query: |-
      INSERT INTO reading (sensor_id, value, recorded_at)
      SELECT
        $1::INT,
        $2::FLOAT8 + random()::FLOAT8 * ($3::FLOAT8 - $2::FLOAT8),
        now() - (s * INTERVAL '1 minute')
      FROM generate_series(1, $4) AS s

deseed:

  - name: truncate_alert
    type: exec
    query: TRUNCATE TABLE alert

  - name: truncate_reading
    type: exec
    query: TRUNCATE TABLE reading

  - name: truncate_sensor
    type: exec
    query: TRUNCATE TABLE sensor CASCADE

  - name: truncate_device
    type: exec
    query: TRUNCATE TABLE device CASCADE

down:

  - name: drop_alert
    type: exec
    query: DROP TABLE IF EXISTS alert

  - name: drop_reading
    type: exec
    query: DROP TABLE IF EXISTS reading

  - name: drop_sensor
    type: exec
    query: DROP TABLE IF EXISTS sensor

  - name: drop_device
    type: exec
    query: DROP TABLE IF EXISTS device

init:

  - name: fetch_sensors
    type: query
    query: SELECT id, device_id, min_threshold, max_threshold FROM sensor

  - name: fetch_devices
    type: query
    query: SELECT id FROM device

run_weights:
  ingest_reading: 60
  check_alerts: 15
  hourly_rollup: 5
  device_history: 10
  update_threshold: 5
  detect_anomaly: 5

run:

  # Ingest a single sensor reading.
  # Pattern: high-throughput INSERT, gen for random sensor value
  - name: ingest_reading
    type: exec
    args:
      - ref_rand('fetch_sensors').id
      - gen('number:1,10000')
    query: |-
      INSERT INTO reading (sensor_id, value)
      VALUES ($1::INT, $2::DECIMAL / 100.0)

  # Find recent readings that exceeded sensor thresholds.
  # Pattern: range scan on timestamp, JOIN with threshold comparison
  - name: check_alerts
    type: query
    args:
      - ref_rand('fetch_sensors').id
      - ref_rand('fetch_sensors').max_threshold
    query: |-
      SELECT r.id, r.value, r.recorded_at, s.metric_name
      FROM reading r
      JOIN sensor s ON s.id = r.sensor_id
      WHERE r.sensor_id = $1::INT
        AND r.recorded_at >= now() - INTERVAL '1 hour'
        AND r.value > $2::DECIMAL
      ORDER BY r.recorded_at DESC
      LIMIT 20

  # Aggregate readings into hourly buckets for a sensor.
  # Pattern: GROUP BY + date_trunc, aggregate functions (AVG, MIN, MAX, COUNT)
  - name: hourly_rollup
    type: query
    args:
      - ref_rand('fetch_sensors').id
    query: |-
      SELECT
        sensor_id,
        date_trunc('hour', recorded_at) AS hour,
        AVG(value)::DECIMAL(10,2) AS avg_value,
        MIN(value)::DECIMAL(10,2) AS min_value,
        MAX(value)::DECIMAL(10,2) AS max_value,
        COUNT(*) AS reading_count
      FROM reading
      WHERE sensor_id = $1::INT
        AND recorded_at >= now() - INTERVAL '24 hours'
      GROUP BY sensor_id, date_trunc('hour', recorded_at)
      ORDER BY hour DESC

  # Paginated history of readings for a device.
  # Pattern: pagination with LIMIT/OFFSET in run, const for page size,
  #          expr for offset arithmetic
  - name: device_history
    type: query
    args:
      - ref_rand('fetch_devices').id
      - gen('number:0,19')
      - page_size
    query: |-
      SELECT r.value, r.recorded_at, s.metric_name, s.unit
      FROM reading r
      JOIN sensor s ON s.id = r.sensor_id
      WHERE s.device_id = $1::INT
      ORDER BY r.recorded_at DESC
      LIMIT $3::INT OFFSET $2::INT * $3::INT

  # Adjust a sensor's upper threshold.
  # Pattern: UPDATE with gen for new value
  - name: update_threshold
    type: exec
    args:
      - ref_rand('fetch_sensors').id
      - gen('number:50,300')
    query: |-
      UPDATE sensor SET max_threshold = $2::DECIMAL
      WHERE id = $1::INT

  # Detect anomalies using a moving average window.
  # Pattern: window functions (AVG OVER ROWS BETWEEN), WINDOW clause
  - name: detect_anomaly
    type: query
    args:
      - ref_rand('fetch_sensors').id
    query: |-
      SELECT sensor_id, value, recorded_at,
        AVG(value) OVER w AS moving_avg,
        value - AVG(value) OVER w AS deviation
      FROM reading
      WHERE sensor_id = $1::INT
        AND recorded_at >= now() - INTERVAL '1 hour'
      WINDOW w AS (ORDER BY recorded_at ROWS BETWEEN 10 PRECEDING AND CURRENT ROW)
      ORDER BY recorded_at DESC
      LIMIT 50
