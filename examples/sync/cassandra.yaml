# Cross-database consistency example: Cassandra side

globals:
  user_count: 1000
  order_count: 5000
  batch_size: 50

up:

  - name: create_keyspace
    type: exec
    query: |-
      CREATE KEYSPACE IF NOT EXISTS edg
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1}

  - name: create_users
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.users (
        id INT PRIMARY KEY,
        email TEXT,
        name TEXT
      )

  - name: create_orders
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.orders (
        id INT PRIMARY KEY,
        user_id INT,
        amount DOUBLE,
        status TEXT
      )

seed:

  - name: seed_users
    type: exec_batch
    count: user_count
    size: batch_size
    args:
      - seq(1, 1)
      - gen('email')
      - gen('name')
    query: |-
      INSERT INTO edg.users (id, email, name) VALUES ($1, $2, $3)

  - name: fetch_users
    query: SELECT id FROM edg.users

  - name: seed_orders
    type: exec_batch
    count: order_count
    size: batch_size
    args:
      - seq(1, 1)
      - ref_rand('fetch_users').id
      - uniform_f(10.0, 500.0, 2)
      - set_rand(['pending', 'shipped', 'delivered', 'cancelled'], [40, 35, 20, 5])
    query: |-
      INSERT INTO edg.orders (id, user_id, amount, status) VALUES ($1, $2, $3, $4)

deseed:

  - name: truncate_orders
    type: exec
    query: TRUNCATE edg.orders

  - name: truncate_users
    type: exec
    query: TRUNCATE edg.users

down:

  - name: drop_orders
    type: exec
    query: DROP TABLE IF EXISTS edg.orders

  - name: drop_users
    type: exec
    query: DROP TABLE IF EXISTS edg.users

  - name: drop_keyspace
    type: exec
    query: DROP KEYSPACE IF EXISTS edg
