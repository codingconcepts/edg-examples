# Cross-database consistency example: CockroachDB side

globals:
  user_count: 1000
  order_count: 5000
  batch_size: 100

up:

  - name: create_users
    query: |-
      CREATE TABLE IF NOT EXISTS users (
        id INT PRIMARY KEY,
        email VARCHAR(255) NOT NULL,
        name VARCHAR(255) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT NOW()
      )

  - name: create_orders
    query: |-
      CREATE TABLE IF NOT EXISTS orders (
        id INT PRIMARY KEY,
        user_id INT NOT NULL REFERENCES users(id),
        amount DECIMAL(10,2) NOT NULL,
        status VARCHAR(50) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT NOW()
      )

seed:

  - name: seed_users
    type: exec_batch
    count: user_count
    size: batch_size
    args:
      - seq(1, 1)
      - gen('email')
      - gen('name')
    query: |-
      INSERT INTO users (id, email, name)
      __values__

  - name: fetch_users
    type: query
    query: SELECT id FROM users

  - name: seed_orders
    type: exec_batch
    count: order_count
    size: batch_size
    args:
      - seq(1, 1)
      - ref_rand('fetch_users').id
      - uniform(10.0, 500.0)
      - set_rand(['pending', 'shipped', 'delivered', 'cancelled'], [40, 35, 20, 5])
    query: |-
      INSERT INTO orders (id, user_id, amount, status)
      __values__

deseed:

  - name: delete_orders
    type: exec
    query: DELETE FROM orders

  - name: delete_users
    type: exec
    query: DELETE FROM users

down:

  - name: drop_orders
    type: exec
    query: DROP TABLE IF EXISTS orders

  - name: drop_users
    type: exec
    query: DROP TABLE IF EXISTS users
