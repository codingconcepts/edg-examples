# Cross-database consistency example: MongoDB side

globals:
  user_count: 1000
  order_count: 5000

up:

  - name: create_users
    type: exec
    query: |-
      {"create": "users"}

  - name: create_orders
    type: exec
    query: |-
      {"create": "orders"}

seed:

  - name: seed_users
    type: exec_batch
    count: user_count
    args:
      - seq(1, 1)
      - gen('email')
      - gen('name')
    query: |-
      {"insert": "users", "documents": [{"id": $1, "email": $2, "name": $3}]}

  - name: fetch_users
    query: |-
      {"find": "users", "filter": {}}

  - name: seed_orders
    type: exec_batch
    count: order_count
    args:
      - seq(1, 1)
      - ref_rand('fetch_users').id
      - uniform_f(10.0, 500.0, 2)
      - set_rand(['pending', 'shipped', 'delivered', 'cancelled'], [40, 35, 20, 5])
    query: |-
      {"insert": "orders", "documents": [{"id": $1, "user_id": $2, "amount": $3, "status": $4}]}

deseed:

  - name: delete_orders
    type: exec
    query: |-
      {"delete": "orders", "deletes": [{"q": {}, "limit": 0}]}

  - name: delete_users
    type: exec
    query: |-
      {"delete": "users", "deletes": [{"q": {}, "limit": 0}]}

down:

  - name: drop_orders
    type: exec
    query: |-
      {"drop": "orders"}

  - name: drop_users
    type: exec
    query: |-
      {"drop": "users"}
