# Transaction workload for MongoDB
#
# Demonstrates multi-statement transactions using the bank schema.
# The make_transfer transaction reads two account balances, then
# debits one and credits the other inside a MongoDB session transaction.

globals:
  customers: 10000
  initial_balance: 10000

up:

  - name: create_customer
    type: exec
    query: |-
      {"create": "customer"}

  - name: create_account
    type: exec
    query: |-
      {"create": "account"}

seed:

  - name: populate_customer
    type: exec_batch
    count: customers
    args:
      - gen('uuid')
      - gen('email')
    query: |-
      {"insert": "customer", "documents": [{"_id": "$1", "email": "$2"}]}

  - name: fetch_customers
    type: query
    query: |-
      {"find": "customer", "filter": {}}

  - name: populate_account
    type: exec_batch
    count: customers
    args:
      - gen('uuid')
      - ref_rand('fetch_customers')._id
      - initial_balance
    query: |-
      {"insert": "account", "documents": [{"_id": "$1", "customer_id": "$2", "balance": $3}]}

deseed:

  - name: delete_accounts
    type: exec
    query: |-
      {"delete": "account", "deletes": [{"q": {}, "limit": 0}]}

  - name: delete_customers
    type: exec
    query: |-
      {"delete": "customer", "deletes": [{"q": {}, "limit": 0}]}

down:

  - name: drop_account
    type: exec
    query: |-
      {"drop": "account"}

  - name: drop_customer
    type: exec
    query: |-
      {"drop": "customer"}

init:

  - name: fetch_accounts
    type: query
    query: |-
      {"find": "account", "filter": {}}

run_weights:
  check_balance: 50
  make_transfer: 50

run:

  - name: check_balance
    type: query
    args:
      - ref_rand('fetch_accounts')._id
    query: |-
      {"find": "account", "filter": {"_id": "$1"}}

  - transaction: make_transfer
    locals:
      amount: gen('number:1,100')
    queries:
      - name: read_source
        type: query
        args:
          - ref_diff('fetch_accounts')._id
        query: |-
          {"find": "account", "filter": {"_id": "$1"}}

      - rollback_if: "ref_same('read_source').balance < local('amount')"

      - name: read_target
        type: query
        args:
          - ref_diff('fetch_accounts')._id
        query: |-
          {"find": "account", "filter": {"_id": "$1"}}

      - name: debit_source
        type: exec
        args:
          - ref_same('read_source')._id
          - local('amount')
        query: |-
          {"update": "account", "updates": [{"q": {"_id": "$1"}, "u": {"$inc": {"balance": -$2}}}]}

      - name: credit_target
        type: exec
        args:
          - ref_same('read_target')._id
          - local('amount')
        query: |-
          {"update": "account", "updates": [{"q": {"_id": "$1"}, "u": {"$inc": {"balance": $2}}}]}
