# Transaction workload for Oracle
#
# Demonstrates multi-statement transactions using the bank schema.
# The make_transfer transaction reads two account balances, then
# debits one and credits the other inside an explicit BEGIN/COMMIT.

globals:
  customers: 10000
  initial_balance: 10000
  batch_size: 100

up:

  - name: create_customer
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE customer (
            id NUMBER GENERATED ALWAYS AS IDENTITY,
            email VARCHAR2(320) NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_account
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE account (
            id NUMBER GENERATED ALWAYS AS IDENTITY,
            balance NUMBER NOT NULL,
            customer_id NUMBER NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

seed:

  - name: clear_account
    type: exec
    query: TRUNCATE TABLE account

  - name: clear_customer
    type: exec
    query: TRUNCATE TABLE customer

  - name: populate_customer
    type: exec_batch
    count: customers
    size: 100
    args:
      - gen('email')
    query: |-
      INSERT ALL __values__(customer(email))

  - name: populate_account
    args:
      - batch(customers / batch_size)
      - initial_balance
      - batch_size
    query: |-
      INSERT INTO account (balance, customer_id)
      SELECT $2, c.id
      FROM customer c
      ORDER BY c.id
      OFFSET $1 * $3 ROWS FETCH NEXT $3 ROWS ONLY

deseed:

  - name: truncate_account
    type: exec
    query: TRUNCATE TABLE account

  - name: truncate_customer
    type: exec
    query: TRUNCATE TABLE customer

down:

  - name: drop_account
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE account CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_customer
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE customer CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

init:

  - name: fetch_accounts
    type: query
    query: SELECT id FROM account

run_weights:
  check_balance: 50
  make_transfer: 50

run:

  - name: check_balance
    type: query
    args:
      - ref_rand('fetch_accounts').id
    query: |-
      SELECT balance FROM account WHERE id = $1

  - transaction: make_transfer
    queries:
      - name: read_source
        type: query
        args:
          - ref_diff('fetch_accounts').id
        query: |-
          SELECT id, balance FROM account WHERE id = $1

      - name: read_target
        type: query
        args:
          - ref_diff('fetch_accounts').id
        query: |-
          SELECT id, balance FROM account WHERE id = $1

      - name: debit_source
        type: exec
        args:
          - ref_same('read_source').id
          - gen('number:1,100')
        query: |-
          UPDATE account SET balance = balance - $2
          WHERE id = $1

      - name: credit_target
        type: exec
        args:
          - ref_same('read_target').id
          - gen('number:1,100')
        query: |-
          UPDATE account SET balance = balance + $2
          WHERE id = $1
