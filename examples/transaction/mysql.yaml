# Transaction workload for MySQL
#
# Demonstrates multi-statement transactions using the bank schema.
# The make_transfer transaction reads two account balances, then
# debits one and credits the other inside an explicit BEGIN/COMMIT.
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  customers: 10000
  initial_balance: 10000
  batch_size: 1000

up:

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        email VARCHAR(255) NOT NULL
      )

  - name: create_account
    query: |-
      CREATE TABLE IF NOT EXISTS account (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        balance DOUBLE NOT NULL,
        customer_id CHAR(36) NOT NULL,
        FOREIGN KEY (customer_id) REFERENCES customer(id)
      )

seed:

  - name: populate_customer
    type: exec_batch
    count: customers
    size: batch_size
    args:
      - gen('email')
    query: |-
      INSERT INTO customer (email)
      __values__

  - name: populate_account
    args:
      - batch(customers / batch_size, batch_size)
      - initial_balance
      - batch_size
    query: |-
      INSERT INTO account (balance, customer_id)
      SELECT $2, c.id
      FROM customer c
      ORDER BY c.id
      LIMIT $3 OFFSET $1

deseed:

  - name: delete_account
    type: exec
    query: DELETE FROM account

  - name: delete_customer
    type: exec
    query: DELETE FROM customer

down:

  - name: drop_account
    type: exec
    query: DROP TABLE IF EXISTS account

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer

init:

  - name: fetch_accounts
    type: query
    query: SELECT id FROM account ORDER BY RAND()

run_weights:
  check_balance: 50
  make_transfer: 50

run:

  - name: check_balance
    type: query
    args:
      - ref_rand('fetch_accounts').id
    query: |-
      SELECT balance FROM account WHERE id = $1

  - transaction: make_transfer
    queries:
      - name: read_source
        type: query
        args:
          - ref_diff('fetch_accounts').id
        query: |-
          SELECT id, balance FROM account WHERE id = $1

      - name: read_target
        type: query
        args:
          - ref_diff('fetch_accounts').id
        query: |-
          SELECT id, balance FROM account WHERE id = $1

      - name: debit_source
        type: exec
        args:
          - ref_same('read_source').id
          - gen('number:1,100')
        query: |-
          UPDATE account SET balance = balance - $2
          WHERE id = $1

      - name: credit_target
        type: exec
        args:
          - ref_same('read_target').id
          - gen('number:1,100')
        query: |-
          UPDATE account SET balance = balance + $2
          WHERE id = $1
