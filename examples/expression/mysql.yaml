# Expression workload for MySQL
#
# Demonstrates expr-lang features. The expressions are evaluated
# by edg (not the database), so all expr-lang functions work
# identically across databases.
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  prices: [9.99, 19.99, 4.99, 29.99, 14.99]
  tags: [electronics, books, clothing, food, toys]
  names: [Alice, Bob, Charlie, Diana, Eve]
  threshold: 10
  matrix: [[1, 2], [3, 4], [5, 6]]
  products:
    - {name: Widget, price: 29.99, category: tools}
    - {name: Gadget, price: 9.99, category: electronics}
    - {name: Gizmo, price: 19.99, category: tools}
    - {name: Doohickey, price: 4.99, category: toys}
    - {name: Thingamajig, price: 49.99, category: electronics}

expressions:

  grade: |-
    if args[0] >= 90 { "A" }
    else if args[0] >= 70 { "B" }
    else { "F" }

  sum_of_squares: 'let a = float(args[0]); let b = float(args[1]); a**2 + b**2'

up:

  - name: create_expr_demo
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS expr_demo (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        label VARCHAR(255) NOT NULL,
        result TEXT NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
      )

deseed:

  - name: truncate
    type: exec
    query: DELETE FROM expr_demo

down:

  - name: drop
    type: exec
    query: DROP TABLE IF EXISTS expr_demo

run:

  - name: array_predicates
    type: exec
    args:
      - 'all(prices, # > 0)'
      - 'any(prices, # > 25)'
      - 'one(prices, # < 5)'
      - 'none(prices, # < 0)'
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('all(# > 0)', ?),
        ('any(# > 25)', ?),
        ('one(# < 5)', ?),
        ('none(# < 0)', ?)

  - name: array_search
    type: exec
    args:
      - 'find(prices, # > 20)'
      - 'findIndex(prices, # > 20)'
      - 'findLast(prices, # > 10)'
      - 'findLastIndex(prices, # > 10)'
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('find(# > 20)', ?),
        ('findIndex(# > 20)', ?),
        ('findLast(# > 10)', ?),
        ('findLastIndex(# > 10)', ?)

  - name: array_transform
    type: exec
    args:
      - 'join(map(filter(prices, # > threshold), string(#)), ",")'
      - 'join(map(prices, string(# * 2)), ",")'
      - 'join(map(sort(prices), string(#)), ",")'
      - 'join(map(sortBy(products, #.price), #.name), ",")'
      - 'join(reverse(names), ",")'
      - 'join(uniq(concat(tags, ["books", "games"])), ",")'
      - 'join(map(flatten(matrix), string(#)), ",")'
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('filter+map', ?),
        ('map(# * 2)', ?),
        ('sort', ?),
        ('sortBy(#.price)', ?),
        ('reverse', ?),
        ('uniq+concat', ?),
        ('flatten', ?)

  - name: array_aggregate
    type: exec
    args:
      - 'reduce(prices, #acc + #, 0)'
      - 'mean(prices)'
      - 'median(prices)'
      - 'first(names)'
      - 'last(names)'
      - 'join(take(names, 3), ",")'
      - 'len(names)'
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('reduce(#acc + #)', ?),
        ('mean', ?),
        ('median', ?),
        ('first', ?),
        ('last', ?),
        ('take(3)', ?),
        ('len(array)', ?)

  - name: map_functions
    type: exec
    args:
      - 'join(keys({a: 1, b: 2, c: 3}), ",")'
      - 'join(map(values({a: 1, b: 2, c: 3}), string(#)), ",")'
      - 'join(keys(groupBy(products, #.category)), ",")'
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('keys', ?),
        ('values', ?),
        ('groupBy(#.category)', ?)

  - name: string_operators
    type: exec
    args:
      - '"hello world" contains "world"'
      - '"hello" startsWith "hel"'
      - '"world" endsWith "rld"'
      - '"hello123" matches "^[a-z]+[0-9]+$"'
      - '"books" in tags'
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('contains', ?),
        ('startsWith', ?),
        ('endsWith', ?),
        ('matches (regex)', ?),
        ('in (membership)', ?)

  - name: string_functions
    type: exec
    args:
      - trimPrefix("test_value", "test_")
      - trimSuffix("image.png", ".png")
      - 'join(splitAfter("a.b.c", "."), "|")'
      - repeat("ab", 3)
      - indexOf("hello world", "world")
      - lastIndexOf("abcabc", "abc")
      - hasPrefix("hello", "hel")
      - hasSuffix("hello", "llo")
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('trimPrefix', ?),
        ('trimSuffix', ?),
        ('splitAfter', ?),
        ('repeat', ?),
        ('indexOf', ?),
        ('lastIndexOf', ?),
        ('hasPrefix', ?),
        ('hasSuffix', ?)

  - name: type_conversion
    type: exec
    args:
      - type(42)
      - 'toJSON({name: "test", value: 42})'
      - "string(fromJSON('{\"a\": 1}').a)"
      - toBase64("hello")
      - fromBase64("aGVsbG8=")
      - 'len(toPairs({x: 1, y: 2}))'
      - 'join(keys(fromPairs([["x", 1], ["y", 2]])), ",")'
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('type', ?),
        ('toJSON', ?),
        ('fromJSON', ?),
        ('toBase64', ?),
        ('fromBase64', ?),
        ('toPairs', ?),
        ('fromPairs', ?)

  - name: operators
    type: exec
    args:
      - 'reduce(1..5, #acc + #, 0)'
      - 'join(names[1:3], ",")'
      - '{name: "test"}?.missing ?? "default"'
      - grade(85)
      - sum_of_squares(3, 4)
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('range 1..5', ?),
        ('slice [1:3]', ?),
        ('?. + ??', ?),
        ('if/else', ?),
        ('let bindings', ?)

  - name: bitwise
    type: exec
    args:
      - bitand(0xFF, 0x0F)
      - bitor(0xF0, 0x0F)
      - bitxor(0xFF, 0x0F)
      - bitnand(0xFF, 0x0F)
      - bitnot(0)
      - bitshl(1, 8)
      - bitshr(256, 4)
      - bitushr(256, 4)
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('bitand(0xFF, 0x0F)', ?),
        ('bitor(0xF0, 0x0F)', ?),
        ('bitxor(0xFF, 0x0F)', ?),
        ('bitnand(0xFF, 0x0F)', ?),
        ('bitnot(0)', ?),
        ('bitshl(1, 8)', ?),
        ('bitshr(256, 4)', ?),
        ('bitushr(256, 4)', ?)

  - name: misc
    type: exec
    args:
      - len("hello")
      - 'get({a: 1, b: 2}, "c") ?? "missing"'
    query: |-
      INSERT INTO expr_demo (label, result) VALUES
        ('len(string)', ?),
        ('get + ??', ?)
