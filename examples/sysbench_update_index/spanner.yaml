# Sysbench oltp_update_index Workload for Google Cloud Spanner
# =============================================================
# Pure indexed-column update micro-benchmark. Every operation
# increments column k (which has a secondary index), causing
# both primary and index writes. Useful for measuring write
# amplification and secondary index maintenance overhead.
#
# Connection URL format:
#   projects/PROJECT/instances/INSTANCE/databases/DATABASE

globals:
  records: int(coalesce(env_nil('RECORDS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_sbtest1
    query: |-
      CREATE TABLE IF NOT EXISTS sbtest1 (
        id INT64 NOT NULL,
        k INT64 NOT NULL DEFAULT (0),
        c STRING(120) NOT NULL DEFAULT (''),
        pad STRING(60) NOT NULL DEFAULT ('')
      ) PRIMARY KEY (id)

  - name: create_idx_k
    query: |-
      CREATE INDEX IF NOT EXISTS k_1 ON sbtest1(k)

seed:

  - name: populate_sbtest1
    type: exec_batch
    count: records
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      INSERT INTO sbtest1 (id, k, c, pad)
      VALUES ($1, $2, $3, $4)

deseed:

  - name: delete_sbtest1
    type: exec
    query: DELETE FROM sbtest1 WHERE TRUE

down:

  - name: drop_sbtest1
    type: exec
    query: DROP TABLE IF EXISTS sbtest1

run:

  - name: update_index
    type: exec
    args:
      - gen('number:1,' + string(records))
    query: |-
      UPDATE sbtest1 SET k = k + 1 WHERE id = $1


expectations:
  - error_rate < 1
