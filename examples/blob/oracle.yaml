# Blob workload for Oracle
#
# Uses blob() for raw binary data via bind parameters.
# The bytes() function is not supported on Oracle (it produces
# a PostgreSQL/CockroachDB-specific \x hex literal).
#
# Connection URL format:
#   oracle://system:password@localhost:1521/defaultdb

up:

  - name: create_blob_test
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE blob_test (
            id RAW(16) DEFAULT SYS_GUID() PRIMARY KEY,
            label VARCHAR2(255) NOT NULL,
            data_blob BLOB NOT NULL,
            created_at TIMESTAMP DEFAULT SYSTIMESTAMP NOT NULL
          )';
      EXCEPTION
        WHEN OTHERS THEN
          IF SQLCODE != -955 THEN RAISE; END IF;
      END;

down:

  - name: drop_blob_test
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE blob_test';
      EXCEPTION
        WHEN OTHERS THEN
          IF SQLCODE != -942 THEN RAISE; END IF;
      END;

init:

  - name: fetch_blobs
    type: query
    query: SELECT id, label FROM blob_test WHERE ROWNUM <= 100

run:

  # Insert raw binary data using blob().
  - name: insert_blob
    type: exec
    args:
      - gen('word')
      - blob(256)
    query: |-
      INSERT INTO blob_test (label, data_blob)
      VALUES ($1, $2)

  # Read back a random row to verify round-trip.
  - name: read_blob
    type: query
    args:
      - ref_rand('fetch_blobs').id
    query: |-
      SELECT id, label, DBMS_LOB.GETLENGTH(data_blob) AS blob_len
      FROM blob_test
      WHERE id = $1
