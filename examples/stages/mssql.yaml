# Stages workload for SQL Server
#
# Connection URL format:
#   sqlserver://user:password@host:port?database=database&encrypt=disable

globals:
  customers: 100000
  initial_balance: 10000
  batch_size: 10000

stages:
  - name: ramp
    workers: 1
    duration: 10s
  - name: steady
    workers: 10
    duration: 30s

up:

  - name: create_customer
    query: |-
      IF OBJECT_ID('customer', 'U') IS NULL
      CREATE TABLE customer (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        email NVARCHAR(255) NOT NULL
      )

  - name: create_account
    query: |-
      IF OBJECT_ID('account', 'U') IS NULL
      CREATE TABLE account (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        balance FLOAT NOT NULL,
        customer_id UNIQUEIDENTIFIER NOT NULL,
        FOREIGN KEY (customer_id) REFERENCES customer(id)
      )

seed:

  - name: populate_customer
    type: exec_batch
    count: customers
    size: batch_size
    args:
      - gen('email')
    query: |-
      INSERT INTO customer (email)
      __values__

  - name: populate_account
    args:
      - batch(customers / batch_size)
      - initial_balance
      - batch_size
    query: |-
      INSERT INTO account (balance, customer_id)
      SELECT $2, c.id
      FROM customer c
      ORDER BY c.id
      OFFSET $1 * $3 ROWS FETCH NEXT $3 ROWS ONLY

deseed:

  - name: delete_account
    type: exec
    query: DELETE FROM account

  - name: delete_customer
    type: exec
    query: DELETE FROM customer

down:

  - name: drop_account
    type: exec
    query: DROP TABLE IF EXISTS account

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer

init:

  - name: fetch_accounts
    type: query
    query: SELECT id FROM account ORDER BY NEWID()

run_weights:
  check_balance: 50
  credit_account: 5
  make_transfer: 45

run:

  - name: check_balance
    type: query
    args:
      - ref_rand('fetch_accounts').id
    query: |-
      SELECT balance FROM account WHERE id = @p1

  - name: credit_account
    type: exec
    args:
      - gen('number:1,1000')
      - ref_rand('fetch_accounts').id
    query: |-
      UPDATE account SET balance = balance + @p1
      WHERE id = @p2

  - name: make_transfer
    type: exec
    args:
      - ref_diff('fetch_accounts').id
      - ref_diff('fetch_accounts').id
      - gen('number:1,100')
    query: |-
      UPDATE account
      SET balance = CASE
                      WHEN id = @p2 THEN balance + CAST(@p3 AS FLOAT)
                      WHEN id = @p1 THEN balance - CAST(@p3 AS FLOAT)
                    END
      WHERE id IN (@p1, @p2)
