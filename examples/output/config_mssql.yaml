globals:
  customers: 10
  batch_size: 5

seq:
  - name: customer_id
    start: 1
    step: 1
  - name: order_id
    start: 1
    step: 1

up:

  - name: create_customer
    query: |-
      IF OBJECT_ID('customer', 'U') IS NULL
      CREATE TABLE customer (
        id INT PRIMARY KEY,
        name NVARCHAR(255) NOT NULL,
        email NVARCHAR(255) NOT NULL
      )

  - name: create_order
    query: |-
      IF OBJECT_ID('purchase_order', 'U') IS NULL
      CREATE TABLE purchase_order (
        id INT PRIMARY KEY,
        customer_id INT NOT NULL,
        amount DECIMAL(10,2) NOT NULL,
        status NVARCHAR(255) NOT NULL
      )

seed:

  - name: populate_customer
    type: exec_batch
    count: customers
    args:
      id: seq_global("customer_id")
      name: gen('name')
      email: gen('email')
    query: |-
      INSERT INTO customer (id, name, email)
      __values__

  - name: populate_order
    type: exec_batch
    count: customers * 3
    args:
      id: seq_global("order_id")
      customer_id: seq_rand("customer_id")
      amount: uniform_f(9.99, 499.99, 2)
      status: set_rand(['pending', 'shipped', 'delivered'], [])
    query: |-
      INSERT INTO purchase_order (id, customer_id, amount, status)
      __values__

deseed:

  - name: delete_orders
    query: DELETE FROM purchase_order

  - name: delete_customers
    query: DELETE FROM customer

down:

  - name: drop_order
    query: |-
      IF OBJECT_ID('purchase_order', 'U') IS NOT NULL
      DROP TABLE purchase_order

  - name: drop_customer
    query: |-
      IF OBJECT_ID('customer', 'U') IS NOT NULL
      DROP TABLE customer
