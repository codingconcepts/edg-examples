# Objects workload for MySQL
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  orders: 1000

objects:
  order:
    email: gen('email')
    product: gen('productname')
    quantity: int(uniform(1, 100))
    ordered_at: timestamp('2024-01-01T00:00:00Z', '2025-01-01T00:00:00Z')

up:

  - name: create_order
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS `order` (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        email VARCHAR(255) NOT NULL,
        product VARCHAR(255) NOT NULL,
        quantity INT NOT NULL,
        ordered_at DATETIME NOT NULL
      )

seed:

  - name: populate_order
    type: exec_batch
    count: orders
    size: 100
    object: order
    query: |-
      INSERT INTO `order` (email, product, quantity, ordered_at)
      __values__

init:

  - name: fetch_orders
    type: query
    query: SELECT id FROM `order`

run:

  # object: expands all object fields as positional args
  - name: insert_order_row
    type: exec
    object: order
    query: |-
      INSERT INTO `order` (email, product, quantity, ordered_at)
      VALUES (?, ?, ?, ?)

  # field() cherry-picks fields from the object context, mixable with other expressions
  - name: insert_order_field
    type: exec
    object: order
    args:
      - field('email')
      - field('product')
      - field('quantity')
      - field('ordered_at')
    query: |-
      INSERT INTO `order` (email, product, quantity, ordered_at)
      VALUES (?, ?, ?, ?)

  # obj() with two args references a specific field, no object: needed
  - name: insert_order_obj
    type: exec
    args:
      - obj('order', 'email')
      - obj('order', 'product')
      - obj('order', 'quantity')
      - obj('order', 'ordered_at')
    query: |-
      INSERT INTO `order` (email, product, quantity, ordered_at)
      VALUES (?, ?, ?, ?)

  # obj() with dot-access evaluates all fields, picks via dot notation
  - name: insert_order_dot
    type: exec
    args:
      - obj('order').email
      - obj('order').product
      - obj('order').quantity
      - obj('order').ordered_at
    query: |-
      INSERT INTO `order` (email, product, quantity, ordered_at)
      VALUES (?, ?, ?, ?)

deseed:

  - name: delete_order
    type: exec
    query: DELETE FROM `order`

down:

  - name: drop_order
    type: exec
    query: DROP TABLE IF EXISTS `order`
