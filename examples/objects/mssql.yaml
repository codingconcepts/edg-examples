# Objects workload for SQL Server
#
# Connection URL format:
#   sqlserver://user:password@host:port?database=database&encrypt=disable

globals:
  orders: 1000

objects:
  order:
    email: gen('email')
    product: gen('productname')
    quantity: int(uniform(1, 100))
    ordered_at: timestamp('2024-01-01T00:00:00Z', '2025-01-01T00:00:00Z')

up:

  - name: create_order
    type: exec
    query: |-
      IF OBJECT_ID('orders', 'U') IS NULL
      CREATE TABLE orders (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        email NVARCHAR(255) NOT NULL,
        product NVARCHAR(255) NOT NULL,
        quantity INT NOT NULL,
        ordered_at DATETIME2 NOT NULL
      )

seed:

  - name: populate_order
    type: exec_batch
    count: orders
    size: 100
    object: order
    query: |-
      INSERT INTO orders (email, product, quantity, ordered_at)
      __values__

init:

  - name: fetch_orders
    type: query
    query: SELECT id FROM orders

run:

  # object: expands all object fields as positional args
  - name: insert_order_row
    type: exec
    object: order
    query: |-
      INSERT INTO orders (email, product, quantity, ordered_at)
      VALUES (@p1, @p2, @p3, @p4)

  # field() cherry-picks fields from the object context, mixable with other expressions
  - name: insert_order_field
    type: exec
    object: order
    args:
      - field('email')
      - field('product')
      - field('quantity')
      - field('ordered_at')
    query: |-
      INSERT INTO orders (email, product, quantity, ordered_at)
      VALUES (@p1, @p2, @p3, @p4)

  # obj() with two args references a specific field, no object: needed
  - name: insert_order_obj
    type: exec
    args:
      - obj('order', 'email')
      - obj('order', 'product')
      - obj('order', 'quantity')
      - obj('order', 'ordered_at')
    query: |-
      INSERT INTO orders (email, product, quantity, ordered_at)
      VALUES (@p1, @p2, @p3, @p4)

  # obj() with dot-access evaluates all fields, picks via dot notation
  - name: insert_order_dot
    type: exec
    args:
      - obj('order').email
      - obj('order').product
      - obj('order').quantity
      - obj('order').ordered_at
    query: |-
      INSERT INTO orders (email, product, quantity, ordered_at)
      VALUES (@p1, @p2, @p3, @p4)

deseed:

  - name: delete_order
    type: exec
    query: DELETE FROM orders

down:

  - name: drop_order
    type: exec
    query: DROP TABLE IF EXISTS orders
