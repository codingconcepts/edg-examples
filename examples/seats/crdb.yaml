# SEATS Benchmark Workload
# ========================
# Airline reservation system benchmark. Models flights, customers,
# and reservations with contention on seat availability.
#
# Schema:
#   country    - Reference table of countries
#   airport    - Airports with country FK
#   airline    - Airlines
#   customer   - Customers with home airport
#   flight     - Flights between airports with seat counts
#   reservation - Seat reservations on flights
#
# Transaction profiles:
#   find_flights       - Look up flights between airports (10%)
#   find_open_seats    - Check available seats on a flight (35%)
#   new_reservation    - Book a seat (15%)
#   update_customer    - Update customer info (10%)
#   update_reservation - Change a reservation (10%)
#   delete_reservation - Cancel a reservation (20%)
#
# Contention arises from concurrent reservation/deletion on
# the same flights, and from seat count updates.

globals:
  countries: int(coalesce(env_nil('COUNTRIES'), 50))
  airports: int(coalesce(env_nil('AIRPORTS'), 200))
  airlines: int(coalesce(env_nil('AIRLINES'), 20))
  customers: int(coalesce(env_nil('CUSTOMERS'), 1000))
  flights: int(coalesce(env_nil('FLIGHTS'), 500))
  seats_per_flight: int(coalesce(env_nil('SEATS_PER_FLIGHT'), 150))
  reservations_per_flight: int(coalesce(env_nil('RESERVATIONS_PER_FLIGHT'), 120))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_country
    query: |-
      CREATE TABLE IF NOT EXISTS country (
        co_id INT NOT NULL PRIMARY KEY,
        co_name VARCHAR(64) NOT NULL
      )

  - name: create_airport
    query: |-
      CREATE TABLE IF NOT EXISTS airport (
        ap_id INT NOT NULL PRIMARY KEY,
        ap_code CHAR(3) NOT NULL,
        ap_name VARCHAR(128) NOT NULL,
        ap_city VARCHAR(64) NOT NULL,
        ap_co_id INT NOT NULL REFERENCES country(co_id),
        UNIQUE (ap_code)
      )

  - name: create_airline
    query: |-
      CREATE TABLE IF NOT EXISTS airline (
        al_id INT NOT NULL PRIMARY KEY,
        al_iata_code CHAR(2) NOT NULL,
        al_name VARCHAR(128) NOT NULL,
        UNIQUE (al_iata_code)
      )

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        c_id INT NOT NULL PRIMARY KEY,
        c_base_ap_id INT NOT NULL REFERENCES airport(ap_id),
        c_balance DECIMAL(12,2) NOT NULL,
        c_sattr00 VARCHAR(32) NOT NULL,
        c_sattr01 VARCHAR(32) NOT NULL,
        c_iattr00 INT NOT NULL,
        c_iattr01 INT NOT NULL
      )

  - name: create_flight
    query: |-
      CREATE TABLE IF NOT EXISTS flight (
        f_id INT NOT NULL PRIMARY KEY,
        f_al_id INT NOT NULL REFERENCES airline(al_id),
        f_depart_ap_id INT NOT NULL REFERENCES airport(ap_id),
        f_arrive_ap_id INT NOT NULL REFERENCES airport(ap_id),
        f_depart_time TIMESTAMP NOT NULL,
        f_arrive_time TIMESTAMP NOT NULL,
        f_seats_total INT NOT NULL,
        f_seats_left INT NOT NULL,
        f_base_price DECIMAL(12,2) NOT NULL
      )

  - name: create_reservation
    query: |-
      CREATE TABLE IF NOT EXISTS reservation (
        r_id UUID NOT NULL DEFAULT gen_random_uuid(),
        r_c_id INT NOT NULL REFERENCES customer(c_id),
        r_f_id INT NOT NULL REFERENCES flight(f_id),
        r_seat INT NOT NULL,
        r_price DECIMAL(12,2) NOT NULL,
        r_iattr00 INT NOT NULL,
        r_iattr01 INT NOT NULL,
        PRIMARY KEY (r_id)
      )

  - name: create_idx_reservation_flight
    query: |-
      CREATE INDEX IF NOT EXISTS idx_reservation_flight
      ON reservation (r_f_id)

  - name: create_idx_reservation_customer
    query: |-
      CREATE INDEX IF NOT EXISTS idx_reservation_customer
      ON reservation (r_c_id)

  - name: create_idx_flight_depart
    query: |-
      CREATE INDEX IF NOT EXISTS idx_flight_depart
      ON flight (f_depart_ap_id, f_depart_time)

seed:

  - name: populate_country
    type: exec_batch
    count: countries
    size: batch_size
    args:
      - iter()
    query: |-
      INSERT INTO country (co_id, co_name)
      VALUES ($1::INT, 'Country_' || lpad($1::TEXT, 3, '0'))

  - name: populate_airport
    type: exec_batch
    count: airports
    size: batch_size
    args:
      - iter()
      - uniq("regex('[A-Z]{3}')")
      - countries
    query: |-
      INSERT INTO airport (ap_id, ap_code, ap_name, ap_city, ap_co_id)
      VALUES ($1::INT, $2,
        'Airport_' || lpad($1::TEXT, 4, '0'),
        'City_' || lpad($1::TEXT, 4, '0'),
        (($1::INT - 1) % $3::INT) + 1)

  - name: populate_airline
    type: exec_batch
    count: airlines
    size: batch_size
    args:
      - iter()
      - uniq("regex('[A-Z]{2}')")
    query: |-
      INSERT INTO airline (al_id, al_iata_code, al_name)
      VALUES ($1::INT, $2, 'Airline_' || lpad($1::TEXT, 3, '0'))

  - name: populate_customer
    args:
      - batch(customers / batch_size)
      - batch_size
      - airports
    query: |-
      INSERT INTO customer (c_id, c_base_ap_id, c_balance,
        c_sattr00, c_sattr01, c_iattr00, c_iattr01)
      SELECT
        $1::INT * $2::INT + s,
        floor(random()::FLOAT8 * $3 + 1)::INT,
        0,
        substr(md5(random()::FLOAT8::text), 1, 16),
        substr(md5(random()::FLOAT8::text), 1, 16),
        floor(random()::FLOAT8 * 1000)::INT,
        floor(random()::FLOAT8 * 1000)::INT
      FROM generate_series(1, $2::INT) AS s

  - name: populate_flight
    args:
      - batch(flights / batch_size)
      - batch_size
      - airports
      - airlines
      - seats_per_flight
    query: |-
      INSERT INTO flight (f_id, f_al_id, f_depart_ap_id, f_arrive_ap_id,
        f_depart_time, f_arrive_time, f_seats_total, f_seats_left,
        f_base_price)
      SELECT
        $1::INT * $2::INT + s,
        floor(random()::FLOAT8 * $4 + 1)::INT,
        floor(random()::FLOAT8 * $3 + 1)::INT,
        floor(random()::FLOAT8 * $3 + 1)::INT,
        now() + ((random() * 30 * 86400)::INT::TEXT || ' seconds')::INTERVAL,
        now() + ((random() * 30 * 86400)::INT::TEXT || ' seconds')::INTERVAL + '2 hours'::INTERVAL,
        $5,
        $5,
        (random()::FLOAT8 * 900 + 100)::DECIMAL(12,2)
      FROM generate_series(1, $2::INT) AS s

  - name: populate_reservation
    args:
      - batch(flights / batch_size)
      - batch_size
      - reservations_per_flight
      - customers
    query: |-
      WITH flight_batch AS (
        SELECT f_id FROM flight
        ORDER BY f_id
        OFFSET $1::INT * $2::INT
        LIMIT $2::INT
      )
      INSERT INTO reservation (r_c_id, r_f_id, r_seat, r_price,
        r_iattr00, r_iattr01)
      SELECT
        floor(random()::FLOAT8 * $4 + 1)::INT,
        fb.f_id,
        s,
        (random()::FLOAT8 * 500 + 50)::DECIMAL(12,2),
        floor(random()::FLOAT8 * 100)::INT,
        floor(random()::FLOAT8 * 100)::INT
      FROM flight_batch fb
      CROSS JOIN generate_series(1, $3) AS s

  - name: update_seats_left
    type: exec
    query: |-
      UPDATE flight SET f_seats_left = f_seats_total - (
        SELECT COUNT(*) FROM reservation WHERE r_f_id = flight.f_id
      )

deseed:

  - name: truncate_reservation
    type: exec
    query: TRUNCATE TABLE reservation

  - name: truncate_flight
    type: exec
    query: TRUNCATE TABLE flight

  - name: truncate_customer
    type: exec
    query: TRUNCATE TABLE customer

  - name: truncate_airline
    type: exec
    query: TRUNCATE TABLE airline

  - name: truncate_airport
    type: exec
    query: TRUNCATE TABLE airport

  - name: truncate_country
    type: exec
    query: TRUNCATE TABLE country

down:

  - name: drop_reservation
    type: exec
    query: DROP TABLE IF EXISTS reservation

  - name: drop_flight
    type: exec
    query: DROP TABLE IF EXISTS flight

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer

  - name: drop_airline
    type: exec
    query: DROP TABLE IF EXISTS airline

  - name: drop_airport
    type: exec
    query: DROP TABLE IF EXISTS airport

  - name: drop_country
    type: exec
    query: DROP TABLE IF EXISTS country

init:

  - name: fetch_flights
    type: query
    query: SELECT f_id, f_depart_ap_id, f_seats_left FROM flight ORDER BY random()

  - name: fetch_customers
    type: query
    query: SELECT c_id FROM customer ORDER BY random()

  - name: fetch_reservations
    type: query
    query: SELECT r_id, r_c_id, r_f_id FROM reservation ORDER BY random()

  - name: fetch_airports
    type: query
    query: SELECT ap_id FROM airport

run_weights:
  find_flights: 10
  find_open_seats: 35
  new_reservation: 15
  update_customer: 10
  update_reservation: 10
  delete_reservation: 20

run:

  # Look up flights departing from an airport.
  - name: find_flights
    type: query
    args:
      - ref_rand('fetch_airports').ap_id
    query: |-
      SELECT f_id, f_al_id, f_depart_ap_id, f_arrive_ap_id,
        f_depart_time, f_arrive_time, f_seats_left, f_base_price
      FROM flight
      WHERE f_depart_ap_id = $1::INT
        AND f_depart_time > now()
      ORDER BY f_depart_time
      LIMIT 10

  # Check how many seats are left on a flight.
  - name: find_open_seats
    type: query
    args:
      - ref_rand('fetch_flights').f_id
    query: |-
      SELECT f_seats_left FROM flight WHERE f_id = $1::INT

  # Book a seat: decrement seats_left, insert reservation,
  # charge the customer.
  - name: new_reservation
    type: query
    args:
      - ref_rand('fetch_customers').c_id
      - ref_rand('fetch_flights').f_id
      - gen('number:1,150')
      - gen('number:50,1000')
    query: |-
      WITH
        seat_check AS (
          UPDATE flight SET f_seats_left = f_seats_left - 1
          WHERE f_id = $2::INT AND f_seats_left > 0
          RETURNING f_id, f_base_price
        ),
        new_res AS (
          INSERT INTO reservation (r_c_id, r_f_id, r_seat, r_price,
            r_iattr00, r_iattr01)
          SELECT $1::INT, sc.f_id, $3::INT,
            sc.f_base_price + $4::DECIMAL, 0, 0
          FROM seat_check sc
          RETURNING r_id, r_price
        ),
        charge AS (
          UPDATE customer SET c_balance = c_balance + nr.r_price
          FROM new_res nr
          WHERE customer.c_id = $1::INT
          RETURNING 1
        )
      SELECT nr.r_id FROM new_res nr

  # Update customer attributes.
  - name: update_customer
    type: exec
    args:
      - ref_rand('fetch_customers').c_id
      - gen('number:0,1000')
      - gen('number:0,1000')
    query: |-
      UPDATE customer SET c_iattr00 = $2::INT, c_iattr01 = $3::INT
      WHERE c_id = $1::INT

  # Change reservation attributes.
  - name: update_reservation
    type: exec
    args:
      - ref_rand('fetch_reservations').r_id
      - gen('number:0,100')
    query: |-
      UPDATE reservation SET r_iattr00 = $2::INT
      WHERE r_id = $1::UUID

  # Cancel a reservation and release the seat.
  - name: delete_reservation
    type: exec
    args:
      - ref_rand('fetch_reservations').r_id
      - ref_rand('fetch_reservations').r_f_id
    query: |-
      WITH del AS (
        DELETE FROM reservation WHERE r_id = $1::UUID
        RETURNING r_f_id
      )
      UPDATE flight SET f_seats_left = f_seats_left + 1
      FROM del
      WHERE flight.f_id = del.r_f_id


expectations:
  - error_rate < 1
