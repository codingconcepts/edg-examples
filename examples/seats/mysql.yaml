# SEATS Benchmark Workload for MySQL
# ===================================
# Airline reservation system benchmark. Models flights, customers,
# and reservations with contention on seat availability.
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true
#
# Example:
#   edg up --driver mysql --config cmd/edg/workload/seats/mysql.yaml \
#     --url "root:password@tcp(localhost:3306)/seats?parseTime=true"

globals:
  countries: int(coalesce(env_nil('COUNTRIES'), 50))
  airports: int(coalesce(env_nil('AIRPORTS'), 200))
  airlines: int(coalesce(env_nil('AIRLINES'), 20))
  customers: int(coalesce(env_nil('CUSTOMERS'), 1000))
  flights: int(coalesce(env_nil('FLIGHTS'), 500))
  seats_per_flight: int(coalesce(env_nil('SEATS_PER_FLIGHT'), 150))
  reservations_per_flight: int(coalesce(env_nil('RESERVATIONS_PER_FLIGHT'), 120))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_country
    query: |-
      CREATE TABLE IF NOT EXISTS country (
        co_id INT NOT NULL PRIMARY KEY,
        co_name VARCHAR(64) NOT NULL
      )

  - name: create_airport
    query: |-
      CREATE TABLE IF NOT EXISTS airport (
        ap_id INT NOT NULL PRIMARY KEY,
        ap_code CHAR(3) NOT NULL,
        ap_name VARCHAR(128) NOT NULL,
        ap_city VARCHAR(64) NOT NULL,
        ap_co_id INT NOT NULL,
        UNIQUE (ap_code),
        FOREIGN KEY (ap_co_id) REFERENCES country(co_id)
      )

  - name: create_airline
    query: |-
      CREATE TABLE IF NOT EXISTS airline (
        al_id INT NOT NULL PRIMARY KEY,
        al_iata_code CHAR(2) NOT NULL,
        al_name VARCHAR(128) NOT NULL,
        UNIQUE (al_iata_code)
      )

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        c_id INT NOT NULL PRIMARY KEY,
        c_base_ap_id INT NOT NULL,
        c_balance DECIMAL(12,2) NOT NULL,
        c_sattr00 VARCHAR(32) NOT NULL,
        c_sattr01 VARCHAR(32) NOT NULL,
        c_iattr00 INT NOT NULL,
        c_iattr01 INT NOT NULL,
        FOREIGN KEY (c_base_ap_id) REFERENCES airport(ap_id)
      )

  - name: create_flight
    query: |-
      CREATE TABLE IF NOT EXISTS flight (
        f_id INT NOT NULL PRIMARY KEY,
        f_al_id INT NOT NULL,
        f_depart_ap_id INT NOT NULL,
        f_arrive_ap_id INT NOT NULL,
        f_depart_time TIMESTAMP NOT NULL,
        f_arrive_time TIMESTAMP NOT NULL,
        f_seats_total INT NOT NULL,
        f_seats_left INT NOT NULL,
        f_base_price DECIMAL(12,2) NOT NULL,
        FOREIGN KEY (f_al_id) REFERENCES airline(al_id),
        FOREIGN KEY (f_depart_ap_id) REFERENCES airport(ap_id),
        FOREIGN KEY (f_arrive_ap_id) REFERENCES airport(ap_id)
      )

  - name: create_reservation
    query: |-
      CREATE TABLE IF NOT EXISTS reservation (
        r_id CHAR(36) NOT NULL DEFAULT (UUID()),
        r_c_id INT NOT NULL,
        r_f_id INT NOT NULL,
        r_seat INT NOT NULL,
        r_price DECIMAL(12,2) NOT NULL,
        r_iattr00 INT NOT NULL,
        r_iattr01 INT NOT NULL,
        PRIMARY KEY (r_id),
        FOREIGN KEY (r_c_id) REFERENCES customer(c_id),
        FOREIGN KEY (r_f_id) REFERENCES flight(f_id)
      )

  - name: create_idx_reservation_flight
    query: |-
      CREATE INDEX idx_reservation_flight
      ON reservation (r_f_id)

  - name: create_idx_reservation_customer
    query: |-
      CREATE INDEX idx_reservation_customer
      ON reservation (r_c_id)

  - name: create_idx_flight_depart
    query: |-
      CREATE INDEX idx_flight_depart
      ON flight (f_depart_ap_id, f_depart_time)

seed:

  - name: populate_country
    type: exec_batch
    count: countries
    size: batch_size
    args:
      - iter()
    query: |-
      INSERT INTO country (co_id, co_name)
      VALUES ($1, CONCAT('Country_', LPAD(CAST($1 AS CHAR), 3, '0')))

  - name: populate_airport
    type: exec_batch
    count: airports
    size: batch_size
    args:
      - iter()
      - countries
    query: |-
      INSERT INTO airport (ap_id, ap_code, ap_name, ap_city, ap_co_id)
      VALUES ($1,
        CONCAT(CHAR(65 + FLOOR(($1 - 1) / 676)), CHAR(65 + MOD(FLOOR(($1 - 1) / 26), 26)), CHAR(65 + MOD($1 - 1, 26))),
        CONCAT('Airport_', LPAD(CAST($1 AS CHAR), 4, '0')),
        CONCAT('City_', LPAD(CAST($1 AS CHAR), 4, '0')),
        (($1 - 1) % $2) + 1)

  - name: populate_airline
    type: exec_batch
    count: airlines
    size: batch_size
    args:
      - iter()
    query: |-
      INSERT INTO airline (al_id, al_iata_code, al_name)
      VALUES ($1,
        CONCAT(CHAR(65 + ($1 - 1) DIV 26), CHAR(65 + ($1 - 1) % 26)),
        CONCAT('Airline_', LPAD(CAST($1 AS CHAR), 3, '0')))

  - name: populate_customer
    type: exec_batch
    count: customers
    size: batch_size
    args:
      - iter()
      - airports
    query: |-
      INSERT INTO customer (c_id, c_base_ap_id, c_balance,
        c_sattr00, c_sattr01, c_iattr00, c_iattr01)
      VALUES ($1,
        FLOOR(RAND() * $2 + 1),
        0,
        SUBSTR(MD5(RAND()), 1, 16),
        SUBSTR(MD5(RAND()), 1, 16),
        FLOOR(RAND() * 1000),
        FLOOR(RAND() * 1000))

  - name: populate_flight
    type: exec_batch
    count: flights
    size: batch_size
    args:
      - iter()
      - airports
      - airlines
      - seats_per_flight
    query: |-
      INSERT INTO flight (f_id, f_al_id, f_depart_ap_id, f_arrive_ap_id,
        f_depart_time, f_arrive_time, f_seats_total, f_seats_left,
        f_base_price)
      VALUES ($1,
        FLOOR(RAND() * $3 + 1),
        FLOOR(RAND() * $2 + 1),
        FLOOR(RAND() * $2 + 1),
        DATE_ADD(NOW(), INTERVAL FLOOR(RAND() * 30) DAY),
        DATE_ADD(DATE_ADD(NOW(), INTERVAL FLOOR(RAND() * 30) DAY), INTERVAL 2 HOUR),
        $4,
        $4,
        ROUND(RAND() * 900 + 100, 2))

  - name: populate_reservation
    args:
      - batch(flights / batch_size)
      - batch_size
      - reservations_per_flight
      - customers
    query: |-
      INSERT INTO reservation (r_c_id, r_f_id, r_seat, r_price,
        r_iattr00, r_iattr01)
      SELECT
        FLOOR(RAND() * $4 + 1),
        fb.f_id,
        s.seq,
        ROUND(RAND() * 500 + 50, 2),
        FLOOR(RAND() * 100),
        FLOOR(RAND() * 100)
      FROM (
        SELECT f_id FROM flight
        ORDER BY f_id
        LIMIT $2 OFFSET $1
      ) fb
      CROSS JOIN (
        SELECT a.a + b.a * 10 + 1 AS seq
        FROM (SELECT 0 AS a UNION ALL SELECT 1 UNION ALL SELECT 2 UNION ALL SELECT 3 UNION ALL SELECT 4
              UNION ALL SELECT 5 UNION ALL SELECT 6 UNION ALL SELECT 7 UNION ALL SELECT 8 UNION ALL SELECT 9) a
        CROSS JOIN (SELECT 0 AS a UNION ALL SELECT 1 UNION ALL SELECT 2 UNION ALL SELECT 3 UNION ALL SELECT 4
              UNION ALL SELECT 5 UNION ALL SELECT 6 UNION ALL SELECT 7 UNION ALL SELECT 8 UNION ALL SELECT 9) b
        CROSS JOIN (SELECT 0 AS a UNION ALL SELECT 1) c
        HAVING seq <= $3
      ) s

  - name: update_seats_left
    type: exec
    query: |-
      UPDATE flight SET f_seats_left = f_seats_total - (
        SELECT COUNT(*) FROM reservation WHERE r_f_id = flight.f_id
      )

deseed:

  - name: delete_reservation
    type: exec
    query: DELETE FROM reservation

  - name: delete_flight
    type: exec
    query: DELETE FROM flight

  - name: delete_customer
    type: exec
    query: DELETE FROM customer

  - name: delete_airline
    type: exec
    query: DELETE FROM airline

  - name: delete_airport
    type: exec
    query: DELETE FROM airport

  - name: delete_country
    type: exec
    query: DELETE FROM country

down:

  - name: drop_reservation
    type: exec
    query: DROP TABLE IF EXISTS reservation

  - name: drop_flight
    type: exec
    query: DROP TABLE IF EXISTS flight

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer

  - name: drop_airline
    type: exec
    query: DROP TABLE IF EXISTS airline

  - name: drop_airport
    type: exec
    query: DROP TABLE IF EXISTS airport

  - name: drop_country
    type: exec
    query: DROP TABLE IF EXISTS country

init:

  - name: fetch_flights
    type: query
    query: SELECT f_id, f_depart_ap_id, f_seats_left FROM flight ORDER BY RAND()

  - name: fetch_customers
    type: query
    query: SELECT c_id FROM customer ORDER BY RAND()

  - name: fetch_reservations
    type: query
    query: SELECT r_id, r_c_id, r_f_id FROM reservation ORDER BY RAND()

  - name: fetch_airports
    type: query
    query: SELECT ap_id FROM airport

run_weights:
  find_flights: 10
  find_open_seats: 35
  new_reservation: 15
  update_customer: 10
  update_reservation: 10
  delete_reservation: 20

run:

  # Look up flights departing from an airport.
  - name: find_flights
    type: query
    args:
      - ref_rand('fetch_airports').ap_id
    query: |-
      SELECT f_id, f_al_id, f_depart_ap_id, f_arrive_ap_id,
        f_depart_time, f_arrive_time, f_seats_left, f_base_price
      FROM flight
      WHERE f_depart_ap_id = ?
        AND f_depart_time > NOW()
      ORDER BY f_depart_time
      LIMIT 10

  # Check how many seats are left on a flight.
  - name: find_open_seats
    type: query
    args:
      - ref_rand('fetch_flights').f_id
    query: |-
      SELECT f_seats_left FROM flight WHERE f_id = ?

  # Book a seat: decrement seats_left, insert reservation,
  # charge the customer.
  - transaction: new_reservation
    locals:
      c_id: ref_rand('fetch_customers').c_id
      f_id: ref_rand('fetch_flights').f_id
      seat: gen('number:1,150')
      price: gen('number:50,1000')
    queries:
      - name: decr_seats
        type: exec
        args:
          - local('f_id')
        query: |-
          UPDATE flight SET f_seats_left = f_seats_left - 1
          WHERE f_id = ? AND f_seats_left > 0

      - name: insert_reservation
        type: exec
        args:
          - local('c_id')
          - local('f_id')
          - local('seat')
          - local('f_id')
          - local('price')
        query: |-
          INSERT INTO reservation (r_c_id, r_f_id, r_seat, r_price,
            r_iattr00, r_iattr01)
          VALUES (?, ?, ?, (SELECT f_base_price FROM flight WHERE f_id = ?) + ?, 0, 0)

      - name: charge_customer
        type: exec
        args:
          - local('price')
          - local('c_id')
        query: |-
          UPDATE customer SET c_balance = c_balance + ?
          WHERE c_id = ?

  # Update customer attributes.
  - name: update_customer
    type: exec
    args:
      - gen('number:0,1000')
      - gen('number:0,1000')
      - ref_rand('fetch_customers').c_id
    query: |-
      UPDATE customer SET c_iattr00 = ?, c_iattr01 = ?
      WHERE c_id = ?

  # Change reservation attributes.
  - name: update_reservation
    type: exec
    args:
      - gen('number:0,100')
      - ref_rand('fetch_reservations').r_id
    query: |-
      UPDATE reservation SET r_iattr00 = ?
      WHERE r_id = ?

  # Cancel a reservation and release the seat.
  - transaction: delete_reservation
    locals:
      r_id: ref_rand('fetch_reservations').r_id
      f_id: ref_rand('fetch_reservations').r_f_id
    queries:
      - name: del_reservation
        type: exec
        args:
          - local('r_id')
        query: |-
          DELETE FROM reservation WHERE r_id = ?

      - name: incr_seats
        type: exec
        args:
          - local('f_id')
        query: |-
          UPDATE flight SET f_seats_left = f_seats_left + 1
          WHERE f_id = ?


expectations:
  - error_rate < 1
