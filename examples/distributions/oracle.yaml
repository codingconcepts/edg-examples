# Distributions workload for Oracle
#
# Connection URL format:
#   oracle://user:password@host:port/service

globals:
  rows: 10000
  batch_size: 1000

up:

  - name: create_distributions
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE distributions (
            id NUMBER GENERATED ALWAYS AS IDENTITY,
            dist_type VARCHAR2(50) NOT NULL,
            value NUMBER NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

seed:

  - name: clear_distributions
    type: exec
    query: TRUNCATE TABLE distributions

  - name: seed_uniform
    args:
      - batch(rows / batch_size)
      - batch_size
    query: |-
      INSERT INTO distributions (dist_type, value)
      SELECT 'uniform', DBMS_RANDOM.VALUE * 100
      FROM DUAL
      CONNECT BY LEVEL <= $2

deseed:

  - name: truncate_distributions
    type: exec
    query: TRUNCATE TABLE distributions

down:

  - name: drop_distributions
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE distributions CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

run:

  - name: insert_uniform
    type: exec
    args:
      - uniform(0, 100)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('uniform', :1)

  - name: insert_zipfian
    type: exec
    args:
      - zipf(1.1, 1.0, 99)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('zipfian', :1)

  - name: insert_normal
    type: exec
    args:
      - norm_f(50, 15, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('normal', :1)

  - name: insert_exponential
    type: exec
    args:
      - exp_f(0.5, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('exponential', :1)

  - name: insert_lognormal
    type: exec
    args:
      - lognorm_f(2.0, 0.5, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('lognormal', :1)

  - name: insert_pareto
    type: exec
    args:
      - pareto(2.0, 99)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('pareto', :1)

  - name: insert_beta
    type: exec
    args:
      - beta_f(2, 5, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('beta', :1)

  - name: insert_gamma
    type: exec
    args:
      - gamma_f(2, 0.5, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('gamma', :1)

  - name: insert_weibull
    type: exec
    args:
      - weibull_f(1.5, 50, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('weibull', :1)

  - name: insert_poisson
    type: exec
    args:
      - poisson(5.0)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('poisson', :1)

  - name: insert_binomial
    type: exec
    args:
      - binomial(20, 0.3)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('binomial', :1)

  - name: insert_empirical
    type: exec
    args:
      - empirical([5, 10, 10, 20, 30, 30, 30, 50, 80, 95])
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('empirical', :1)

  - name: insert_rwalk
    type: exec
    args:
      - rwalk_f('walk', 50, 0.0, 0.5, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('rwalk', :1)

run_weights:
  insert_uniform: 10
  insert_zipfian: 10
  insert_normal: 10
  insert_exponential: 10
  insert_lognormal: 10
  insert_pareto: 10
  insert_beta: 10
  insert_gamma: 10
  insert_weibull: 10
  insert_poisson: 10
  insert_binomial: 10
  insert_empirical: 10
  insert_rwalk: 10
