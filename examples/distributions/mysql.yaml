# Distributions workload for MySQL
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  rows: 10000
  batch_size: 1000

up:

  - name: create_distributions
    query: |-
      CREATE TABLE IF NOT EXISTS distributions (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        dist_type VARCHAR(50) NOT NULL,
        value DOUBLE NOT NULL
      )

seed:

  - name: seed_uniform
    args:
      - batch(rows / batch_size)
      - batch_size
    query: |-
      INSERT INTO distributions (dist_type, value)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $2
      )
      SELECT 'uniform', RAND() * 100
      FROM seq

deseed:

  - name: delete_distributions
    type: exec
    query: DELETE FROM distributions

down:

  - name: drop_distributions
    type: exec
    query: DROP TABLE IF EXISTS distributions

run:

  - name: insert_uniform
    type: exec
    args:
      - uniform(0, 100)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('uniform', ?)

  - name: insert_zipfian
    type: exec
    args:
      - zipf(1.1, 1.0, 99)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('zipfian', ?)

  - name: insert_normal
    type: exec
    args:
      - norm_f(50, 15, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('normal', ?)

  - name: insert_exponential
    type: exec
    args:
      - exp_f(0.5, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('exponential', ?)

  - name: insert_lognormal
    type: exec
    args:
      - lognorm_f(2.0, 0.5, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('lognormal', ?)

  - name: insert_pareto
    type: exec
    args:
      - pareto(2.0, 99)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('pareto', ?)

  - name: insert_beta
    type: exec
    args:
      - beta_f(2, 5, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('beta', ?)

  - name: insert_gamma
    type: exec
    args:
      - gamma_f(2, 0.5, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('gamma', ?)

  - name: insert_weibull
    type: exec
    args:
      - weibull_f(1.5, 50, 0, 100, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('weibull', ?)

  - name: insert_poisson
    type: exec
    args:
      - poisson(5.0)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('poisson', ?)

  - name: insert_binomial
    type: exec
    args:
      - binomial(20, 0.3)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('binomial', ?)

  - name: insert_empirical
    type: exec
    args:
      - empirical([5, 10, 10, 20, 30, 30, 30, 50, 80, 95])
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('empirical', ?)

  - name: insert_rwalk
    type: exec
    args:
      - rwalk_f('walk', 50, 0.0, 0.5, 2)
    query: |-
      INSERT INTO distributions (dist_type, value)
      VALUES ('rwalk', ?)

run_weights:
  insert_uniform: 10
  insert_zipfian: 10
  insert_normal: 10
  insert_exponential: 10
  insert_lognormal: 10
  insert_pareto: 10
  insert_beta: 10
  insert_gamma: 10
  insert_weibull: 10
  insert_poisson: 10
  insert_binomial: 10
  insert_empirical: 10
  insert_rwalk: 10
