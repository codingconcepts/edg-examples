# Reference data workload for Oracle
#
# Connection URL format:
#   oracle://user:password@host:port/service

globals:
  customers: 100

reference:
  regions:
    - {name: us, cities: [a, b, c]}
    - {name: eu, cities: [d, e, f]}
    - {name: ap, cities: [g, h, i]}

up:

  - name: create_customer
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE customer (
            id NUMBER GENERATED ALWAYS AS IDENTITY,
            email VARCHAR2(255) NOT NULL,
            region VARCHAR2(50) NOT NULL,
            city VARCHAR2(50) NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

seed:

  - name: clear_customer
    type: exec
    query: TRUNCATE TABLE customer

  - name: populate_customer
    type: exec_batch
    count: customers
    size: 10
    args:
      - gen('email')
      - ref_same('regions').name
      - set_rand(ref_same('regions').cities, [])
    query: |-
      INSERT ALL __values__(customer(email, region, city))

deseed:

  - name: truncate_customer
    type: exec
    query: TRUNCATE TABLE customer

down:

  - name: drop_customer
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE customer CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;
