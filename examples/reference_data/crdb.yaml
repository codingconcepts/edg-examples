globals:
  customers: 100

reference:
  regions:
    - {name: us, cities: [a, b, c]}
    - {name: eu, cities: [d, e, f]}
    - {name: ap, cities: [g, h, i]}

up:

  - name: create_customer
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email STRING NOT NULL,
        region STRING NOT NULL,
        city STRING NOT NULL
      )

seed:

  - name: populate_customer
    type: exec_batch
    count: customers
    size: 10
    args:
      - gen('email')
      - ref_same('regions').name
      - set_rand(ref_same('regions').cities, [])
    query: |-
      INSERT INTO customer (email, region, city)
      __values__

deseed:

  - name: truncate_customer
    type: exec
    query: TRUNCATE TABLE customer CASCADE

down:

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer