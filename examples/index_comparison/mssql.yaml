globals:
  rows: 100000
  batch_size: 5000
  categories: 50

up:

  - name: create_event_indexed
    query: |-
      IF NOT EXISTS (SELECT * FROM sys.tables WHERE name = 'event_indexed')
      CREATE TABLE event_indexed (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        category INT NOT NULL,
        payload NVARCHAR(MAX) NOT NULL,
        created_at DATETIME2 NOT NULL DEFAULT GETDATE()
      )

  - name: create_event_unindexed
    query: |-
      IF NOT EXISTS (SELECT * FROM sys.tables WHERE name = 'event_unindexed')
      CREATE TABLE event_unindexed (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        category INT NOT NULL,
        payload NVARCHAR(MAX) NOT NULL,
        created_at DATETIME2 NOT NULL DEFAULT GETDATE()
      )

  - name: create_index
    type: exec
    query: |-
      IF NOT EXISTS (SELECT * FROM sys.indexes WHERE name = 'idx_event_category')
      CREATE INDEX idx_event_category ON event_indexed (category)

seed:

  - name: populate_event_indexed
    type: exec_batch
    count: rows
    size: batch_size
    args:
      - gen('uuid')
      - gen('number:1,' + string(categories))
      - gen('sentence:5,10')
    query: |-
      INSERT INTO event_indexed (id, category, payload)
      __values__

  - name: populate_event_unindexed
    type: exec_batch
    count: rows
    size: batch_size
    args:
      - gen('uuid')
      - gen('number:1,' + string(categories))
      - gen('sentence:5,10')
    query: |-
      INSERT INTO event_unindexed (id, category, payload)
      __values__

deseed:

  - name: truncate_event_indexed
    type: exec
    query: TRUNCATE TABLE event_indexed

  - name: truncate_event_unindexed
    type: exec
    query: TRUNCATE TABLE event_unindexed

down:

  - name: drop_event_indexed
    type: exec
    query: DROP TABLE IF EXISTS event_indexed

  - name: drop_event_unindexed
    type: exec
    query: DROP TABLE IF EXISTS event_unindexed

run_weights:
  lookup_with_index: 50
  lookup_without_index: 50

run:

  - name: lookup_with_index
    type: query
    args:
      - gen('number:1,' + string(categories))
    query: |-
      SELECT id, payload, created_at
      FROM event_indexed
      WHERE category = @p1

  - name: lookup_without_index
    type: query
    args:
      - gen('number:1,' + string(categories))
    query: |-
      SELECT id, payload, created_at
      FROM event_unindexed
      WHERE category = @p1

expectations:
  - error_rate < 1
  - lookup_with_index.avg < lookup_without_index.avg
  - lookup_with_index.p99 < lookup_without_index.p99
