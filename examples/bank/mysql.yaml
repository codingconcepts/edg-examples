# Bank workload for MySQL
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true
#
# Example:
#   edg up --driver mysql --config _examples/bank/mysql.yaml \
#     --url "root:password@tcp(localhost:3306)/defaultdb?parseTime=true"

globals:
  customers: 100000
  initial_balance: 10000
  batch_size: 10000

up:

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        email VARCHAR(255) NOT NULL
      )

  - name: create_account
    query: |-
      CREATE TABLE IF NOT EXISTS account (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        balance DOUBLE NOT NULL,
        customer_id CHAR(36) NOT NULL,
        FOREIGN KEY (customer_id) REFERENCES customer(id)
      )

seed:

  - name: populate_customer
    type: exec_batch
    count: customers
    size: batch_size
    args:
      - gen('email')
    query: |-
      INSERT INTO customer (email)
      __values__

  - name: populate_account
    args:
      - batch(customers / batch_size, batch_size)
      - initial_balance
      - batch_size
    query: |-
      INSERT INTO account (balance, customer_id)
      SELECT $2, c.id
      FROM customer c
      ORDER BY c.id
      LIMIT $3 OFFSET $1

deseed:

  - name: delete_account
    type: exec
    query: DELETE FROM account

  - name: delete_customer
    type: exec
    query: DELETE FROM customer

down:

  - name: drop_account
    type: exec
    query: DROP TABLE IF EXISTS account

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer

init:

  - name: fetch_accounts
    type: query
    query: SELECT id FROM account ORDER BY RAND()

run_weights:
  check_balance: 50
  credit_account: 5
  make_transfer: 45

run:

  - name: check_balance
    type: query
    args:
      - ref_rand('fetch_accounts').id
    query: |-
      SELECT balance FROM account WHERE id = ?

  - name: credit_account
    type: exec
    args:
      - gen('number:1,1000')
      - ref_rand('fetch_accounts').id
    query: |-
      UPDATE account SET balance = balance + ?
      WHERE id = ?

  - name: make_transfer
    type: exec
    args:
      - ref_diff('fetch_accounts').id
      - ref_diff('fetch_accounts').id
      - gen('number:1,100')
    query: |-
      UPDATE account a
      JOIN (SELECT ? AS from_id, ? AS to_id, CAST(? AS DOUBLE) AS amount) p ON 1=1
      SET a.balance = CASE
                        WHEN a.id = p.to_id THEN a.balance + p.amount
                        WHEN a.id = p.from_id THEN a.balance - p.amount
                      END
      WHERE a.id = p.from_id OR a.id = p.to_id
