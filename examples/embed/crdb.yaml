globals:
  products: 50
  batch_size: 10

reference:
  product_catalog: !include products.yaml

up:

  - name: create_product
    query: |-
      CREATE TABLE IF NOT EXISTS product (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name STRING NOT NULL,
        description STRING NOT NULL,
        embedding VECTOR(512) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT now()
      )

  - name: create_embedding_index
    query: |-
      CREATE VECTOR INDEX IF NOT EXISTS idx_product_embedding
      ON product (embedding)

seed:

  - name: populate_product
    type: exec_batch
    count: products
    size: batch_size
    args:
      - ref_each(product_catalog).name
      - ref_each(product_catalog).description
      - embed(ref_each(product_catalog).name, ref_each(product_catalog).description)
    query: |-
      INSERT INTO product (name, description, embedding)
      SELECT n, d, e::VECTOR
      FROM unnest(
        ARRAY[$1],
        ARRAY[$2],
        ARRAY[$3]
      ) AS t(n, d, e)

deseed:

  - name: truncate_product
    type: exec
    query: TRUNCATE TABLE product

down:

  - name: drop_product
    type: exec
    query: DROP TABLE IF EXISTS product

init:

  - name: fetch_products
    type: query
    query: SELECT id, name FROM product

run:

  - name: insert_product
    type: exec
    args:
      - ref_same('product_catalog').name
      - ref_same('product_catalog').description
      - embed(ref_same('product_catalog').name, ref_same('product_catalog').description)
    query: |-
      INSERT INTO product (name, description, embedding)
      VALUES ($1, $2, $3::VECTOR)

  - name: find_similar
    type: query
    args:
      - embed(ref_rand('product_catalog').name)
    query: |-
      SELECT id, name, embedding <=> $1::VECTOR AS distance
      FROM product
      ORDER BY embedding <=> $1::VECTOR
      LIMIT 10
