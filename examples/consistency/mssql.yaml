# Consistency Workload for SQL Server

globals:
  accounts: int(coalesce(env_nil('ACCOUNTS'), 10))
  initial_balance: int(coalesce(env_nil('INITIAL_BALANCE'), 1000))

up:

  - name: create_account
    query: |-
      IF OBJECT_ID('account', 'U') IS NULL
      CREATE TABLE account (
        id BIGINT PRIMARY KEY,
        balance BIGINT NOT NULL,
        version BIGINT NOT NULL DEFAULT 0
      )

  - name: create_ledger
    query: |-
      IF OBJECT_ID('ledger', 'U') IS NULL
      CREATE TABLE ledger (
        id BIGINT IDENTITY(1,1) PRIMARY KEY,
        account_id BIGINT NOT NULL,
        amount BIGINT NOT NULL,
        created_at DATETIME2 NOT NULL DEFAULT GETDATE(),
        FOREIGN KEY (account_id) REFERENCES account(id)
      )

  - name: create_counter
    query: |-
      IF OBJECT_ID('counter', 'U') IS NULL
      CREATE TABLE counter (
        id BIGINT PRIMARY KEY,
        value BIGINT NOT NULL DEFAULT 0
      )

  - name: create_oncall
    query: |-
      IF OBJECT_ID('oncall', 'U') IS NULL
      CREATE TABLE oncall (
        doctor_id BIGINT PRIMARY KEY,
        on_duty BIT NOT NULL DEFAULT 1
      )

  - name: create_blind_write
    query: |-
      IF OBJECT_ID('blind_write', 'U') IS NULL
      CREATE TABLE blind_write (
        id BIGINT PRIMARY KEY,
        value BIGINT NOT NULL DEFAULT 0
      )

  - name: create_cas
    query: |-
      IF OBJECT_ID('cas', 'U') IS NULL
      CREATE TABLE cas (
        id BIGINT PRIMARY KEY,
        value BIGINT NOT NULL DEFAULT 0,
        version BIGINT NOT NULL DEFAULT 0
      )

seed:

  - name: populate_accounts
    args:
      - accounts
      - initial_balance
    query: |-
      WITH seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      MERGE INTO account AS tgt
      USING (SELECT s AS id, CAST($2 AS BIGINT) AS balance FROM seq) AS src
      ON tgt.id = src.id
      WHEN NOT MATCHED THEN INSERT (id, balance) VALUES (src.id, src.balance)
      OPTION (MAXRECURSION 10000);

  - name: populate_counters
    query: |-
      MERGE INTO counter AS tgt
      USING (VALUES (1, 0), (2, 0)) AS src (id, value)
      ON tgt.id = src.id
      WHEN NOT MATCHED THEN INSERT (id, value) VALUES (src.id, src.value);

  - name: populate_oncall
    query: |-
      MERGE INTO oncall AS tgt
      USING (VALUES (1, 1), (2, 1), (3, 1)) AS src (doctor_id, on_duty)
      ON tgt.doctor_id = src.doctor_id
      WHEN NOT MATCHED THEN INSERT (doctor_id, on_duty) VALUES (src.doctor_id, src.on_duty);

  - name: populate_blind_write
    args:
      - accounts
    query: |-
      WITH seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      MERGE INTO blind_write AS tgt
      USING (SELECT s AS id, CAST(0 AS BIGINT) AS value FROM seq) AS src
      ON tgt.id = src.id
      WHEN NOT MATCHED THEN INSERT (id, value) VALUES (src.id, src.value)
      OPTION (MAXRECURSION 10000);

  - name: populate_cas
    args:
      - accounts
    query: |-
      WITH seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      MERGE INTO cas AS tgt
      USING (SELECT s AS id, CAST(0 AS BIGINT) AS value FROM seq) AS src
      ON tgt.id = src.id
      WHEN NOT MATCHED THEN INSERT (id, value) VALUES (src.id, src.value)
      OPTION (MAXRECURSION 10000);

deseed:

  - name: delete_ledger
    type: exec
    query: DELETE FROM ledger

  - name: reset_accounts
    type: exec
    args:
      - initial_balance
    query: |-
      UPDATE account SET balance = $1, version = 0

  - name: reset_counters
    type: exec
    query: UPDATE counter SET value = 0

  - name: reset_oncall
    type: exec
    query: UPDATE oncall SET on_duty = 1

  - name: reset_blind_write
    type: exec
    query: UPDATE blind_write SET value = 0

  - name: reset_cas
    type: exec
    query: UPDATE cas SET value = 0, version = 0

down:

  - name: drop_ledger
    type: exec
    query: DROP TABLE IF EXISTS ledger

  - name: drop_account
    type: exec
    query: DROP TABLE IF EXISTS account

  - name: drop_oncall
    type: exec
    query: DROP TABLE IF EXISTS oncall

  - name: drop_counter
    type: exec
    query: DROP TABLE IF EXISTS counter

  - name: drop_blind_write
    type: exec
    query: DROP TABLE IF EXISTS blind_write

  - name: drop_cas
    type: exec
    query: DROP TABLE IF EXISTS cas

run_weights:
  count_ledger: 10
  insert_ledger: 10
  increment_counter: 10
  transfer: 10
  blind_write: 10
  cas_update: 10
  check_total_balance: 10
  go_off_duty: 10

run:

  - name: count_ledger
    type: query
    args:
      - gen('number:1,' + string(accounts))
    query: |-
      SELECT COUNT(*) AS entries, COALESCE(SUM(amount), 0) AS total
      FROM ledger
      WHERE account_id = @p1

  - name: insert_ledger
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,500')
    query: |-
      INSERT INTO ledger (account_id, amount)
      VALUES (@p1, @p2)

  - name: increment_counter
    type: exec
    args:
      - gen('number:1,2')
    query: |-
      UPDATE counter SET value = value + 1 WHERE id = @p1

  - name: transfer
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,' + string(accounts))
      - gen('number:1,100')
    query: |-
      UPDATE account
      SET balance = CASE
                      WHEN id = @p2 THEN balance + CAST(@p3 AS BIGINT)
                      WHEN id = @p1 THEN balance - CAST(@p3 AS BIGINT)
                    END
      WHERE id IN (@p1, @p2)
        AND @p1 != @p2

  - name: blind_write
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:100,900')
    query: |-
      UPDATE blind_write SET value = CAST(@p2 AS BIGINT) WHERE id = @p1

  - name: cas_update
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,100')
    query: |-
      UPDATE cas
      SET value = value + CAST(@p2 AS BIGINT), version = version + 1
      WHERE id = @p1
        AND version = (SELECT version FROM cas WHERE id = @p1)

  - name: check_total_balance
    type: query
    query: |-
      SELECT SUM(balance) AS total, COUNT(*) AS num_accounts
      FROM account

  - name: go_off_duty
    type: exec
    args:
      - gen('number:1,3')
    query: |-
      UPDATE oncall SET on_duty = 0
      WHERE doctor_id = @p1
        AND (SELECT COUNT(*) FROM oncall WHERE on_duty = 1) > 1

expectations:
  - error_rate < 25

  - name: lost_update
    query: SELECT CAST(COALESCE(SUM(value), 0) AS BIGINT) AS counter_total FROM counter
    expr: counter_total >= increment_counter.success_count

  - name: phantom_row
    query: SELECT COUNT(*) AS n FROM account
    expr: n == accounts

  - name: dirty_write
    query: SELECT CAST(COALESCE(SUM(balance), 0) AS BIGINT) AS total FROM account
    expr: total == accounts * initial_balance

  - name: write_skew
    query: SELECT CAST(COALESCE(SUM(version), 0) AS BIGINT) AS total_versions FROM cas
    expr: total_versions <= cas_update.success_count

  - name: dirty_read
    query: SELECT COUNT(*) AS n FROM blind_write
    expr: n == accounts

  - name: read_skew
    query: SELECT COUNT(*) AS on_duty FROM oncall WHERE on_duty = 1
    expr: on_duty >= 1
