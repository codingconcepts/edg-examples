# Consistency Workload for Cassandra

globals:
  accounts: int(coalesce(env_nil('ACCOUNTS'), 10))
  initial_balance: int(coalesce(env_nil('INITIAL_BALANCE'), 1000))

up:

  - name: create_keyspace
    type: exec
    query: |-
      CREATE KEYSPACE IF NOT EXISTS edg
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1}

  - name: create_account
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.account (
        id BIGINT PRIMARY KEY,
        balance BIGINT,
        version BIGINT
      )

  - name: create_ledger
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.ledger (
        account_id BIGINT,
        id TIMEUUID,
        amount BIGINT,
        PRIMARY KEY (account_id, id)
      )

  - name: create_counter
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.counter (
        id BIGINT PRIMARY KEY,
        value BIGINT
      )

  - name: create_oncall
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.oncall (
        doctor_id BIGINT PRIMARY KEY,
        on_duty BOOLEAN
      )

  - name: create_blind_write
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.blind_write (
        id BIGINT PRIMARY KEY,
        value BIGINT
      )

  - name: create_cas
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS edg.cas (
        id BIGINT PRIMARY KEY,
        value BIGINT,
        version BIGINT
      )

seed:

  - name: populate_accounts
    type: exec_batch
    count: accounts
    size: accounts
    args:
      - iter()
      - initial_balance
    query: |-
      INSERT INTO edg.account (id, balance, version) VALUES ($1, $2, 0)

  - name: populate_counters
    type: exec_batch
    count: 2
    size: 2
    args:
      - iter()
    query: |-
      INSERT INTO edg.counter (id, value) VALUES ($1, 0)

  - name: populate_oncall
    type: exec_batch
    count: 3
    size: 3
    args:
      - iter()
    query: |-
      INSERT INTO edg.oncall (doctor_id, on_duty) VALUES ($1, true)

  - name: populate_blind_write
    type: exec_batch
    count: accounts
    size: accounts
    args:
      - iter()
    query: |-
      INSERT INTO edg.blind_write (id, value) VALUES ($1, 0)

  - name: populate_cas
    type: exec_batch
    count: accounts
    size: accounts
    args:
      - iter()
    query: |-
      INSERT INTO edg.cas (id, value, version) VALUES ($1, 0, 0)

deseed:

  - name: truncate_ledger
    type: exec
    query: TRUNCATE edg.ledger

  - name: truncate_account
    type: exec
    query: TRUNCATE edg.account

  - name: truncate_counter
    type: exec
    query: TRUNCATE edg.counter

  - name: truncate_oncall
    type: exec
    query: TRUNCATE edg.oncall

  - name: truncate_blind_write
    type: exec
    query: TRUNCATE edg.blind_write

  - name: truncate_cas
    type: exec
    query: TRUNCATE edg.cas

  - name: reseed_accounts
    type: exec_batch
    count: accounts
    size: accounts
    args:
      - iter()
      - initial_balance
    query: |-
      INSERT INTO edg.account (id, balance, version) VALUES ($1, $2, 0)

  - name: reseed_counters
    type: exec_batch
    count: 2
    size: 2
    args:
      - iter()
    query: |-
      INSERT INTO edg.counter (id, value) VALUES ($1, 0)

  - name: reseed_oncall
    type: exec_batch
    count: 3
    size: 3
    args:
      - iter()
    query: |-
      INSERT INTO edg.oncall (doctor_id, on_duty) VALUES ($1, true)

  - name: reseed_blind_write
    type: exec_batch
    count: accounts
    size: accounts
    args:
      - iter()
    query: |-
      INSERT INTO edg.blind_write (id, value) VALUES ($1, 0)

  - name: reseed_cas
    type: exec_batch
    count: accounts
    size: accounts
    args:
      - iter()
    query: |-
      INSERT INTO edg.cas (id, value, version) VALUES ($1, 0, 0)

down:

  - name: drop_ledger
    type: exec
    query: DROP TABLE IF EXISTS edg.ledger

  - name: drop_account
    type: exec
    query: DROP TABLE IF EXISTS edg.account

  - name: drop_oncall
    type: exec
    query: DROP TABLE IF EXISTS edg.oncall

  - name: drop_counter
    type: exec
    query: DROP TABLE IF EXISTS edg.counter

  - name: drop_blind_write
    type: exec
    query: DROP TABLE IF EXISTS edg.blind_write

  - name: drop_cas
    type: exec
    query: DROP TABLE IF EXISTS edg.cas

  - name: drop_keyspace
    type: exec
    query: DROP KEYSPACE IF EXISTS edg

run_weights:
  count_ledger: 10
  insert_ledger: 10
  increment_counter: 10
  transfer: 10
  blind_write: 10
  cas_update: 10
  check_total_balance: 10
  go_off_duty: 10

run:

  - name: count_ledger
    type: query
    args:
      - gen('number:1,' + string(accounts))
    query: |-
      SELECT COUNT(*) AS entry_count, SUM(amount) AS total
      FROM edg.ledger
      WHERE account_id = $1

  - name: insert_ledger
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,500')
    query: |-
      INSERT INTO edg.ledger (account_id, id, amount) VALUES ($1, now(), $2)

  - transaction: increment_counter
    locals:
      counter_id: gen('number:1,2')
    queries:
      - name: read_counter
        type: query
        args:
          - local('counter_id')
        query: |-
          SELECT id, value FROM edg.counter WHERE id = $1
      - name: write_counter
        type: exec
        args:
          - local('counter_id')
          - ref_same('read_counter').value + 1
        query: |-
          UPDATE edg.counter SET value = $2 WHERE id = $1

  - transaction: transfer
    locals:
      from_id: gen('number:1,' + string(accounts))
      to_id: gen('number:1,' + string(accounts))
      amount: gen('number:1,100')
    queries:
      - rollback_if: "local('from_id') == local('to_id')"
      - name: read_from
        type: query
        args:
          - local('from_id')
        query: |-
          SELECT id, balance FROM edg.account WHERE id = $1
      - name: read_to
        type: query
        args:
          - local('to_id')
        query: |-
          SELECT id, balance FROM edg.account WHERE id = $1
      - name: debit_from
        type: exec
        args:
          - local('from_id')
          - ref_same('read_from').balance - local('amount')
        query: |-
          UPDATE edg.account SET balance = $2 WHERE id = $1
      - name: credit_to
        type: exec
        args:
          - local('to_id')
          - ref_same('read_to').balance + local('amount')
        query: |-
          UPDATE edg.account SET balance = $2 WHERE id = $1

  - name: blind_write
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:100,900')
    query: |-
      UPDATE edg.blind_write SET value = $2 WHERE id = $1

  - transaction: cas_update
    locals:
      overwrite_id: gen('number:1,' + string(accounts))
      amount: gen('number:1,100')
    queries:
      - name: read_version
        type: query
        args:
          - local('overwrite_id')
        query: |-
          SELECT id, value, version FROM edg.cas WHERE id = $1
      - name: update_if_match
        type: exec
        args:
          - local('overwrite_id')
          - ref_same('read_version').value + local('amount')
          - ref_same('read_version').version + 1
          - ref_same('read_version').version
        query: |-
          UPDATE edg.cas SET value = $2, version = $3 WHERE id = $1 IF version = $4

  - name: check_total_balance
    type: query
    query: |-
      SELECT SUM(balance) AS total, COUNT(*) AS num_accounts
      FROM edg.account

  - transaction: go_off_duty
    locals:
      doctor_id: gen('number:1,3')
    queries:
      - name: count_on_duty
        type: query
        query: |-
          SELECT COUNT(*) AS n FROM edg.oncall WHERE on_duty = true ALLOW FILTERING
      - rollback_if: "ref_same('count_on_duty').n <= 1"
      - name: set_off_duty
        type: exec
        args:
          - local('doctor_id')
        query: |-
          UPDATE edg.oncall SET on_duty = false WHERE doctor_id = $1

expectations:
  - error_rate < 25

  - name: lost_update
    query: SELECT SUM(value) AS counter_total FROM edg.counter
    expr: counter_total >= increment_counter.success_count

  - name: phantom_row
    query: SELECT COUNT(*) AS n FROM edg.account
    expr: n == accounts

  - name: dirty_write
    query: SELECT SUM(balance) AS total, COUNT(*) AS num_accounts FROM edg.account
    expr: total == accounts * initial_balance

  - name: write_skew
    query: SELECT SUM(version) AS total_versions FROM edg.cas
    expr: total_versions <= cas_update.success_count

  - name: dirty_read
    query: SELECT COUNT(*) AS n FROM edg.blind_write
    expr: n == accounts

  - name: read_skew
    query: SELECT COUNT(*) AS on_duty FROM edg.oncall WHERE on_duty = true ALLOW FILTERING
    expr: on_duty >= 1
