# Consistency Workload for Google Cloud Spanner

globals:
  accounts: int(coalesce(env_nil('ACCOUNTS'), 10))
  initial_balance: int(coalesce(env_nil('INITIAL_BALANCE'), 1000))

up:

  - name: create_account
    query: |-
      CREATE TABLE IF NOT EXISTS account (
        id INT64 NOT NULL,
        balance INT64 NOT NULL,
        version INT64 NOT NULL DEFAULT (0)
      ) PRIMARY KEY (id)

  - name: create_ledger
    query: |-
      CREATE TABLE IF NOT EXISTS ledger (
        id STRING(36) NOT NULL DEFAULT (GENERATE_UUID()),
        account_id INT64 NOT NULL,
        amount INT64 NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT (CURRENT_TIMESTAMP()),
        FOREIGN KEY (account_id) REFERENCES account(id)
      ) PRIMARY KEY (id)

  - name: create_counter
    query: |-
      CREATE TABLE IF NOT EXISTS counter (
        id INT64 NOT NULL,
        value INT64 NOT NULL DEFAULT (0)
      ) PRIMARY KEY (id)

  - name: create_oncall
    query: |-
      CREATE TABLE IF NOT EXISTS oncall (
        doctor_id INT64 NOT NULL,
        on_duty BOOL NOT NULL DEFAULT (true)
      ) PRIMARY KEY (doctor_id)

  - name: create_blind_write
    query: |-
      CREATE TABLE IF NOT EXISTS blind_write (
        id INT64 NOT NULL,
        value INT64 NOT NULL DEFAULT (0)
      ) PRIMARY KEY (id)

  - name: create_cas
    query: |-
      CREATE TABLE IF NOT EXISTS cas (
        id INT64 NOT NULL,
        value INT64 NOT NULL DEFAULT (0),
        version INT64 NOT NULL DEFAULT (0)
      ) PRIMARY KEY (id)

seed:

  - name: populate_accounts
    args:
      - accounts
      - initial_balance
    query: |-
      INSERT OR UPDATE INTO account (id, balance, version)
      SELECT s, $2, 0
      FROM UNNEST(GENERATE_ARRAY(1, $1)) AS s

  - name: populate_counters
    type: exec_batch
    count: 2
    size: 2
    args:
      - iter()
    query: |-
      INSERT OR UPDATE INTO counter (id, value) VALUES ($1, 0)

  - name: populate_oncall
    type: exec_batch
    count: 3
    size: 3
    args:
      - iter()
    query: |-
      INSERT OR UPDATE INTO oncall (doctor_id, on_duty) VALUES ($1, true)

  - name: populate_blind_write
    args:
      - accounts
    query: |-
      INSERT OR UPDATE INTO blind_write (id, value)
      SELECT s, 0
      FROM UNNEST(GENERATE_ARRAY(1, $1)) AS s

  - name: populate_cas
    args:
      - accounts
    query: |-
      INSERT OR UPDATE INTO cas (id, value)
      SELECT s, 0
      FROM UNNEST(GENERATE_ARRAY(1, $1)) AS s

deseed:

  - name: delete_ledger
    type: exec
    query: DELETE FROM ledger WHERE TRUE

  - name: reset_accounts
    type: exec
    args:
      - initial_balance
    query: |-
      UPDATE account SET balance = $1, version = 0 WHERE TRUE

  - name: reset_counters
    type: exec
    query: UPDATE counter SET value = 0 WHERE TRUE

  - name: reset_oncall
    type: exec
    query: UPDATE oncall SET on_duty = true WHERE TRUE

  - name: reset_blind_write
    type: exec
    query: UPDATE blind_write SET value = 0 WHERE TRUE

  - name: reset_cas
    type: exec
    query: UPDATE cas SET value = 0, version = 0 WHERE TRUE

down:

  - name: drop_ledger
    type: exec
    query: DROP TABLE IF EXISTS ledger

  - name: drop_account
    type: exec
    query: DROP TABLE IF EXISTS account

  - name: drop_oncall
    type: exec
    query: DROP TABLE IF EXISTS oncall

  - name: drop_counter
    type: exec
    query: DROP TABLE IF EXISTS counter

  - name: drop_blind_write
    type: exec
    query: DROP TABLE IF EXISTS blind_write

  - name: drop_cas
    type: exec
    query: DROP TABLE IF EXISTS cas

run_weights:
  count_ledger: 10
  insert_ledger: 10
  increment_counter: 10
  transfer: 10
  blind_write: 10
  cas_update: 10
  check_total_balance: 10
  go_off_duty: 10

run:

  - name: count_ledger
    type: query
    args:
      - gen('number:1,' + string(accounts))
    query: |-
      SELECT COUNT(*) AS entries, COALESCE(SUM(amount), 0) AS total
      FROM ledger
      WHERE account_id = $1

  - name: insert_ledger
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,500')
    query: |-
      INSERT INTO ledger (account_id, amount)
      VALUES ($1, $2)

  - name: increment_counter
    type: exec
    args:
      - gen('number:1,2')
    query: |-
      UPDATE counter SET value = value + 1 WHERE id = $1

  - name: transfer
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,' + string(accounts))
      - gen('number:1,100')
    query: |-
      UPDATE account SET
        balance = CASE
                    WHEN id = $2 THEN balance + $3
                    WHEN id = $1 THEN balance - $3
                  END
      WHERE id IN UNNEST([$1, $2])
        AND $1 != $2

  - name: blind_write
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:100,900')
    query: |-
      UPDATE blind_write SET value = $2 WHERE id = $1

  - name: cas_update
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,100')
    query: |-
      UPDATE cas
      SET value = value + $2, version = version + 1
      WHERE id = $1
        AND version = (SELECT version FROM cas WHERE id = $1)

  - name: check_total_balance
    type: query
    query: |-
      SELECT SUM(balance) AS total, COUNT(*) AS num_accounts
      FROM account

  - name: go_off_duty
    type: exec
    args:
      - gen('number:1,3')
    query: |-
      UPDATE oncall SET on_duty = false
      WHERE doctor_id = $1
        AND (SELECT COUNT(*) FROM oncall WHERE on_duty = true) > 1

expectations:
  - error_rate < 25

  - name: lost_update
    query: SELECT COALESCE(SUM(value), 0) AS counter_total FROM counter
    expr: counter_total >= increment_counter.success_count

  - name: phantom_row
    query: SELECT COUNT(*) AS n FROM account
    expr: n == accounts

  - name: dirty_write
    query: SELECT COALESCE(SUM(balance), 0) AS total FROM account
    expr: total == accounts * initial_balance

  - name: write_skew
    query: SELECT COALESCE(SUM(version), 0) AS total_versions FROM cas
    expr: total_versions <= cas_update.success_count

  - name: dirty_read
    query: SELECT COUNT(*) AS n FROM blind_write
    expr: n == accounts

  - name: read_skew
    query: SELECT COUNT(*) AS on_duty FROM oncall WHERE on_duty = true
    expr: on_duty >= 1
