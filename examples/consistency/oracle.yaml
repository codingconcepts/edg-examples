# Consistency Workload for Oracle

globals:
  accounts: int(coalesce(env_nil('ACCOUNTS'), 10))
  initial_balance: int(coalesce(env_nil('INITIAL_BALANCE'), 1000))

up:

  - name: create_account
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE account (
            id NUMBER(19) PRIMARY KEY,
            balance NUMBER(19) NOT NULL,
            version NUMBER(19) DEFAULT 0 NOT NULL
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_ledger
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE ledger (
            id NUMBER GENERATED ALWAYS AS IDENTITY,
            account_id NUMBER(19) NOT NULL,
            amount NUMBER(19) NOT NULL,
            created_at TIMESTAMP WITH TIME ZONE DEFAULT SYSTIMESTAMP NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_counter
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE counter (
            id NUMBER(19) PRIMARY KEY,
            value NUMBER(19) DEFAULT 0 NOT NULL
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_oncall
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE oncall (
            doctor_id NUMBER(19) PRIMARY KEY,
            on_duty NUMBER(1) DEFAULT 1 NOT NULL
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_blind_write
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE blind_write (
            id NUMBER(19) PRIMARY KEY,
            value NUMBER(19) DEFAULT 0 NOT NULL
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_cas
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE cas (
            id NUMBER(19) PRIMARY KEY,
            value NUMBER(19) DEFAULT 0 NOT NULL,
            version NUMBER(19) DEFAULT 0 NOT NULL
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

seed:

  - name: populate_accounts
    args:
      - accounts
      - initial_balance
    query: |-
      MERGE INTO account tgt
      USING (SELECT LEVEL AS id, $2 AS balance FROM DUAL CONNECT BY LEVEL <= $1) src
      ON (tgt.id = src.id)
      WHEN NOT MATCHED THEN INSERT (id, balance) VALUES (src.id, src.balance)

  - name: populate_counters
    query: |-
      MERGE INTO counter tgt
      USING (SELECT 1 AS id, 0 AS value FROM DUAL UNION ALL SELECT 2, 0 FROM DUAL) src
      ON (tgt.id = src.id)
      WHEN NOT MATCHED THEN INSERT (id, value) VALUES (src.id, src.value)

  - name: populate_oncall
    query: |-
      MERGE INTO oncall tgt
      USING (SELECT 1 AS doctor_id, 1 AS on_duty FROM DUAL
             UNION ALL SELECT 2, 1 FROM DUAL
             UNION ALL SELECT 3, 1 FROM DUAL) src
      ON (tgt.doctor_id = src.doctor_id)
      WHEN NOT MATCHED THEN INSERT (doctor_id, on_duty) VALUES (src.doctor_id, src.on_duty)

  - name: populate_blind_write
    args:
      - accounts
    query: |-
      MERGE INTO blind_write tgt
      USING (SELECT LEVEL AS id, 0 AS value FROM DUAL CONNECT BY LEVEL <= $1) src
      ON (tgt.id = src.id)
      WHEN NOT MATCHED THEN INSERT (id, value) VALUES (src.id, src.value)

  - name: populate_cas
    args:
      - accounts
    query: |-
      MERGE INTO cas tgt
      USING (SELECT LEVEL AS id, 0 AS value FROM DUAL CONNECT BY LEVEL <= $1) src
      ON (tgt.id = src.id)
      WHEN NOT MATCHED THEN INSERT (id, value) VALUES (src.id, src.value)

deseed:

  - name: truncate_ledger
    type: exec
    query: TRUNCATE TABLE ledger

  - name: reset_accounts
    type: exec
    args:
      - initial_balance
    query: |-
      UPDATE account SET balance = $1, version = 0

  - name: reset_counters
    type: exec
    query: UPDATE counter SET value = 0

  - name: reset_oncall
    type: exec
    query: UPDATE oncall SET on_duty = 1

  - name: reset_blind_write
    type: exec
    query: UPDATE blind_write SET value = 0

  - name: reset_cas
    type: exec
    query: UPDATE cas SET value = 0, version = 0

down:

  - name: drop_ledger
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE ledger CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_account
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE account CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_oncall
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE oncall CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_counter
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE counter CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_blind_write
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE blind_write CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_cas
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE cas CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

run_weights:
  count_ledger: 10
  insert_ledger: 10
  increment_counter: 10
  transfer: 10
  blind_write: 10
  cas_update: 10
  check_total_balance: 10
  go_off_duty: 10

run:

  - name: count_ledger
    type: query
    args:
      - gen('number:1,' + string(accounts))
    query: |-
      SELECT COUNT(*) AS entries, COALESCE(SUM(amount), 0) AS total
      FROM ledger
      WHERE account_id = :1

  - name: insert_ledger
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,500')
    query: |-
      INSERT INTO ledger (account_id, amount)
      VALUES (:1, :2)

  - name: increment_counter
    type: exec
    args:
      - gen('number:1,2')
    query: |-
      UPDATE counter SET value = value + 1 WHERE id = :1

  - name: transfer
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,' + string(accounts))
      - gen('number:1,100')
    query: |-
      DECLARE
        v_from_id NUMBER := :1;
        v_to_id NUMBER := :2;
        v_amount NUMBER := :3;
      BEGIN
        UPDATE account SET
          balance = CASE
                      WHEN id = v_to_id THEN balance + v_amount
                      WHEN id = v_from_id THEN balance - v_amount
                    END
        WHERE id IN (v_from_id, v_to_id)
          AND v_from_id != v_to_id;
      END;

  - name: blind_write
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:100,900')
    query: |-
      UPDATE blind_write SET value = :2 WHERE id = :1

  - name: cas_update
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,100')
    query: |-
      UPDATE cas
      SET value = value + :2, version = version + 1
      WHERE id = :1
        AND version = (SELECT version FROM cas WHERE id = :1)

  - name: check_total_balance
    type: query
    query: |-
      SELECT SUM(balance) AS total, COUNT(*) AS num_accounts
      FROM account

  - name: go_off_duty
    type: exec
    args:
      - gen('number:1,3')
    query: |-
      UPDATE oncall SET on_duty = 0
      WHERE doctor_id = :1
        AND (SELECT COUNT(*) FROM oncall WHERE on_duty = 1) > 1

expectations:
  - error_rate < 25

  - name: lost_update
    query: SELECT CAST(COALESCE(SUM(value), 0) AS NUMBER(19)) AS counter_total FROM counter
    expr: counter_total >= increment_counter.success_count

  - name: phantom_row
    query: SELECT COUNT(*) AS n FROM account
    expr: n == accounts

  - name: dirty_write
    query: SELECT CAST(COALESCE(SUM(balance), 0) AS NUMBER(19)) AS total FROM account
    expr: total == accounts * initial_balance

  - name: write_skew
    query: SELECT CAST(COALESCE(SUM(version), 0) AS NUMBER(19)) AS total_versions FROM cas
    expr: total_versions <= cas_update.success_count

  - name: dirty_read
    query: SELECT COUNT(*) AS n FROM blind_write
    expr: n == accounts

  - name: read_skew
    query: SELECT COUNT(*) AS on_duty FROM oncall WHERE on_duty = 1
    expr: on_duty >= 1
