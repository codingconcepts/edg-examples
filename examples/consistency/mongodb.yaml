# Consistency Workload for MongoDB

globals:
  accounts: int(coalesce(env_nil('ACCOUNTS'), 10))
  initial_balance: int(coalesce(env_nil('INITIAL_BALANCE'), 1000))

up:

  - name: create_account
    type: exec
    query: |-
      {"create": "account"}

  - name: create_ledger
    type: exec
    query: |-
      {"create": "ledger"}

  - name: create_counter
    type: exec
    query: |-
      {"create": "counter"}

  - name: create_oncall
    type: exec
    query: |-
      {"create": "oncall"}

  - name: create_blind_write
    type: exec
    query: |-
      {"create": "blind_write"}

  - name: create_cas
    type: exec
    query: |-
      {"create": "cas"}

seed:

  - name: populate_accounts
    type: exec_batch
    count: accounts
    size: accounts
    args:
      - iter()
      - initial_balance
    query: |-
      {"insert": "account", "documents": [{"_id": $1, "balance": $2, "version": 0}]}

  - name: populate_counters
    type: exec_batch
    count: 2
    size: 2
    args:
      - iter()
    query: |-
      {"insert": "counter", "documents": [{"_id": $1, "value": 0}]}

  - name: populate_oncall
    type: exec_batch
    count: 3
    size: 3
    args:
      - iter()
    query: |-
      {"insert": "oncall", "documents": [{"_id": $1, "on_duty": true}]}

  - name: populate_blind_write
    type: exec_batch
    count: accounts
    size: accounts
    args:
      - iter()
    query: |-
      {"insert": "blind_write", "documents": [{"_id": $1, "value": 0}]}

  - name: populate_cas
    type: exec_batch
    count: accounts
    size: accounts
    args:
      - iter()
    query: |-
      {"insert": "cas", "documents": [{"_id": $1, "value": 0, "version": 0}]}

deseed:

  - name: delete_ledger
    type: exec
    query: |-
      {"delete": "ledger", "deletes": [{"q": {}, "limit": 0}]}

  - name: reset_accounts
    type: exec
    args:
      - initial_balance
    query: |-
      {"update": "account", "updates": [{"q": {}, "u": {"$set": {"balance": $1, "version": 0}}, "multi": true}]}

  - name: reset_counters
    type: exec
    query: |-
      {"update": "counter", "updates": [{"q": {}, "u": {"$set": {"value": 0}}, "multi": true}]}

  - name: reset_oncall
    type: exec
    query: |-
      {"update": "oncall", "updates": [{"q": {}, "u": {"$set": {"on_duty": true}}, "multi": true}]}

  - name: reset_blind_write
    type: exec
    query: |-
      {"update": "blind_write", "updates": [{"q": {}, "u": {"$set": {"value": 0}}, "multi": true}]}

  - name: reset_cas
    type: exec
    query: |-
      {"update": "cas", "updates": [{"q": {}, "u": {"$set": {"value": 0, "version": 0}}, "multi": true}]}

down:

  - name: drop_ledger
    type: exec
    query: |-
      {"drop": "ledger"}

  - name: drop_account
    type: exec
    query: |-
      {"drop": "account"}

  - name: drop_oncall
    type: exec
    query: |-
      {"drop": "oncall"}

  - name: drop_counter
    type: exec
    query: |-
      {"drop": "counter"}

  - name: drop_blind_write
    type: exec
    query: |-
      {"drop": "blind_write"}

  - name: drop_cas
    type: exec
    query: |-
      {"drop": "cas"}

run_weights:
  count_ledger: 10
  insert_ledger: 10
  increment_counter: 10
  transfer: 10
  blind_write: 10
  cas_update: 10
  check_total_balance: 10
  go_off_duty: 10

run:

  - name: count_ledger
    type: query
    args:
      - gen('number:1,' + string(accounts))
    query: |-
      {"aggregate": "ledger", "pipeline": [{"$match": {"account_id": $1}}, {"$group": {"_id": null, "entries": {"$sum": 1}, "total": {"$sum": "$amount"}}}], "cursor": {}}

  - name: insert_ledger
    type: exec
    args:
      - objectid()
      - gen('number:1,' + string(accounts))
      - gen('number:1,500')
    query: |-
      {"insert": "ledger", "documents": [{"_id": {"$oid": "$1"}, "account_id": $2, "amount": $3}]}

  - name: increment_counter
    type: exec
    args:
      - gen('number:1,2')
    query: |-
      {"update": "counter", "updates": [{"q": {"_id": $1}, "u": {"$inc": {"value": 1}}}]}

  - transaction: transfer
    locals:
      from_id: gen('number:1,' + string(accounts))
      to_id: gen('number:1,' + string(accounts))
      amount: gen('number:1,100')
    queries:
      - rollback_if: "local('from_id') == local('to_id')"
      - name: debit_from
        type: exec
        args:
          - local('from_id')
          - local('amount')
        query: |-
          {"update": "account", "updates": [{"q": {"_id": $1}, "u": {"$inc": {"balance": -$2}}}]}
      - name: credit_to
        type: exec
        args:
          - local('to_id')
          - local('amount')
        query: |-
          {"update": "account", "updates": [{"q": {"_id": $1}, "u": {"$inc": {"balance": $2}}}]}

  - name: blind_write
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:100,900')
    query: |-
      {"update": "blind_write", "updates": [{"q": {"_id": $1}, "u": {"$set": {"value": $2}}}]}

  - transaction: cas_update
    locals:
      overwrite_id: gen('number:1,' + string(accounts))
      amount: gen('number:1,100')
    queries:
      - name: read_version
        type: query
        args:
          - local('overwrite_id')
        query: |-
          {"find": "cas", "filter": {"_id": $1}, "projection": {"version": 1}}
      - name: update_if_match
        type: exec
        args:
          - local('overwrite_id')
          - ref_same('read_version').version
          - local('amount')
        query: |-
          {"update": "cas", "updates": [{"q": {"_id": $1, "version": $2}, "u": {"$inc": {"value": $3, "version": 1}}}]}

  - name: check_total_balance
    type: query
    query: |-
      {"aggregate": "account", "pipeline": [{"$group": {"_id": null, "total": {"$sum": "$balance"}, "num_accounts": {"$sum": 1}}}], "cursor": {}}

  - transaction: go_off_duty
    locals:
      doctor_id: gen('number:1,3')
    queries:
      - name: count_on_duty
        type: query
        query: |-
          {"aggregate": "oncall", "pipeline": [{"$group": {"_id": null, "n": {"$sum": {"$cond": [{"$eq": ["$on_duty", true]}, 1, 0]}}}}], "cursor": {}}
      - rollback_if: "ref_same('count_on_duty').n <= 1"
      - name: set_off_duty
        type: exec
        args:
          - local('doctor_id')
        query: |-
          {"update": "oncall", "updates": [{"q": {"_id": $1}, "u": {"$set": {"on_duty": false}}}]}

expectations:
  - error_rate < 25

  - name: lost_update
    query: |-
      {"aggregate": "counter", "pipeline": [{"$group": {"_id": null, "counter_total": {"$sum": "$value"}}}], "cursor": {}}
    expr: counter_total >= increment_counter.success_count

  - name: phantom_row
    query: |-
      {"count": "account", "query": {}}
    expr: n == accounts

  - name: dirty_write
    query: |-
      {"aggregate": "account", "pipeline": [{"$group": {"_id": null, "total": {"$sum": "$balance"}}}], "cursor": {}}
    expr: total == accounts * initial_balance

  - name: write_skew
    query: |-
      {"aggregate": "cas", "pipeline": [{"$group": {"_id": null, "total_versions": {"$sum": "$version"}}}], "cursor": {}}
    expr: total_versions <= cas_update.success_count

  - name: dirty_read
    query: |-
      {"count": "blind_write", "query": {}}
    expr: n == accounts

  - name: read_skew
    query: |-
      {"count": "oncall", "query": {"on_duty": true}}
    expr: n >= 1
