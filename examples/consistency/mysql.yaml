# Consistency Workload for MySQL

globals:
  accounts: int(coalesce(env_nil('ACCOUNTS'), 10))
  initial_balance: int(coalesce(env_nil('INITIAL_BALANCE'), 1000))

up:

  - name: create_account
    query: |-
      CREATE TABLE IF NOT EXISTS account (
        id BIGINT PRIMARY KEY,
        balance BIGINT NOT NULL,
        version BIGINT NOT NULL DEFAULT 0
      )

  - name: create_ledger
    query: |-
      CREATE TABLE IF NOT EXISTS ledger (
        id BIGINT PRIMARY KEY AUTO_INCREMENT,
        account_id BIGINT NOT NULL,
        amount BIGINT NOT NULL,
        created_at DATETIME NOT NULL DEFAULT NOW(),
        FOREIGN KEY (account_id) REFERENCES account(id)
      )

  - name: create_counter
    query: |-
      CREATE TABLE IF NOT EXISTS counter (
        id BIGINT PRIMARY KEY,
        value BIGINT NOT NULL DEFAULT 0
      )

  - name: create_oncall
    query: |-
      CREATE TABLE IF NOT EXISTS oncall (
        doctor_id BIGINT PRIMARY KEY,
        on_duty TINYINT(1) NOT NULL DEFAULT 1
      )

  - name: create_blind_write
    query: |-
      CREATE TABLE IF NOT EXISTS blind_write (
        id BIGINT PRIMARY KEY,
        value BIGINT NOT NULL DEFAULT 0
      )

  - name: create_cas
    query: |-
      CREATE TABLE IF NOT EXISTS cas (
        id BIGINT PRIMARY KEY,
        value BIGINT NOT NULL DEFAULT 0,
        version BIGINT NOT NULL DEFAULT 0
      )

seed:

  - name: populate_accounts
    args:
      - accounts
      - initial_balance
    query: |-
      INSERT IGNORE INTO account (id, balance)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < ?
      )
      SELECT s, ?
      FROM seq

  - name: populate_counters
    query: |-
      INSERT IGNORE INTO counter (id, value)
      VALUES (1, 0), (2, 0)

  - name: populate_oncall
    query: |-
      INSERT IGNORE INTO oncall (doctor_id, on_duty)
      VALUES (1, 1), (2, 1), (3, 1)

  - name: populate_blind_write
    args:
      - accounts
    query: |-
      INSERT IGNORE INTO blind_write (id, value)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < ?
      )
      SELECT s, 0
      FROM seq

  - name: populate_cas
    args:
      - accounts
    query: |-
      INSERT IGNORE INTO cas (id, value)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < ?
      )
      SELECT s, 0
      FROM seq

deseed:

  - name: delete_ledger
    type: exec
    query: DELETE FROM ledger

  - name: reset_accounts
    type: exec
    args:
      - initial_balance
    query: |-
      UPDATE account SET balance = ?, version = 0

  - name: reset_counters
    type: exec
    query: UPDATE counter SET value = 0

  - name: reset_oncall
    type: exec
    query: UPDATE oncall SET on_duty = 1

  - name: reset_blind_write
    type: exec
    query: UPDATE blind_write SET value = 0

  - name: reset_cas
    type: exec
    query: UPDATE cas SET value = 0, version = 0

down:

  - name: drop_ledger
    type: exec
    query: DROP TABLE IF EXISTS ledger

  - name: drop_account
    type: exec
    query: DROP TABLE IF EXISTS account

  - name: drop_oncall
    type: exec
    query: DROP TABLE IF EXISTS oncall

  - name: drop_counter
    type: exec
    query: DROP TABLE IF EXISTS counter

  - name: drop_blind_write
    type: exec
    query: DROP TABLE IF EXISTS blind_write

  - name: drop_cas
    type: exec
    query: DROP TABLE IF EXISTS cas

run_weights:
  count_ledger: 10
  insert_ledger: 10
  increment_counter: 10
  transfer: 10
  blind_write: 10
  cas_update: 10
  check_total_balance: 10
  go_off_duty: 10

run:

  - name: count_ledger
    type: query
    args:
      - gen('number:1,' + string(accounts))
    query: |-
      SELECT COUNT(*) AS entries, COALESCE(SUM(amount), 0) AS total
      FROM ledger
      WHERE account_id = ?

  - name: insert_ledger
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,500')
    query: |-
      INSERT INTO ledger (account_id, amount)
      VALUES (?, ?)

  - name: increment_counter
    type: exec
    args:
      - gen('number:1,2')
    query: |-
      UPDATE counter SET value = value + 1 WHERE id = ?

  - name: transfer
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,' + string(accounts))
      - gen('number:1,100')
    query: |-
      UPDATE account a
      JOIN (SELECT ? AS from_id, ? AS to_id, CAST(? AS SIGNED) AS amount) p ON 1=1
      SET a.balance = CASE
                        WHEN a.id = p.to_id THEN a.balance + p.amount
                        WHEN a.id = p.from_id THEN a.balance - p.amount
                      END
      WHERE a.id IN (p.from_id, p.to_id)
        AND p.from_id != p.to_id

  - name: blind_write
    type: exec
    args:
      - gen('number:100,900')
      - gen('number:1,' + string(accounts))
    query: |-
      UPDATE blind_write SET value = ? WHERE id = ?

  - name: cas_update
    type: exec
    args:
      - gen('number:1,' + string(accounts))
      - gen('number:1,100')
    query: |-
      UPDATE cas o
      JOIN (SELECT ? AS oid, CAST(? AS SIGNED) AS amount) p ON 1=1
      JOIN (SELECT id, version FROM cas) snap ON snap.id = p.oid
      SET o.value = o.value + p.amount, o.version = o.version + 1
      WHERE o.id = p.oid
        AND o.version = snap.version

  - name: check_total_balance
    type: query
    query: |-
      SELECT SUM(balance) AS total, COUNT(*) AS num_accounts
      FROM account

  - name: go_off_duty
    type: exec
    args:
      - gen('number:1,3')
    query: |-
      UPDATE oncall o
      JOIN (SELECT COUNT(*) AS n FROM oncall WHERE on_duty = 1) c ON c.n > 1
      SET o.on_duty = 0
      WHERE o.doctor_id = ?

expectations:
  - error_rate < 25

  - name: lost_update
    query: SELECT CAST(COALESCE(SUM(value), 0) AS SIGNED) AS counter_total FROM counter
    expr: counter_total >= increment_counter.success_count

  - name: phantom_row
    query: SELECT COUNT(*) AS n FROM account
    expr: n == accounts

  - name: dirty_write
    query: SELECT CAST(COALESCE(SUM(balance), 0) AS SIGNED) AS total FROM account
    expr: total == accounts * initial_balance

  - name: write_skew
    query: SELECT CAST(COALESCE(SUM(version), 0) AS SIGNED) AS total_versions FROM cas
    expr: total_versions <= cas_update.success_count

  - name: dirty_read
    query: SELECT COUNT(*) AS n FROM blind_write
    expr: n == accounts

  - name: read_skew
    query: SELECT COUNT(*) AS on_duty FROM oncall WHERE on_duty = 1
    expr: on_duty >= 1
