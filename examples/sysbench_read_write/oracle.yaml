# Sysbench oltp_read_write Workload for Oracle
# ==============================================
# Mixed read-write micro-benchmark matching sysbench's
# oltp_read_write profile. Each "transaction" combines point
# selects, range scans, aggregations, index updates, non-index
# updates, a delete, and an insert.

globals:
  records: int(coalesce(env_nil('RECORDS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_sbtest1
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE sbtest1 (
            id NUMBER NOT NULL,
            k NUMBER DEFAULT 0 NOT NULL,
            c CHAR(120) DEFAULT '' '' NOT NULL,
            pad CHAR(60) DEFAULT '' '' NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_idx_k
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'CREATE INDEX k_1 ON sbtest1(k)';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

seed:

  - name: populate_sbtest1
    type: exec_batch
    count: records
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      INSERT INTO sbtest1 (id, k, c, pad)
      VALUES ($1, $2, $3, $4)

deseed:

  - name: truncate_sbtest1
    type: exec
    query: TRUNCATE TABLE sbtest1

down:

  - name: drop_sbtest1
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE sbtest1 CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

run_weights:
  point_select: 50
  range_select: 5
  range_sum: 5
  range_order: 5
  range_distinct: 5
  update_index: 10
  update_non_index: 10
  delete_insert: 10

run:

  # Point select by primary key.
  - name: point_select
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT c FROM sbtest1 WHERE id = :1

  # Range select: 100 rows from a random start.
  - name: range_select
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT c FROM sbtest1
      WHERE id BETWEEN :1 AND :1 + 99

  # Range sum: aggregate over 100 rows.
  - name: range_sum
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT SUM(k) FROM sbtest1
      WHERE id BETWEEN :1 AND :1 + 99

  # Range order: 100 rows ordered by c.
  - name: range_order
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT c FROM sbtest1
      WHERE id BETWEEN :1 AND :1 + 99
      ORDER BY c

  # Range distinct: distinct k in 100 rows ordered by c.
  - name: range_distinct
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT DISTINCT c FROM sbtest1
      WHERE id BETWEEN :1 AND :1 + 99
      ORDER BY c

  # Update indexed column k.
  - name: update_index
    type: exec
    args:
      - gen('number:1,' + string(records))
    query: |-
      UPDATE sbtest1 SET k = k + 1 WHERE id = :1

  # Update non-indexed column c.
  - name: update_non_index
    type: exec
    args:
      - gen('number:1,' + string(records))
      - regex('[a-zA-Z0-9]{120}')
    query: |-
      DECLARE
        v_id NUMBER := :1;
        v_c CHAR(120) := :2;
      BEGIN
        UPDATE sbtest1 SET c = v_c WHERE id = v_id;
      END;

  # Delete then insert to maintain row count.
  - name: delete_insert
    type: exec
    args:
      - gen('number:1,' + string(records))
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      BEGIN
        DELETE FROM sbtest1 WHERE id = :1;
        INSERT INTO sbtest1 (id, k, c, pad)
        VALUES (:1, :2, :3, :4);
      END;


expectations:
  - error_rate < 1
