# Sysbench oltp_read_write Workload for SQL Server
# ==================================================
# Mixed read-write micro-benchmark matching sysbench's
# oltp_read_write profile. Each "transaction" combines point
# selects, range scans, aggregations, index updates, non-index
# updates, a delete, and an insert.
#
# Connection URL format:
#   sqlserver://user:password@host:port?encrypt=disable
#
# Example:
#   edg up --driver sqlserver --config mssql.yaml \
#     --url "sqlserver://sa:Password123!@localhost:1433?encrypt=disable"

globals:
  records: int(coalesce(env_nil('RECORDS'), 1000))
  batch_size: int(coalesce(env_nil('BATCH_SIZE'), 100))

up:

  - name: create_sbtest1
    query: |-
      IF OBJECT_ID('sbtest1', 'U') IS NULL
      CREATE TABLE sbtest1 (
        id INT NOT NULL PRIMARY KEY,
        k INT NOT NULL DEFAULT 0,
        c CHAR(120) NOT NULL DEFAULT '',
        pad CHAR(60) NOT NULL DEFAULT ''
      )

  - name: create_idx_k
    query: |-
      IF NOT EXISTS (SELECT 1 FROM sys.indexes WHERE name = 'k_1' AND object_id = OBJECT_ID('sbtest1'))
      CREATE INDEX k_1 ON sbtest1(k)

seed:

  - name: populate_sbtest1
    type: exec_batch
    count: records
    size: batch_size
    args:
      - seq(1, 1)
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      INSERT INTO sbtest1 (id, k, c, pad)
      VALUES ($1, $2, $3, $4)

deseed:

  - name: delete_sbtest1
    type: exec
    query: DELETE FROM sbtest1

down:

  - name: drop_sbtest1
    type: exec
    query: DROP TABLE IF EXISTS sbtest1

run_weights:
  point_select: 50
  range_select: 5
  range_sum: 5
  range_order: 5
  range_distinct: 5
  update_index: 10
  update_non_index: 10
  delete_insert: 10

run:

  # Point select by primary key.
  - name: point_select
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT c FROM sbtest1 WHERE id = @p1

  # Range select: 100 rows from a random start.
  - name: range_select
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT c FROM sbtest1
      WHERE id BETWEEN @p1 AND @p1 + 99

  # Range sum: aggregate over 100 rows.
  - name: range_sum
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT SUM(k) FROM sbtest1
      WHERE id BETWEEN @p1 AND @p1 + 99

  # Range order: 100 rows ordered by c.
  - name: range_order
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT c FROM sbtest1
      WHERE id BETWEEN @p1 AND @p1 + 99
      ORDER BY c

  # Range distinct: distinct k in 100 rows ordered by c.
  - name: range_distinct
    type: query
    args:
      - gen('number:1,' + string(records))
    query: |-
      SELECT DISTINCT c FROM sbtest1
      WHERE id BETWEEN @p1 AND @p1 + 99
      ORDER BY c

  # Update indexed column k.
  - name: update_index
    type: exec
    args:
      - gen('number:1,' + string(records))
    query: |-
      UPDATE sbtest1 SET k = k + 1 WHERE id = @p1

  # Update non-indexed column c.
  - name: update_non_index
    type: exec
    args:
      - gen('number:1,' + string(records))
      - regex('[a-zA-Z0-9]{120}')
    query: |-
      UPDATE sbtest1 SET c = @p2 WHERE id = @p1

  # Delete then insert to maintain row count.
  - name: delete_insert
    type: exec
    args:
      - gen('number:1,' + string(records))
      - gen('number:0,10000')
      - regex('[a-zA-Z0-9]{120}')
      - regex('[a-zA-Z0-9]{60}')
    query: |-
      DELETE FROM sbtest1 WHERE id = @p1;
      INSERT INTO sbtest1 (id, k, c, pad) VALUES (@p1, @p2, @p3, @p4)


expectations:
  - error_rate < 1
