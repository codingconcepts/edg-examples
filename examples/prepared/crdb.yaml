# Prepared statement workload for CockroachDB / PostgreSQL
#
# A multi-table e-commerce schema with complex joins and
# aggregations to demonstrate where prepared statements
# show a measurable performance advantage.
#
# Connection URL format:
#   postgresql://user:password@host:port/database?sslmode=disable

globals:
  customers: 200
  products: 100
  orders: 1000

up:

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        id INT PRIMARY KEY,
        name STRING NOT NULL,
        region STRING NOT NULL
      )

  - name: create_product
    query: |-
      CREATE TABLE IF NOT EXISTS product (
        id INT PRIMARY KEY,
        name STRING NOT NULL,
        category STRING NOT NULL,
        price DECIMAL(10,2) NOT NULL
      )

  - name: create_purchase_order
    query: |-
      CREATE TABLE IF NOT EXISTS purchase_order (
        id INT PRIMARY KEY,
        customer_id INT NOT NULL REFERENCES customer(id),
        created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        status STRING NOT NULL
      )

  - name: create_order_item
    query: |-
      CREATE TABLE IF NOT EXISTS order_item (
        id INT PRIMARY KEY,
        order_id INT NOT NULL REFERENCES purchase_order(id),
        product_id INT NOT NULL REFERENCES product(id),
        quantity INT NOT NULL,
        unit_price DECIMAL(10,2) NOT NULL
      )

  - name: create_idx_order_status
    type: exec
    query: CREATE INDEX IF NOT EXISTS idx_order_status ON purchase_order(status)

seed:

  - name: populate_customer
    args:
      - customers
    query: |-
      INSERT INTO customer (id, name, region)
      SELECT
        s,
        'customer-' || s::TEXT,
        (ARRAY['north','south','east','west'])[1 + (s % 4)]
      FROM generate_series(1, $1) AS s

  - name: populate_product
    args:
      - products
    query: |-
      INSERT INTO product (id, name, category, price)
      SELECT
        s,
        'product-' || s::TEXT,
        (ARRAY['electronics','clothing','food','books','toys'])[1 + (s % 5)],
        (random()::FLOAT8 * 99 + 1)::DECIMAL(10,2)
      FROM generate_series(1, $1) AS s

  - name: populate_purchase_order
    args:
      - customers
      - orders
    query: |-
      INSERT INTO purchase_order (id, customer_id, created_at, status)
      SELECT
        s,
        ((s - 1) % $1) + 1,
        now() - ((s % 365)::TEXT || ' days')::INTERVAL,
        (ARRAY['pending','shipped','delivered'])[1 + (s % 3)]
      FROM generate_series(1, $2) AS s

  - name: populate_order_item
    args:
      - products
    query: |-
      INSERT INTO order_item (id, order_id, product_id, quantity, unit_price)
      SELECT
        (po.id - 1) * 3 + n AS id,
        po.id AS order_id,
        ((po.id * n - 1) % $1) + 1 AS product_id,
        1 + ((po.id + n) % 10) AS quantity,
        (random()::FLOAT8 * 99 + 1)::DECIMAL(10,2)
      FROM purchase_order po
      CROSS JOIN generate_series(1, 3) AS n

deseed:

  - name: delete_order_item
    type: exec
    query: DELETE FROM order_item

  - name: delete_purchase_order
    type: exec
    query: DELETE FROM purchase_order

  - name: delete_product
    type: exec
    query: DELETE FROM product

  - name: delete_customer
    type: exec
    query: DELETE FROM customer

down:

  - name: drop_order_item
    type: exec
    query: DROP TABLE IF EXISTS order_item

  - name: drop_purchase_order
    type: exec
    query: DROP TABLE IF EXISTS purchase_order

  - name: drop_product
    type: exec
    query: DROP TABLE IF EXISTS product

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer

init:

  - name: fetch_customers
    type: query
    query: SELECT id FROM customer

run:

  - name: order_details
    type: query
    prepared: true
    args:
      - ref_rand('fetch_customers').id
    query: |-
      SELECT c.name AS customer_name,
             p.name AS product_name,
             p.category,
             oi.quantity,
             oi.unit_price,
             oi.quantity * oi.unit_price AS line_total,
             po.status,
             po.created_at
      FROM order_item oi
      JOIN purchase_order po ON po.id = oi.order_id
      JOIN customer c ON c.id = po.customer_id
      JOIN product p ON p.id = oi.product_id
      WHERE c.id = $1
      ORDER BY po.created_at DESC, line_total DESC
      LIMIT 20

  - name: category_revenue
    type: query
    prepared: true
    args:
      - set_rand(['pending','shipped','delivered'], [])
      - uniform_f(100, 500, 2)
    query: |-
      SELECT p.category,
             COUNT(DISTINCT c.id) AS unique_customers,
             COUNT(DISTINCT po.id) AS order_count,
             SUM(oi.quantity) AS total_units,
             SUM(oi.quantity * oi.unit_price) AS total_revenue,
             AVG(oi.quantity * oi.unit_price) AS avg_line_value
      FROM order_item oi
      JOIN purchase_order po ON po.id = oi.order_id
      JOIN customer c ON c.id = po.customer_id
      JOIN product p ON p.id = oi.product_id
      WHERE po.status = $1
      GROUP BY p.category
      HAVING SUM(oi.quantity * oi.unit_price) > $2
      ORDER BY total_revenue DESC

  - name: order_details_no_prepare
    type: query
    args:
      - ref_rand('fetch_customers').id
    query: |-
      SELECT c.name AS customer_name,
             p.name AS product_name,
             p.category,
             oi.quantity,
             oi.unit_price,
             oi.quantity * oi.unit_price AS line_total,
             po.status,
             po.created_at
      FROM order_item oi
      JOIN purchase_order po ON po.id = oi.order_id
      JOIN customer c ON c.id = po.customer_id
      JOIN product p ON p.id = oi.product_id
      WHERE c.id = $1
      ORDER BY po.created_at DESC, line_total DESC
      LIMIT 20

  - name: category_revenue_no_prepare
    type: query
    args:
      - set_rand(['pending','shipped','delivered'], [])
      - uniform_f(100, 500, 2)
    query: |-
      SELECT p.category,
             COUNT(DISTINCT c.id) AS unique_customers,
             COUNT(DISTINCT po.id) AS order_count,
             SUM(oi.quantity) AS total_units,
             SUM(oi.quantity * oi.unit_price) AS total_revenue,
             AVG(oi.quantity * oi.unit_price) AS avg_line_value
      FROM order_item oi
      JOIN purchase_order po ON po.id = oi.order_id
      JOIN customer c ON c.id = po.customer_id
      JOIN product p ON p.id = oi.product_id
      WHERE po.status = $1
      GROUP BY p.category
      HAVING SUM(oi.quantity * oi.unit_price) > $2
      ORDER BY total_revenue DESC
