# E-commerce workload for SQL Server
#
# SQL Server does not support writable CTEs (DML inside WITH clauses).
# The checkout transaction is simplified to separate operations.
#
# Connection URL format:
#   sqlserver://user:password@host:port?database=database&encrypt=disable

globals:
  categories: 20
  products: 10000  # categories x 500
  customers: 50000
  batch_size: 5000

expressions:
  star_rating: "int(args[0]) % 5 + 1"

up:

  - name: create_category
    query: |-
      IF OBJECT_ID('category', 'U') IS NULL
      CREATE TABLE category (
        id INT PRIMARY KEY,
        name NVARCHAR(255) NOT NULL
      )

  - name: create_product
    query: |-
      IF OBJECT_ID('product', 'U') IS NULL
      CREATE TABLE product (
        id INT PRIMARY KEY,
        category_id INT NOT NULL,
        name NVARCHAR(255) NOT NULL,
        price DECIMAL(10,2) NOT NULL,
        stock_qty INT NOT NULL DEFAULT 100,
        created_at DATETIME2 NOT NULL DEFAULT GETDATE(),
        FOREIGN KEY (category_id) REFERENCES category(id)
      )

  - name: create_customer
    query: |-
      IF OBJECT_ID('customer', 'U') IS NULL
      CREATE TABLE customer (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        email NVARCHAR(255) NOT NULL,
        name NVARCHAR(255) NOT NULL,
        created_at DATETIME2 NOT NULL DEFAULT GETDATE()
      )

  - name: create_cart_item
    query: |-
      IF OBJECT_ID('cart_item', 'U') IS NULL
      CREATE TABLE cart_item (
        customer_id UNIQUEIDENTIFIER NOT NULL,
        product_id INT NOT NULL,
        quantity INT NOT NULL DEFAULT 1,
        added_at DATETIME2 NOT NULL DEFAULT GETDATE(),
        PRIMARY KEY (customer_id, product_id),
        FOREIGN KEY (customer_id) REFERENCES customer(id),
        FOREIGN KEY (product_id) REFERENCES product(id)
      )

  - name: create_purchase_order
    query: |-
      IF OBJECT_ID('purchase_order', 'U') IS NULL
      CREATE TABLE purchase_order (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        customer_id UNIQUEIDENTIFIER NOT NULL,
        total DECIMAL(12,2) NOT NULL,
        created_at DATETIME2 NOT NULL DEFAULT GETDATE(),
        FOREIGN KEY (customer_id) REFERENCES customer(id)
      )

  - name: create_order_item
    query: |-
      IF OBJECT_ID('order_item', 'U') IS NULL
      CREATE TABLE order_item (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        order_id UNIQUEIDENTIFIER NOT NULL,
        product_id INT NOT NULL,
        quantity INT NOT NULL,
        unit_price DECIMAL(10,2) NOT NULL,
        FOREIGN KEY (order_id) REFERENCES purchase_order(id),
        FOREIGN KEY (product_id) REFERENCES product(id)
      )

  - name: create_review
    query: |-
      IF OBJECT_ID('review', 'U') IS NULL
      CREATE TABLE review (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        product_id INT NOT NULL,
        customer_id UNIQUEIDENTIFIER NOT NULL,
        rating INT NOT NULL CHECK (rating BETWEEN 1 AND 5),
        body NVARCHAR(MAX) NOT NULL,
        created_at DATETIME2 NOT NULL DEFAULT GETDATE(),
        FOREIGN KEY (product_id) REFERENCES product(id),
        FOREIGN KEY (customer_id) REFERENCES customer(id),
        UNIQUE (product_id, customer_id)
      )

  - name: create_idx_product_category
    query: |-
      CREATE INDEX idx_product_category
      ON product (category_id, price)

  - name: create_idx_review_product
    query: |-
      CREATE INDEX idx_review_product
      ON review (product_id, rating)

seed:

  - name: populate_category
    args:
      - categories
    query: |-
      WITH seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      INSERT INTO category (id, name)
      SELECT s, CONCAT('category-', s)
      FROM seq
      OPTION (MAXRECURSION 0)

  - name: populate_product
    args:
      - products
      - categories
    query: |-
      WITH seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      INSERT INTO product (id, category_id, name, price, stock_qty)
      SELECT
        s,
        (s % $2) + 1,
        CONVERT(NVARCHAR(255), NEWID()),
        CAST(RAND(CHECKSUM(NEWID())) * 499 + 1 AS DECIMAL(10,2)),
        ABS(CHECKSUM(NEWID()) % 200) + 10
      FROM seq
      OPTION (MAXRECURSION 0)

  - name: populate_customer
    args:
      - gen_batch(customers, batch_size, 'email')
    query: |-
      INSERT INTO customer (email, name)
      SELECT value, SUBSTRING(value, 1, 12)
      FROM STRING_SPLIT('$1', CHAR(31))

deseed:

  - name: delete_review
    type: exec
    query: DELETE FROM review

  - name: delete_order_item
    type: exec
    query: DELETE FROM order_item

  - name: delete_purchase_order
    type: exec
    query: DELETE FROM purchase_order

  - name: delete_cart_item
    type: exec
    query: DELETE FROM cart_item

  - name: delete_customer
    type: exec
    query: DELETE FROM customer

  - name: delete_product
    type: exec
    query: DELETE FROM product

  - name: delete_category
    type: exec
    query: DELETE FROM category

down:

  - name: drop_review
    type: exec
    query: DROP TABLE IF EXISTS review

  - name: drop_order_item
    type: exec
    query: DROP TABLE IF EXISTS order_item

  - name: drop_purchase_order
    type: exec
    query: DROP TABLE IF EXISTS purchase_order

  - name: drop_cart_item
    type: exec
    query: DROP TABLE IF EXISTS cart_item

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer

  - name: drop_product
    type: exec
    query: DROP TABLE IF EXISTS product

  - name: drop_category
    type: exec
    query: DROP TABLE IF EXISTS category

init:

  - name: fetch_products
    type: query
    query: SELECT id, category_id, price FROM product ORDER BY NEWID()

  - name: fetch_customers
    type: query
    query: SELECT id FROM customer ORDER BY NEWID()

  - name: fetch_categories
    type: query
    query: SELECT id FROM category

run_weights:
  browse_category: 30
  view_product: 20
  add_to_cart: 15
  checkout: 10
  write_review: 10
  remove_from_cart: 5
  search_products: 10

run:

  # Browse products in a category sorted by price.
  # Pattern: range scan + secondary index + ORDER BY
  - name: browse_category
    type: query
    args:
      - ref_rand('fetch_categories').id
    query: |-
      SELECT TOP 20 p.id, p.name, p.price, p.stock_qty
      FROM product p
      WHERE p.category_id = @p1
      ORDER BY p.price ASC

  # View a single product with its average rating.
  # Pattern: point read + aggregate subquery (AVG, COUNT)
  - name: view_product
    type: query
    args:
      - ref_same('fetch_products').id
    query: |-
      SELECT p.id, p.name, p.price, p.stock_qty,
        COALESCE(r.avg_rating, 0) AS avg_rating,
        COALESCE(r.review_count, 0) AS review_count
      FROM product p
      LEFT JOIN (
        SELECT product_id,
          CAST(AVG(CAST(rating AS DECIMAL(3,2))) AS DECIMAL(3,2)) AS avg_rating,
          COUNT(*) AS review_count
        FROM review
        WHERE product_id = @p1
        GROUP BY product_id
      ) r ON r.product_id = p.id
      WHERE p.id = @p1

  # Add item to cart. Increments quantity if already present.
  # Pattern: UPSERT (MERGE)
  - name: add_to_cart
    type: exec
    args:
      - ref_rand('fetch_customers').id
      - ref_rand('fetch_products').id
      - gen('number:1,3')
    query: |-
      MERGE INTO cart_item ci
      USING (SELECT @p1 AS cust_id, @p2 AS prod_id, @p3 AS qty) src
      ON (ci.customer_id = src.cust_id AND ci.product_id = src.prod_id)
      WHEN MATCHED THEN
        UPDATE SET ci.quantity = ci.quantity + src.qty,
          ci.added_at = GETDATE()
      WHEN NOT MATCHED THEN
        INSERT (customer_id, product_id, quantity)
        VALUES (src.cust_id, src.prod_id, src.qty);

  # Checkout: delete cart items for the customer.
  # Note: SQL Server does not support writable CTEs, so the full
  # checkout flow (order creation, stock update, cart clear)
  # cannot be done atomically in a single statement.
  # This simplified version clears the cart.
  - name: checkout
    type: exec
    args:
      - ref_same('fetch_customers').id
    query: |-
      DELETE FROM cart_item WHERE customer_id = @p1

  # Write a product review with a rating derived from a user-defined expression.
  # Pattern: expressions (star_rating), gen for text, MERGE for idempotent insert
  - name: write_review
    type: exec
    args:
      - ref_rand('fetch_products').id
      - ref_rand('fetch_customers').id
      - star_rating(gen('number:1,100'))
      - gen('sentence:8')
    query: |-
      MERGE INTO review r
      USING (SELECT @p1 AS prod_id, @p2 AS cust_id, @p3 AS rating, @p4 AS body) src
      ON (r.product_id = src.prod_id AND r.customer_id = src.cust_id)
      WHEN NOT MATCHED THEN
        INSERT (product_id, customer_id, rating, body)
        VALUES (src.prod_id, src.cust_id, src.rating, src.body);

  # Remove a product from the cart.
  # Pattern: DELETE workload
  - name: remove_from_cart
    type: exec
    args:
      - ref_rand('fetch_customers').id
      - ref_rand('fetch_products').id
    query: |-
      DELETE FROM cart_item
      WHERE customer_id = @p1 AND product_id = @p2

  # Look up multiple products by ID.
  # Pattern: ref_n (variable-length IN-clause), GROUP BY aggregate
  - name: search_products
    type: query
    args:
      - ref_n('fetch_products', 'id', 3, 8)
    query: |-
      SELECT p.id, p.name, p.price, p.stock_qty,
        COALESCE(CAST(AVG(CAST(r.rating AS DECIMAL(3,2))) AS DECIMAL(3,2)), 0) AS avg_rating
      FROM product p
      LEFT JOIN review r ON r.product_id = p.id
      WHERE p.id IN (
        SELECT CAST(value AS INT)
        FROM STRING_SPLIT(@p1, ',')
      )
      GROUP BY p.id, p.name, p.price, p.stock_qty
