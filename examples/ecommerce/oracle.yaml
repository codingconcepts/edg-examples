# E-commerce workload for Oracle
#
# Oracle supports PL/SQL blocks for complex multi-statement operations.
# The checkout transaction uses a PL/SQL block for atomicity.
#
# Connection URL format:
#   oracle://user:password@host:port/service
#
# Framework notes: Batch-inlined queries (ref_each in seed section)
# use $1, $2 for string substitution by the framework before sending
# to the database. Run-section queries use :1, :2 (Oracle bind syntax)
# since they pass args via database/sql positional parameters.

globals:
  categories: 20
  products: 10000  # categories x 500
  customers: 50000
  batch_size: 5000

expressions:
  star_rating: "int(args[0]) % 5 + 1"

up:

  - name: create_category
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE category (
            id NUMBER NOT NULL,
            name VARCHAR2(255) NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_product
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE product (
            id NUMBER NOT NULL,
            category_id NUMBER NOT NULL,
            name VARCHAR2(255) NOT NULL,
            price NUMBER(10,2) NOT NULL,
            stock_qty NUMBER DEFAULT 100 NOT NULL,
            created_at TIMESTAMP DEFAULT SYSTIMESTAMP NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_customer
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE customer (
            id NUMBER GENERATED ALWAYS AS IDENTITY,
            email VARCHAR2(320) NOT NULL,
            name VARCHAR2(255) NOT NULL,
            created_at TIMESTAMP DEFAULT SYSTIMESTAMP NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_cart_item
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE cart_item (
            customer_id NUMBER NOT NULL,
            product_id NUMBER NOT NULL,
            quantity NUMBER DEFAULT 1 NOT NULL,
            added_at TIMESTAMP DEFAULT SYSTIMESTAMP NOT NULL,
            PRIMARY KEY (customer_id, product_id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_purchase_order
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE purchase_order (
            id NUMBER GENERATED ALWAYS AS IDENTITY,
            customer_id NUMBER NOT NULL,
            total NUMBER(12,2) NOT NULL,
            created_at TIMESTAMP DEFAULT SYSTIMESTAMP NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_order_item
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE order_item (
            id NUMBER GENERATED ALWAYS AS IDENTITY,
            order_id NUMBER NOT NULL,
            product_id NUMBER NOT NULL,
            quantity NUMBER NOT NULL,
            unit_price NUMBER(10,2) NOT NULL,
            PRIMARY KEY (id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_review
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE TABLE review (
            id NUMBER GENERATED ALWAYS AS IDENTITY,
            product_id NUMBER NOT NULL,
            customer_id NUMBER NOT NULL,
            rating NUMBER NOT NULL CHECK (rating BETWEEN 1 AND 5),
            body VARCHAR2(4000) NOT NULL,
            created_at TIMESTAMP DEFAULT SYSTIMESTAMP NOT NULL,
            PRIMARY KEY (id),
            UNIQUE (product_id, customer_id)
          )
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_idx_product_category
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE INDEX idx_product_category
          ON product (category_id, price)
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

  - name: create_idx_review_product
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE '
          CREATE INDEX idx_review_product
          ON review (product_id, rating)
        ';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -955 THEN RAISE; END IF;
      END;

seed:

  - name: clear_customer
    type: exec
    query: TRUNCATE TABLE customer

  - name: clear_product
    type: exec
    query: TRUNCATE TABLE product

  - name: clear_category
    type: exec
    query: TRUNCATE TABLE category

  - name: populate_category
    args:
      - categories
    query: |-
      INSERT INTO category (id, name)
      SELECT LEVEL, 'category-' || LEVEL
      FROM DUAL
      CONNECT BY LEVEL <= $1

  - name: populate_product
    args:
      - products
      - categories
    query: |-
      INSERT INTO product (id, category_id, name, price, stock_qty)
      SELECT
        LEVEL,
        MOD(LEVEL, $2) + 1,
        DBMS_RANDOM.STRING('X', 16),
        TRUNC(DBMS_RANDOM.VALUE * 499 + 1, 2),
        TRUNC(DBMS_RANDOM.VALUE * 200 + 10)
      FROM DUAL
      CONNECT BY LEVEL <= $1

  - name: populate_customer
    type: exec_batch
    count: customers
    size: 100
    args:
      - gen('email')
    query: |-
      INSERT INTO customer (email, name)
      SELECT column_value, SUBSTR(column_value, 1, 12)
      FROM XMLTABLE(('"' || REPLACE('$1', CHR(31), '","') || '"'))

deseed:

  - name: truncate_review
    type: exec
    query: TRUNCATE TABLE review

  - name: truncate_order_item
    type: exec
    query: TRUNCATE TABLE order_item

  - name: truncate_purchase_order
    type: exec
    query: TRUNCATE TABLE purchase_order

  - name: truncate_cart_item
    type: exec
    query: TRUNCATE TABLE cart_item

  - name: truncate_customer
    type: exec
    query: TRUNCATE TABLE customer

  - name: truncate_product
    type: exec
    query: TRUNCATE TABLE product

  - name: truncate_category
    type: exec
    query: TRUNCATE TABLE category

down:

  - name: drop_review
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE review CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_order_item
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE order_item CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_purchase_order
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE purchase_order CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_cart_item
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE cart_item CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_customer
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE customer CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_product
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE product CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

  - name: drop_category
    type: exec
    query: |-
      BEGIN
        EXECUTE IMMEDIATE 'DROP TABLE category CASCADE CONSTRAINTS PURGE';
      EXCEPTION WHEN OTHERS THEN
        IF SQLCODE != -942 THEN RAISE; END IF;
      END;

init:

  - name: fetch_products
    type: query
    query: SELECT id, category_id, price FROM product

  - name: fetch_customers
    type: query
    query: SELECT id FROM customer

  - name: fetch_categories
    type: query
    query: SELECT id FROM category

run_weights:
  browse_category: 30
  view_product: 20
  add_to_cart: 15
  checkout: 10
  write_review: 10
  remove_from_cart: 5
  search_products: 10

run:

  # Browse products in a category sorted by price.
  - name: browse_category
    type: query
    args:
      - ref_rand('fetch_categories').id
    query: |-
      SELECT p.id, p.name, p.price, p.stock_qty
      FROM product p
      WHERE p.category_id = :1
      ORDER BY p.price ASC
      FETCH FIRST 20 ROWS ONLY

  # View a single product with its average rating.
  - name: view_product
    type: query
    args:
      - ref_rand('fetch_products').id
    query: |-
      SELECT p.id, p.name, p.price, p.stock_qty,
        COALESCE(r.avg_rating, 0) AS avg_rating,
        COALESCE(r.review_count, 0) AS review_count
      FROM product p
      LEFT JOIN (
        SELECT product_id,
          ROUND(AVG(rating), 2) AS avg_rating,
          COUNT(*) AS review_count
        FROM review
        WHERE product_id = :1
        GROUP BY product_id
      ) r ON r.product_id = p.id
      WHERE p.id = :1

  # Add item to cart. Increments quantity if already present.
  - name: add_to_cart
    type: exec
    args:
      - ref_rand('fetch_customers').id
      - ref_rand('fetch_products').id
      - gen('number:1,3')
    query: |-
      MERGE INTO cart_item ci
      USING (SELECT :1 AS cust_id, :2 AS prod_id, :3 AS qty FROM DUAL) src
      ON (ci.customer_id = src.cust_id AND ci.product_id = src.prod_id)
      WHEN MATCHED THEN
        UPDATE SET ci.quantity = ci.quantity + src.qty,
          ci.added_at = SYSTIMESTAMP
      WHEN NOT MATCHED THEN
        INSERT (customer_id, product_id, quantity)
        VALUES (src.cust_id, src.prod_id, src.qty)

  # Checkout: delete cart items for the customer.
  - name: checkout
    type: exec
    args:
      - ref_same('fetch_customers').id
    query: |-
      DELETE FROM cart_item WHERE customer_id = :1

  # Write a product review.
  - name: write_review
    type: exec
    args:
      - ref_rand('fetch_products').id
      - ref_rand('fetch_customers').id
      - star_rating(gen('number:1,100'))
      - gen('sentence:8')
    query: |-
      MERGE INTO review r
      USING (SELECT :1 AS prod_id, :2 AS cust_id, :3 AS rating, :4 AS body FROM DUAL) src
      ON (r.product_id = src.prod_id AND r.customer_id = src.cust_id)
      WHEN NOT MATCHED THEN
        INSERT (product_id, customer_id, rating, body)
        VALUES (src.prod_id, src.cust_id, src.rating, src.body)

  # Remove a product from the cart.
  - name: remove_from_cart
    type: exec
    args:
      - ref_rand('fetch_customers').id
      - ref_rand('fetch_products').id
    query: |-
      DELETE FROM cart_item
      WHERE customer_id = :1 AND product_id = :2

  # Look up multiple products by ID.
  - name: search_products
    type: query
    args:
      - ref_n('fetch_products', 'id', 3, 8)
    query: |-
      SELECT p.id, p.name, p.price, p.stock_qty,
        COALESCE(ROUND(AVG(r.rating), 2), 0) AS avg_rating
      FROM product p
      LEFT JOIN review r ON r.product_id = p.id
      WHERE p.id IN (
        SELECT TO_NUMBER(column_value)
        FROM XMLTABLE(('"' || REPLACE(:1, CHR(31), '","') || '"'))
      )
      GROUP BY p.id, p.name, p.price, p.stock_qty
