# E-commerce workload for MySQL
#
# MySQL does not support writable CTEs (DML inside WITH clauses).
# The checkout transaction is simplified to separate operations.
#
# Requires MySQL 8.0+.
# For large datasets, set: SET GLOBAL cte_max_recursion_depth = 200000;
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  categories: 20
  products: 10000  # categories x 500
  customers: 50000
  batch_size: 5000

expressions:
  star_rating: "int(args[0]) % 5 + 1"

up:

  - name: create_category
    query: |-
      CREATE TABLE IF NOT EXISTS category (
        id INT PRIMARY KEY,
        name VARCHAR(255) NOT NULL
      )

  - name: create_product
    query: |-
      CREATE TABLE IF NOT EXISTS product (
        id INT PRIMARY KEY,
        category_id INT NOT NULL,
        name VARCHAR(255) NOT NULL,
        price DECIMAL(10,2) NOT NULL,
        stock_qty INT NOT NULL DEFAULT 100,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (category_id) REFERENCES category(id)
      )

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        email VARCHAR(255) NOT NULL,
        name VARCHAR(255) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
      )

  - name: create_cart_item
    query: |-
      CREATE TABLE IF NOT EXISTS cart_item (
        customer_id CHAR(36) NOT NULL,
        product_id INT NOT NULL,
        quantity INT NOT NULL DEFAULT 1,
        added_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (customer_id, product_id),
        FOREIGN KEY (customer_id) REFERENCES customer(id),
        FOREIGN KEY (product_id) REFERENCES product(id)
      )

  - name: create_purchase_order
    query: |-
      CREATE TABLE IF NOT EXISTS purchase_order (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        customer_id CHAR(36) NOT NULL,
        total DECIMAL(12,2) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (customer_id) REFERENCES customer(id)
      )

  - name: create_order_item
    query: |-
      CREATE TABLE IF NOT EXISTS order_item (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        order_id CHAR(36) NOT NULL,
        product_id INT NOT NULL,
        quantity INT NOT NULL,
        unit_price DECIMAL(10,2) NOT NULL,
        FOREIGN KEY (order_id) REFERENCES purchase_order(id),
        FOREIGN KEY (product_id) REFERENCES product(id)
      )

  - name: create_review
    query: |-
      CREATE TABLE IF NOT EXISTS review (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        product_id INT NOT NULL,
        customer_id CHAR(36) NOT NULL,
        rating INT NOT NULL CHECK (rating BETWEEN 1 AND 5),
        body TEXT NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (product_id) REFERENCES product(id),
        FOREIGN KEY (customer_id) REFERENCES customer(id)
      )

  - name: create_idx_product_category
    query: |-
      CREATE INDEX idx_product_category
      ON product (category_id, price)

  - name: create_idx_review_product
    query: |-
      CREATE INDEX idx_review_product
      ON review (product_id, rating)

seed:

  - name: populate_category
    args:
      - categories
    query: |-
      INSERT INTO category (id, name)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      SELECT s, CONCAT('category-', s)
      FROM seq

  - name: populate_product
    args:
      - products
      - categories
    query: |-
      INSERT INTO product (id, category_id, name, price, stock_qty)
      WITH RECURSIVE seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      SELECT
        s,
        (s % $2) + 1,
        SUBSTRING(MD5(RAND()), 1, 16),
        CAST(RAND() * 499 + 1 AS DECIMAL(10,2)),
        FLOOR(RAND() * 200 + 10)
      FROM seq

  - name: populate_customer
    args:
      - gen_batch(customers, batch_size, 'email')
    query: |-
      INSERT INTO customer (email, name)
      SELECT j.val, SUBSTRING(MD5(j.val), 1, 12)
      FROM JSON_TABLE(
        CONCAT('["', REPLACE('$1', CHAR(31), '","'), '"]'),
        '$[*]' COLUMNS(val VARCHAR(255) PATH '$')
      ) j

deseed:

  - name: delete_review
    type: exec
    query: DELETE FROM review

  - name: delete_order_item
    type: exec
    query: DELETE FROM order_item

  - name: delete_purchase_order
    type: exec
    query: DELETE FROM purchase_order

  - name: delete_cart_item
    type: exec
    query: DELETE FROM cart_item

  - name: delete_customer
    type: exec
    query: DELETE FROM customer

  - name: delete_product
    type: exec
    query: DELETE FROM product

  - name: delete_category
    type: exec
    query: DELETE FROM category

down:

  - name: drop_review
    type: exec
    query: DROP TABLE IF EXISTS review

  - name: drop_order_item
    type: exec
    query: DROP TABLE IF EXISTS order_item

  - name: drop_purchase_order
    type: exec
    query: DROP TABLE IF EXISTS purchase_order

  - name: drop_cart_item
    type: exec
    query: DROP TABLE IF EXISTS cart_item

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer

  - name: drop_product
    type: exec
    query: DROP TABLE IF EXISTS product

  - name: drop_category
    type: exec
    query: DROP TABLE IF EXISTS category

init:

  - name: fetch_products
    type: query
    query: SELECT id, category_id, price FROM product ORDER BY RAND()

  - name: fetch_customers
    type: query
    query: SELECT id FROM customer ORDER BY RAND()

  - name: fetch_categories
    type: query
    query: SELECT id FROM category

run_weights:
  browse_category: 30
  view_product: 20
  add_to_cart: 15
  checkout: 10
  write_review: 10
  remove_from_cart: 5
  search_products: 10

run:

  # Browse products in a category sorted by price.
  # Pattern: range scan + secondary index + ORDER BY
  - name: browse_category
    type: query
    args:
      - ref_rand('fetch_categories').id
    query: |-
      SELECT p.id, p.name, p.price, p.stock_qty
      FROM product p
      WHERE p.category_id = ?
      ORDER BY p.price ASC
      LIMIT 20

  # View a single product with its average rating.
  # Pattern: point read + aggregate subquery (AVG, COUNT)
  - name: view_product
    type: query
    args:
      - ref_same('fetch_products').id
      - ref_same('fetch_products').id
    query: |-
      SELECT p.id, p.name, p.price, p.stock_qty,
        COALESCE(r.avg_rating, 0) AS avg_rating,
        COALESCE(r.review_count, 0) AS review_count
      FROM product p
      LEFT JOIN (
        SELECT product_id,
          CAST(AVG(rating) AS DECIMAL(3,2)) AS avg_rating,
          COUNT(*) AS review_count
        FROM review
        WHERE product_id = ?
        GROUP BY product_id
      ) r ON r.product_id = p.id
      WHERE p.id = ?

  # Add item to cart. Increments quantity if already present.
  # Pattern: UPSERT (INSERT ... ON DUPLICATE KEY UPDATE)
  - name: add_to_cart
    type: exec
    args:
      - ref_rand('fetch_customers').id
      - ref_rand('fetch_products').id
      - gen('number:1,3')
    query: |-
      INSERT INTO cart_item (customer_id, product_id, quantity)
      VALUES (?, ?, ?)
      ON DUPLICATE KEY UPDATE
        quantity = cart_item.quantity + VALUES(quantity),
        added_at = NOW()

  # Checkout: delete cart items for the customer.
  # Note: MySQL does not support writable CTEs, so the full
  # checkout flow (order creation, stock update, cart clear)
  # cannot be done atomically in a single statement.
  # This simplified version clears the cart.
  - name: checkout
    type: exec
    args:
      - ref_same('fetch_customers').id
    query: |-
      DELETE FROM cart_item WHERE customer_id = ?

  # Write a product review with a rating derived from a user-defined expression.
  # Pattern: expressions (star_rating), gen for text
  - name: write_review
    type: exec
    args:
      - ref_rand('fetch_products').id
      - ref_rand('fetch_customers').id
      - star_rating(gen('number:1,100'))
      - gen('sentence:8')
    query: |-
      INSERT IGNORE INTO review (product_id, customer_id, rating, body)
      VALUES (?, ?, ?, ?)

  # Remove a product from the cart.
  # Pattern: DELETE workload
  - name: remove_from_cart
    type: exec
    args:
      - ref_rand('fetch_customers').id
      - ref_rand('fetch_products').id
    query: |-
      DELETE FROM cart_item
      WHERE customer_id = ? AND product_id = ?

  # Look up multiple products by ID.
  # Pattern: ref_n (variable-length IN-clause), GROUP BY aggregate
  - name: search_products
    type: query
    args:
      - ref_n('fetch_products', 'id', 3, 8)
    query: |-
      SELECT p.id, p.name, p.price, p.stock_qty,
        COALESCE(CAST(AVG(r.rating) AS DECIMAL(3,2)), 0) AS avg_rating
      FROM product p
      LEFT JOIN review r ON r.product_id = p.id
      WHERE p.id IN (
        SELECT CAST(j.val AS UNSIGNED)
        FROM JSON_TABLE(
          CONCAT('["', REPLACE(?, ',', '","'), '"]'),
          '$[*]' COLUMNS(val VARCHAR(20) PATH '$')
        ) j
      )
      GROUP BY p.id, p.name, p.price, p.stock_qty
