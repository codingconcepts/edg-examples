globals:
  customers: 100
  initial_balance: 10000

up:

  - name: create_customer
    type: exec
    query: |-
      {"create": "customer"}

  - name: create_account
    type: exec
    query: |-
      {"create": "account"}

seed:

  - name: insert_customer
    type: exec_batch
    count: customers
    args:
      - gen('uuid')
      - gen('email')
    query: |-
      {"insert": "customer", "documents": [{"_id": $1, "email": $2}]}

  - name: fetch_customers
    query: |-
      {"find": "customer", "filter": {}}

  - name: insert_account
    type: exec_batch
    count: customers
    args:
      - gen('uuid')
      - ref_rand('fetch_customers')._id
      - initial_balance
    query: |-
      {"insert": "account", "documents": [{"_id": $1, "customer_id": $2, "balance": $3}]}

deseed:

  - name: delete_accounts
    type: exec
    query: |-
      {"delete": "account", "deletes": [{"q": {}, "limit": 0}]}

  - name: delete_customers
    type: exec
    query: |-
      {"delete": "customer", "deletes": [{"q": {}, "limit": 0}]}

down:

  - name: drop_account
    type: exec
    query: |-
      {"drop": "account"}

  - name: drop_customer
    type: exec
    query: |-
      {"drop": "customer"}
