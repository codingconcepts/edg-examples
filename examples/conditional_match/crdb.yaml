# Conditional match/when/default workload for CockroachDB / PostgreSQL
#
# Demonstrates match/when/default branching both inside and outside
# transactions. Uses customer markets (uk, us, eu) to dispatch
# region-specific compliance checks and tax/currency rules.

globals:
  customers: 1000
  products: 100
  batch_size: 500

up:

  - name: create_customer
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email STRING NOT NULL,
        market STRING NOT NULL
      )

  - name: create_product
    query: |-
      CREATE TABLE IF NOT EXISTS product (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name STRING NOT NULL,
        price FLOAT NOT NULL
      )

  - name: create_compliance_log
    query: |-
      CREATE TABLE IF NOT EXISTS compliance_log (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        customer_id UUID NOT NULL,
        market STRING NOT NULL,
        check_type STRING NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
      )

  - name: create_order_log
    query: |-
      CREATE TABLE IF NOT EXISTS order_log (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        customer_id UUID NOT NULL,
        product_id UUID NOT NULL,
        subtotal FLOAT NOT NULL,
        tax FLOAT NOT NULL,
        currency STRING NOT NULL,
        market STRING NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
      )

seed:

  - name: populate_customer
    type: exec_batch
    count: customers
    size: batch_size
    args:
      - gen('email')
      - set_rand(['uk', 'us', 'eu'], [34, 33, 33])
    query: |-
      INSERT INTO customer (email, market)
      __values__

  - name: populate_product
    type: exec_batch
    count: products
    size: batch_size
    args:
      - gen('productname')
      - uniform_f(5.00, 500.00, 2)
    query: |-
      INSERT INTO product (name, price)
      __values__

deseed:

  - name: truncate_order_log
    type: exec
    query: TRUNCATE TABLE order_log

  - name: truncate_compliance_log
    type: exec
    query: TRUNCATE TABLE compliance_log

  - name: truncate_product
    type: exec
    query: TRUNCATE TABLE product CASCADE

  - name: truncate_customer
    type: exec
    query: TRUNCATE TABLE customer CASCADE

down:

  - name: drop_order_log
    type: exec
    query: DROP TABLE IF EXISTS order_log

  - name: drop_compliance_log
    type: exec
    query: DROP TABLE IF EXISTS compliance_log

  - name: drop_product
    type: exec
    query: DROP TABLE IF EXISTS product

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer

init:

  - name: fetch_customers
    type: query
    query: SELECT id FROM customer ORDER BY random()

  - name: fetch_products
    type: query
    query: SELECT id, price FROM product ORDER BY random()

run:

  # Standalone match/when/default (outside a transaction)
  #
  # Reads a random customer and logs a region-specific compliance
  # check: GDPR for UK, CCPA for US, standard for everyone else.

  - name: read_customer
    type: query
    args:
      - ref_rand('fetch_customers').id
    query: |-
      SELECT id, market FROM customer WHERE id = $1::UUID

  - match: "ref_same('read_customer').market"
    when:
      - eq: "'uk'"
        queries:
          - name: log_gdpr
            type: exec
            args:
              - ref_same('read_customer').id
              - ref_same('read_customer').market
            query: |-
              INSERT INTO compliance_log (customer_id, market, check_type)
              VALUES ($1::UUID, $2::STRING, 'gdpr')

      - eq: "'us'"
        queries:
          - name: log_ccpa
            type: exec
            args:
              - ref_same('read_customer').id
              - ref_same('read_customer').market
            query: |-
              INSERT INTO compliance_log (customer_id, market, check_type)
              VALUES ($1::UUID, $2::STRING, 'ccpa')

    default:
      - name: log_standard
        type: exec
        args:
          - ref_same('read_customer').id
          - ref_same('read_customer').market
        query: |-
          INSERT INTO compliance_log (customer_id, market, check_type)
          VALUES ($1::UUID, $2::STRING, 'standard')

  # match/when/default inside a transaction
  #
  # Places an order with market-specific tax and currency.
  # UK: 20% VAT in GBP, US: 10% sales tax in USD,
  # EU (default): 23% VAT in EUR.

  - transaction: place_order
    queries:
      - name: read_buyer
        type: query
        args:
          - ref_rand('fetch_customers').id
        query: |-
          SELECT id, market FROM customer WHERE id = $1::UUID

      - name: read_product
        type: query
        args:
          - ref_rand('fetch_products').id
        query: |-
          SELECT id, price FROM product WHERE id = $1::UUID

      - match: "ref_same('read_buyer').market"
        when:
          - eq: "'uk'"
            queries:
              - name: insert_uk_order
                type: exec
                args:
                  - ref_same('read_buyer').id
                  - ref_same('read_product').id
                  - ref_same('read_product').price
                  - ref_same('read_product').price * 0.20
                  - ref_same('read_buyer').market
                query: |-
                  INSERT INTO order_log (customer_id, product_id, subtotal, tax, currency, market)
                  VALUES ($1::UUID, $2::UUID, $3::FLOAT, $4::FLOAT, 'GBP', $5::STRING)

          - eq: "'us'"
            queries:
              - name: insert_us_order
                type: exec
                args:
                  - ref_same('read_buyer').id
                  - ref_same('read_product').id
                  - ref_same('read_product').price
                  - ref_same('read_product').price * 0.10
                  - ref_same('read_buyer').market
                query: |-
                  INSERT INTO order_log (customer_id, product_id, subtotal, tax, currency, market)
                  VALUES ($1::UUID, $2::UUID, $3::FLOAT, $4::FLOAT, 'USD', $5::STRING)

        default:
          - name: insert_eu_order
            type: exec
            args:
              - ref_same('read_buyer').id
              - ref_same('read_product').id
              - ref_same('read_product').price
              - ref_same('read_product').price * 0.23
              - ref_same('read_buyer').market
            query: |-
              INSERT INTO order_log (customer_id, product_id, subtotal, tax, currency, market)
              VALUES ($1::UUID, $2::UUID, $3::FLOAT, $4::FLOAT, 'EUR', $5::STRING)

expectations:

  - query: SELECT COUNT(DISTINCT check_type) AS cnt FROM compliance_log
    expr: cnt == 3

  - query: |-
      SELECT COUNT(*) AS cnt
      FROM compliance_log cl
      JOIN customer c ON c.id = cl.customer_id
      WHERE (cl.check_type = 'gdpr'     AND c.market != 'uk')
         OR (cl.check_type = 'ccpa'     AND c.market != 'us')
         OR (cl.check_type = 'standard' AND c.market != 'eu')
    expr: cnt == 0

  - query: |-
      SELECT COUNT(*) AS cnt
      FROM order_log
      WHERE (market = 'uk' AND currency != 'GBP')
         OR (market = 'us' AND currency != 'USD')
         OR (market = 'eu' AND currency != 'EUR')
    expr: cnt == 0

  - query: |-
      SELECT COUNT(*) AS cnt
      FROM order_log
      WHERE (currency = 'GBP' AND abs(tax - subtotal * 0.20) > 0.01)
         OR (currency = 'USD' AND abs(tax - subtotal * 0.10) > 0.01)
         OR (currency = 'EUR' AND abs(tax - subtotal * 0.23) > 0.01)
    expr: cnt == 0

  - query: SELECT COUNT(DISTINCT market) AS cnt FROM order_log
    expr: cnt == 3
