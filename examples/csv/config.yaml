globals:
  customers: 10

seq:
  - name: customer_id
    start: 1
    step: 1

up:

  - name: create_customer
    type: exec
    query: |-
      CREATE TABLE IF NOT EXISTS customer (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email STRING NOT NULL,
        region STRING NOT NULL,
        currency STRING NOT NULL,
        greeting STRING NOT NULL
      )

seed:

  - name: populate_customer
    type: exec_batch
    count: customers
    size: 10
    args:
      - gen('email')
      - ref_same('regions').code
      - ref_same('regions').currency
      - ref_rand('translations').greeting
    query: |-
      INSERT INTO customer (email, region, currency, greeting)
      __values__

deseed:

  - name: truncate_customer
    type: exec
    query: TRUNCATE TABLE customer CASCADE

down:

  - name: drop_customer
    type: exec
    query: DROP TABLE IF EXISTS customer
