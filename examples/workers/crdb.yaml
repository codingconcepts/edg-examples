globals:
  jobs: 500
  batch_size: 100

up:

  - name: create_job
    query: |-
      CREATE TABLE IF NOT EXISTS job (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        kind STRING NOT NULL,
        payload JSONB,
        status STRING NOT NULL DEFAULT 'pending',
        worker_id STRING,
        lease_expires_at TIMESTAMPTZ,
        attempts INT NOT NULL DEFAULT 0,
        max_attempts INT NOT NULL DEFAULT 3,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        completed_at TIMESTAMPTZ
      )

  - name: create_job_status_idx
    query: CREATE INDEX IF NOT EXISTS idx_job_status ON job (status, created_at)

  - name: create_job_lease_idx
    query: CREATE INDEX IF NOT EXISTS idx_job_lease ON job (status, lease_expires_at)

  - name: create_job_log
    query: |-
      CREATE TABLE IF NOT EXISTS job_log (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        job_id UUID NOT NULL REFERENCES job(id),
        event STRING NOT NULL,
        detail JSONB,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
      )

seed:

  - name: seed_jobs
    type: exec_batch
    count: jobs
    size: batch_size
    args:
      - set_rand(['email', 'report', 'sync', 'cleanup', 'notify'], [30, 20, 25, 10, 15])
      - json_obj('priority', set_rand(['low', 'medium', 'high'], [50, 35, 15]), 'retryable', true)
    query: |-
      INSERT INTO job (kind, payload)
      __values__

init:

  - name: fetch_jobs
    type: query
    query: SELECT id FROM job WHERE status = 'pending' ORDER BY random()

run:

  - transaction: process_job
    queries:
      - name: claim_job
        type: query
        query: |-
          UPDATE job
          SET status = 'running',
              worker_id = 'edg',
              lease_expires_at = now() + interval '10 seconds',
              attempts = attempts + 1
          WHERE id = (
              SELECT id FROM job
              WHERE status = 'pending'
              ORDER BY created_at ASC
              LIMIT 1
              FOR UPDATE SKIP LOCKED
          )
          RETURNING id, kind

      - rollback_if: "count('claim_job') == 0"

      - name: log_start
        type: exec
        args:
          - ref_same('claim_job').id
          - ref_same('claim_job').kind
        query: |-
          INSERT INTO job_log (job_id, event, detail)
          VALUES ($1::UUID, 'started', json_build_object('kind', $2))

      - name: log_complete
        type: exec
        wait: 500ms
        args:
          - ref_same('claim_job').id
          - json_obj('duration_ms', uniform(50, 2000))
        query: |-
          INSERT INTO job_log (job_id, event, detail)
          VALUES ($1::UUID, 'completed', $2::JSONB)

      - name: complete_job
        type: exec
        args:
          - ref_same('claim_job').id
          - json_obj('processed_by', 'edg', 'items', uniform(1, 100))
        query: |-
          UPDATE job
          SET status = 'completed',
              completed_at = now()
          WHERE id = $1::UUID

workers:

  - name: reap_expired
    rate: 1/5s
    type: exec
    query: |-
      UPDATE job
      SET status = 'pending',
          worker_id = NULL,
          lease_expires_at = NULL
      WHERE status = 'running'
        AND lease_expires_at < now()
        AND attempts < max_attempts

  - name: fail_exhausted
    rate: 1/5s
    type: exec
    query: |-
      UPDATE job
      SET status = 'failed',
          completed_at = now()
      WHERE status = 'running'
        AND lease_expires_at < now()
        AND attempts >= max_attempts

deseed:

  - name: delete_job_log
    type: exec
    query: DELETE FROM job_log WHERE true

  - name: delete_job
    type: exec
    query: DELETE FROM job WHERE true

down:

  - name: drop_job_log
    query: DROP TABLE IF EXISTS job_log

  - name: drop_job
    query: DROP TABLE IF EXISTS job
