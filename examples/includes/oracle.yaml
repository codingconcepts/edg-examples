# Config Includes workload for Oracle
#
# Demonstrates the !include directive with Oracle-specific SQL.
# Globals are shared across all databases; schema, teardown,
# and run queries use database-specific include files.
#
# Connection URL format:
#   oracle://user:password@host:port/service

globals: !include shared/globals.yaml

up: !include shared/schema_oracle.yaml

seed:

  - name: clear_account
    type: exec
    query: TRUNCATE TABLE account

  - name: clear_customer
    type: exec
    query: TRUNCATE TABLE customer

  - name: populate_customer
    type: exec_batch
    count: customers
    size: 100
    args:
      - gen('email')
    query: |-
      INSERT ALL __values__(customer(email))

  - name: populate_account
    args:
      - batch(customers / batch_size)
      - initial_balance
      - batch_size
    query: |-
      INSERT INTO account (balance, customer_id)
      SELECT $2, c.id
      FROM customer c
      ORDER BY c.id
      OFFSET $1 * $3 ROWS FETCH NEXT $3 ROWS ONLY

deseed:

  - name: truncate_account
    type: exec
    query: TRUNCATE TABLE account

  - name: truncate_customer
    type: exec
    query: TRUNCATE TABLE customer

down: !include shared/teardown_oracle.yaml

init:

  - name: fetch_accounts
    type: query
    query: SELECT id FROM account

run_weights:
  check_balance: 50
  credit_account: 50

run: !include shared/run_queries_oracle.yaml
