- name: check_balance
  type: query
  args:
    - ref_rand('fetch_accounts').id
  query: |-
    SELECT balance FROM account WHERE id = ?

- name: credit_account
  type: exec
  args:
    - gen('number:1,1000')
    - ref_rand('fetch_accounts').id
  query: |-
    UPDATE account SET balance = balance + ?
    WHERE id = ?
