# Normal distribution workload for SQL Server
#
# Connection URL format:
#   sqlserver://user:password@host:port?database=database&encrypt=disable

globals:
  products: 100
  batch_size: 100

up:

  - name: create_product
    query: |-
      IF OBJECT_ID('product', 'U') IS NULL
      CREATE TABLE product (
        id INT PRIMARY KEY,
        name NVARCHAR(255) NOT NULL,
        price DECIMAL(10,2) NOT NULL
      )

  - name: create_review
    query: |-
      IF OBJECT_ID('review', 'U') IS NULL
      CREATE TABLE review (
        id UNIQUEIDENTIFIER PRIMARY KEY DEFAULT NEWID(),
        product_id INT NOT NULL,
        rating INT NOT NULL CHECK (rating BETWEEN 1 AND 5),
        created_at DATETIME2 NOT NULL DEFAULT GETDATE(),
        FOREIGN KEY (product_id) REFERENCES product(id)
      )

seed:

  - name: populate_product
    args:
      - products
    query: |-
      WITH seq AS (
        SELECT 1 AS s
        UNION ALL
        SELECT s + 1 FROM seq WHERE s < $1
      )
      INSERT INTO product (id, name, price)
      SELECT
        s,
        CONCAT('product-', s),
        CAST(RAND(CHECKSUM(NEWID())) * 99 + 1 AS DECIMAL(10,2))
      FROM seq
      OPTION (MAXRECURSION 0)

deseed:

  - name: delete_review
    type: exec
    query: DELETE FROM review

  - name: delete_product
    type: exec
    query: DELETE FROM product

down:

  - name: drop_review
    type: exec
    query: DROP TABLE IF EXISTS review

  - name: drop_product
    type: exec
    query: DROP TABLE IF EXISTS product

init:

  - name: fetch_products
    type: query
    query: SELECT id FROM product

run:

  # Most reviews cluster around 4 stars (mean=4, stddev=1, clamped to 1-5).
  - name: add_review
    type: exec
    args:
      - ref_rand('fetch_products').id
      - norm(4, 1, 1, 5)
    query: |-
      INSERT INTO review (product_id, rating)
      VALUES (@p1, @p2)

  # Bulk insert using norm_n to pick 3-8 products weighted
  # toward the middle of the catalogue.
  - name: add_batch_reviews
    type: exec
    args:
      - norm_n(50, 15, 1, 100, 3, 8)
      - norm(4, 1, 1, 5)
    query: |-
      INSERT INTO review (product_id, rating)
      SELECT CAST(value AS INT), @p2
      FROM STRING_SPLIT(@p1, ',')
