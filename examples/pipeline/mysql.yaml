# Pipeline workload for MySQL
#
# A simple three-table pipeline where each iteration finds
# a row in a, follows the relationship to b, then updates c.
# No run_weights: all queries run sequentially every iteration.
#
# Connection URL format:
#   user:password@tcp(host:port)/database?parseTime=true

globals:
  a_rows: 1000
  b_rows: 5000
  c_rows: 20000
  batch_size: 5000

up:

  - name: create_a
    query: |-
      CREATE TABLE IF NOT EXISTS a (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        name VARCHAR(255) NOT NULL
      )

  - name: create_b
    query: |-
      CREATE TABLE IF NOT EXISTS b (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        a_id CHAR(36) NOT NULL,
        value INT NOT NULL,
        FOREIGN KEY (a_id) REFERENCES a(id)
      )

  - name: create_c
    query: |-
      CREATE TABLE IF NOT EXISTS c (
        id CHAR(36) PRIMARY KEY DEFAULT (UUID()),
        b_id CHAR(36) NOT NULL,
        status VARCHAR(20) NOT NULL DEFAULT 'new',
        FOREIGN KEY (b_id) REFERENCES b(id)
      )

seed:

  - name: populate_a
    type: exec_batch
    count: a_rows
    size: batch_size
    args:
      - gen('word')
    query: |-
      INSERT INTO a (name)
      __values__

  - name: populate_b
    args:
      - batch(b_rows / batch_size)
      - batch_size
    query: |-
      INSERT INTO b (a_id, value)
      SELECT a.id, FLOOR(RAND() * 100)
      FROM a
      ORDER BY RAND()
      LIMIT $2

  - name: populate_c
    args:
      - batch(c_rows / batch_size)
      - batch_size
    query: |-
      INSERT INTO c (b_id)
      SELECT b.id
      FROM b
      ORDER BY RAND()
      LIMIT $2

deseed:

  - name: delete_c
    type: exec
    query: DELETE FROM c

  - name: delete_b
    type: exec
    query: DELETE FROM b

  - name: delete_a
    type: exec
    query: DELETE FROM a

down:

  - name: drop_c
    type: exec
    query: DROP TABLE IF EXISTS c

  - name: drop_b
    type: exec
    query: DROP TABLE IF EXISTS b

  - name: drop_a
    type: exec
    query: DROP TABLE IF EXISTS a

# No run_weights: all three queries run sequentially every iteration,
# so each step can reference data returned by the previous one.

run:

  # Finds a random row from a.
  - name: find_a
    type: query
    query: |-
      SELECT id AS a_id, name
      FROM a
      ORDER BY RAND()
      LIMIT 1

  # Finds a row from b related to the random row in a.
  - name: find_b
    type: query
    args:
      - ref_rand('find_a').a_id
    query: |-
      SELECT id AS b_id, value
      FROM b
      WHERE a_id = ?
      LIMIT 1

  # Updates a row in c related to the row found in b.
  - name: update_c
    type: exec
    args:
      - ref_rand('find_b').b_id
    query: |-
      UPDATE c SET status = 'processed'
      WHERE b_id = ?
        AND status = 'new'
      LIMIT 1
