seq:
  - name: emp_id
    start: 1
    step: 1
  - name: dep_id
    start: 1
    step: 1

up:

  - name: create_employees
    query: |-
      CREATE TABLE IF NOT EXISTS employees (
        id INT PRIMARY KEY,
        name STRING NOT NULL,
        role STRING NOT NULL,
        manager_id INT REFERENCES employees(id)
      )

  - name: create_dependencies
    query: |-
      CREATE TABLE IF NOT EXISTS dependencies (
        id INT PRIMARY KEY,
        name STRING NOT NULL,
        dependency_id INT REFERENCES dependencies(id)
      )

tree:

  - name: org
    levels: [1, 5, 15, 50, 200]
    id_column: id
    parent_column: manager_id
    args:
      id: seq_global('emp_id')
      name: gen('name')
      role: ~
      manager_id: ~
    level_args:
      0:
        role: const('CEO')
      1:
        role: const('VP')
      2:
        role: const('Director')
      3:
        role: const('Manager')
      4:
        role: set_rand(['Engineer', 'IC'], [])
    query: |-
      INSERT INTO employees (id, name, role, manager_id)
      __values__

  - name: deps
    levels: [3, 8, 20]
    id_column: id
    parent_column: dependency_id
    dag: true
    args:
      id: seq_global('dep_id')
      name: template('pkg-%d', iter())
      dependency_id: ~
    query: |-
      INSERT INTO dependencies (id, name, dependency_id)
      __values__

deseed:

  - name: truncate_employees
    type: exec
    query: TRUNCATE TABLE employees CASCADE

  - name: truncate_dependencies
    type: exec
    query: TRUNCATE TABLE dependencies CASCADE

down:

  - name: drop_employees
    type: exec
    query: DROP TABLE IF EXISTS employees

  - name: drop_dependencies
    type: exec
    query: DROP TABLE IF EXISTS dependencies
